<!-- PoshPet Mobile Booking Prototype -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root{
    --brown:#4A2F1D; --brown2:#3a2416; --mocha:#8A6B4F; --mochaSoft:#A98A6C;
    --cream:#F6EFE5; --cream2:#FBF7F0; --line:#E7DACB; --ink:#2B2317; --gray:#7C6E5E;
    --accent:#C07A3A; --accentDk:#A9652C; --good:#3F8D52; --bad:#C0473E; --warn:#B5792B;
    --shadow:0 10px 40px rgba(74,47,29,.16); --shadowSm:0 4px 16px rgba(74,47,29,.10);
    --radius:22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  #ppwrap{font-family:'Plus Jakarta Sans','Noto Sans KR','Noto Sans CJK KR','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; color:var(--ink);
    display:flex; gap:30px; align-items:flex-start; justify-content:center;
    padding:24px 12px 40px; flex-wrap:wrap;}

  /* ---- phone shell ---- */
  .phone{width:390px; max-width:100%; height:800px; background:var(--cream2);
    border-radius:46px; box-shadow:var(--shadow); position:relative; overflow:hidden;
    border:10px solid #241910;}
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:140px; height:26px; background:#241910; border-radius:0 0 18px 18px; z-index:60;}
  .screen{position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
    scroll-behavior:smooth; padding-bottom:96px;}
  .screen::-webkit-scrollbar{width:0;}

  /* 모바일 풀스크린: 폰에서는 phone 프레임을 풀고 전체 페이지가 뷰포트를 채우게 */
  /* 기준 두 가지: (a) 좁은 뷰포트 (b) 터치 디바이스 — 둘 중 하나만 맞아도 풀스크린 */
  @media(max-width:820px), (pointer:coarse) and (hover:none){
    body{background:var(--cream2); margin:0;}
    #ppwrap{padding:0; gap:0; display:block;}
    #ppwrap .legend{padding:14px 18px 24px; background:var(--cream); margin-top:14px;}
    .phone{width:100%; max-width:none; height:100vh; height:100dvh;
      border-radius:0; border:none; box-shadow:none;}
    .notch{display:none;}
    .screen{padding-bottom:110px;}
  }

  /* ---- generic ---- */
  .pad{padding:0 18px;}
  .disp{font-family:'Fraunces',serif;}
  .muted{color:var(--gray);}
  .center{text-align:center;}
  .hidden{display:none !important;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}

  .btn{display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:15px 18px; border-radius:16px; font-weight:600; font-size:16px;
    background:var(--accent); color:#fff; box-shadow:var(--shadowSm); transition:.15s;}
  .btn:active{transform:scale(.98);} .btn:hover{background:var(--accentDk);}
  .btn.ghost{background:transparent; color:var(--brown); border:1.5px solid var(--line);
    box-shadow:none;}
  .btn.ghost:hover{background:#fff;}
  .btn.dark{background:var(--brown);} .btn.dark:hover{background:var(--brown2);}
  .btn:disabled{opacity:.4; pointer-events:none;}
  .btn.soft{background:#D5BFA3; box-shadow:none;}  /* 비활성처럼 보이지만 클릭하면 hint */
  .btn.soft:hover{background:#C9B193;}
  .btn.sm{padding:10px 14px; font-size:14px; width:auto; border-radius:12px;}

  .chip{display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:30px;
    border:1.5px solid var(--line); background:#fff; font-size:14px; font-weight:500;
    color:var(--ink); transition:.12s;}
  .chip:hover{border-color:var(--mochaSoft);}
  .chip.on{background:var(--brown); color:#fff; border-color:var(--brown);}

  .card{background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadowSm);}

  /* ---- top bar ---- */
  .topbar{position:sticky; top:0; z-index:40; background:rgba(251,247,240,.86);
    backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 12px; border-bottom:1px solid var(--line);}
  .brand{font-family:'Fraunces',serif; font-weight:600; font-size:20px; color:var(--brown);
    letter-spacing:.3px; display:flex; align-items:center; gap:8px;}
  .brand .paw{width:34px;height:auto;display:block; filter:drop-shadow(0 1px 1px rgba(74,47,29,.12));}
  .lang{display:flex; gap:4px; align-items:center; font-size:12px; font-weight:600; color:var(--mocha);
    border:1px solid var(--line); border-radius:30px; padding:5px 10px; background:#fff;}

  /* ---- 언어 토글 (한·베·영) ---- */
  .langtoggle{position:relative;}
  .lt-btn{display:inline-flex;align-items:center;gap:3px;background:#fff;border:1px solid var(--line);border-radius:30px;padding:5px 10px;font-size:11.5px;font-weight:700;color:var(--brown);cursor:pointer;transition:.15s;line-height:1;}
  .lt-btn:hover{border-color:var(--mochaSoft);background:var(--cream2);}
  .lt-cur{font-family:'Fraunces',serif;font-weight:600;}
  .lt-arr{font-size:9px;color:var(--gray);margin-left:1px;}
  .lt-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:140px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:5px;box-shadow:0 6px 22px rgba(74,47,29,.12);z-index:60;}
  .lt-opt{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;border-radius:8px;background:transparent;border:none;font-size:13px;color:var(--ink);cursor:pointer;transition:.12s;text-align:left;}
  .lt-opt:hover{background:var(--cream2);}
  .lt-opt.on{background:var(--brown);color:#fff;}
  .lt-opt.on i{color:rgba(255,255,255,.6);}
  .lt-opt i{font-style:normal;font-size:10.5px;color:var(--gray);font-weight:700;letter-spacing:.5px;}

  .back{font-size:22px; color:var(--brown); width:34px; height:34px; display:flex;
    align-items:center; justify-content:center; border-radius:50%;}
  .back:hover{background:#fff;}

  /* top-right: auth chips or profile */
  .topRight{display:flex; align-items:center; gap:6px;}
  .authChips{display:flex; gap:4px;}
  .authMini{font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:30px;
    background:#fff; color:var(--brown); border:1px solid var(--line);}
  .authMini.primary{background:var(--brown); color:#fff; border-color:var(--brown);}
  .authMini:hover{border-color:var(--mochaSoft);}
  .authMini.primary:hover{background:#5a3f2a;}
  .meChip{display:flex; align-items:center; gap:6px; padding:3px 11px 3px 3px; border-radius:30px;
    background:#fff; border:1px solid var(--line);}
  .meAv{width:24px; height:24px; border-radius:50%; background:var(--brown); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:12px; font-weight:600;}
  .meNm{font-size:11.5px; font-weight:700; color:var(--brown);}

  /* ---- bottom tabbar ---- */
  .tabbar{position:absolute; left:0; right:0; bottom:0; height:74px; z-index:50;
    background:rgba(255,255,255,.94); backdrop-filter:blur(12px); border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-around; padding:0 14px 8px;}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px;
    color:var(--gray); font-weight:600; flex:1;}
  .tab svg{width:23px;height:23px;}
  .tab.on{color:var(--brown);}
  .tab.book{margin-top:-26px;}
  .tab.book .fab{width:58px;height:58px;border-radius:50%; background:var(--accent);
    display:flex;align-items:center;justify-content:center; box-shadow:0 8px 20px rgba(192,122,58,.5);
    border:4px solid var(--cream2); color:#fff;}
  .tab.book .fab svg{width:26px;height:26px;}
  .tab.book:active .fab{transform:scale(.94);}

  /* ---- hero ---- */
  .hero{position:relative; height:330px; overflow:hidden;}
  .hero .img{position:absolute; inset:0;
    background:
      radial-gradient(120% 80% at 70% 10%, rgba(192,122,58,.30), transparent 60%),
      linear-gradient(180deg,#6b4a30 0%, #4A2F1D 70%);}
  .hero .grain{position:absolute; inset:0; opacity:.18; mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.5) .6px, transparent .7px);
    background-size:4px 4px;}
  .hero .silho{position:absolute; right:-10px; bottom:-14px; width:230px; opacity:.9;}
  .hero .htext{position:absolute; left:20px; bottom:26px; right:20px; color:#fff; z-index:2;}
  .kicker{font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#E9C9A6; font-weight:700;}
  .hero h1{font-family:'Fraunces',serif; font-weight:600; font-size:33px; line-height:1.08;
    margin:8px 0 8px;}
  .hero p{font-size:13.5px; color:#EADfce; opacity:.92; max-width:280px;}
  .hbadge{position:absolute; top:18px; left:18px; z-index:2; display:flex; gap:6px; flex-wrap:wrap;}
  .hbadge span{background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.25);
    color:#fff; font-size:11px; font-weight:600; padding:5px 11px; border-radius:30px; backdrop-filter:blur(4px);}

  .sectitle{font-family:'Fraunces',serif; font-size:21px; font-weight:600; color:var(--brown);
    margin:26px 0 4px;}
  .seclead{font-size:13px; color:var(--gray); margin-bottom:14px; line-height:1.5;}
  .infolist{list-style:none; padding:0; margin:6px 0 16px; text-align:left;
    background:var(--cream2); border-radius:13px; padding:14px 16px;}
  .infolist li{font-size:12.5px; color:var(--ink); line-height:1.65; padding:5px 0; padding-left:18px; position:relative;}
  .infolist li::before{content:'•'; position:absolute; left:5px; color:var(--accent); font-weight:700;}

  /* sub-label & saved address/phone list */
  .sublabel{font-size:12px; font-weight:700; color:var(--mocha); margin:14px 0 8px; letter-spacing:.3px;}
  .sublabel .optional{font-weight:500; color:var(--gray); margin-left:5px;}
  .savedlist{display:flex; flex-direction:column; gap:8px;}
  .savedrow{display:flex; align-items:center; gap:11px; padding:12px 14px; background:#fff;
    border:1.5px solid var(--line); border-radius:13px; text-align:left; width:100%;}
  .savedrow.on{border-color:var(--accent); background:#FFF7EB;}
  .savedrow.add{border-style:dashed; color:var(--mocha);}
  .sv-ic{width:34px; height:34px; border-radius:11px; background:var(--cream2);
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .savedrow.on .sv-ic{background:#FFE9C9;}
  .sv-tx{flex:1; min-width:0;}
  .sv-tx b{display:block; font-size:13.5px; font-weight:700; color:var(--brown);}
  .sv-tx i{font-style:normal; font-size:11.5px; color:var(--gray); margin-top:2px; display:block;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .defbadge{font-style:normal; font-size:9.5px; font-weight:700; background:var(--brown); color:#fff;
    padding:1px 6px; border-radius:30px; margin-left:5px; letter-spacing:.3px;}
  .sv-rd{width:18px; height:18px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; position:relative;}
  .sv-rd.on{border-color:var(--accent);}
  .sv-rd.on::after{content:''; position:absolute; inset:3px; border-radius:50%; background:var(--accent);}

  /* service cards */
  .svc{display:flex; align-items:center; gap:14px; padding:14px; margin-bottom:11px;}
  .svc .ic{width:50px;height:50px;border-radius:15px; flex-shrink:0; display:flex;
    align-items:center;justify-content:center; font-size:24px; background:var(--cream);}
  .svc .nm{font-weight:700; font-size:15.5px;}
  .svc .ds{font-size:12px; color:var(--gray); margin-top:2px; line-height:1.4;}
  .svc .pr{font-size:12.5px; color:var(--accentDk); font-weight:700; margin-top:5px;}
  .svc .go{margin-left:auto; color:var(--mochaSoft); font-size:20px; align-self:center;}

  /* stat strip */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:6px 0;}
  .stat{background:var(--brown); color:#fff; border-radius:16px; padding:14px 6px; text-align:center;}
  .stat .n{font-family:'Fraunces',serif; font-size:23px; font-weight:600; line-height:1;}
  .stat .l{font-size:9.5px; color:#E2C9AE; margin-top:6px; line-height:1.2;}

  /* trust row */
  .trust{display:flex; gap:10px; margin-top:8px;}
  .trust .t{flex:1; background:var(--cream); border-radius:14px; padding:12px; text-align:center;}
  .trust .t .e{font-size:20px;} .trust .t .x{font-size:11px; font-weight:600; margin-top:5px; color:var(--brown);}

  /* gallery */
  .gal{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin:0 -18px; padding-left:18px; padding-right:18px;}
  .gal::-webkit-scrollbar{height:0;}
  .gal .g{flex:0 0 150px; height:110px; border-radius:18px; position:relative; overflow:hidden;
    display:flex; align-items:flex-end; padding:10px; color:#fff; font-size:12px; font-weight:600;}
  .gal .g span{position:relative; z-index:2;}
  .gal .g .ov{position:absolute; inset:0; background:linear-gradient(180deg,transparent 35%, rgba(40,25,12,.7));}

  /* steps / progress */
  .prog{display:flex; gap:6px; padding:14px 18px 4px;}
  .prog .seg{flex:1; height:5px; border-radius:6px; background:var(--line);}
  .prog .seg.on{background:var(--accent);}
  .steplabel{font-size:12px; color:var(--mocha); font-weight:600; padding:2px 18px 0; letter-spacing:.3px;}
  .qtitle{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--brown);
    padding:6px 18px 2px; line-height:1.15;}
  .qsub{font-size:13px; color:var(--gray); padding:0 18px 16px;}

  /* room/option list */
  .opt{display:flex; align-items:center; gap:12px; padding:15px; margin-bottom:10px; cursor:pointer;}
  .opt .rd{width:22px;height:22px;border-radius:50%; border:2px solid var(--line); flex-shrink:0; position:relative; transition:.15s;}
  .opt.on{border-color:var(--accent); box-shadow:0 0 0 2px rgba(192,122,58,.18);}
  .opt.on .rd{border-color:var(--accent);}
  .opt.on .rd::after{content:''; position:absolute; inset:4px; border-radius:50%; background:var(--accent);}
  .opt .onm{font-weight:700; font-size:15px;} .opt .ods{font-size:12px; color:var(--gray); margin-top:2px;}
  .opt .opr{margin-left:auto; font-weight:700; font-size:14px; color:var(--brown); white-space:nowrap;}

  /* calendar */
  .cal{padding:4px 14px;}
  .calhead{display:flex; justify-content:space-between; align-items:center; padding:6px 6px 12px; font-weight:600; color:var(--brown);}
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
  .dow{font-size:10.5px; color:var(--gray); text-align:center; padding-bottom:6px; font-weight:700;}
  .day{aspect-ratio:1; max-height:52px; display:flex; align-items:center; justify-content:center; font-size:13.5px;
    border-radius:11px; color:var(--ink); position:relative; cursor:pointer;}
  .day.mut{color:#cfc3b3; pointer-events:none;}
  .day.off{color:#d8b5b0; text-decoration:line-through; pointer-events:none;}
  .day:hover:not(.mut):not(.off){background:var(--cream);}
  .day.sel{background:var(--accent); color:#fff; font-weight:700;}
  .day.range{background:rgba(192,122,58,.16); border-radius:0;}
  .day.start{background:var(--accent); color:#fff; border-radius:11px 0 0 11px;}
  .day.end{background:var(--accent); color:#fff; border-radius:0 11px 11px 0;}

  /* time grid */
  .times{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; padding:6px 18px;}
  .tslot{padding:13px 6px; border-radius:14px; border:1.5px solid var(--line); background:#fff;
    text-align:center; font-weight:600; font-size:14px; cursor:pointer;}
  .tslot:hover:not(.full){border-color:var(--mochaSoft);}
  .tslot.full{color:#c9bdad; background:var(--cream); pointer-events:none; text-decoration:line-through;}
  .tslot.on{background:var(--brown); color:#fff; border-color:var(--brown);}

  /* pet selector */
  .pet{display:flex; align-items:center; gap:13px; padding:13px; margin-bottom:10px; cursor:pointer;}
  .pet .av{width:48px;height:48px;border-radius:50%; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; font-size:24px; background:var(--cream); border:2px solid transparent;}
  .pet.on{box-shadow:0 0 0 2px var(--accent);}
  .pet.on .av{border-color:var(--accent);}
  .pet .pnm{font-weight:700; font-size:15px;} .pet .pds{font-size:12px; color:var(--gray);}
  .pet .chk{margin-left:auto; width:22px;height:22px;}

  /* toggle pickup */
  .seg2{display:flex; gap:10px; padding:0 18px;}
  .seg2 button{flex:1; padding:16px; border-radius:16px; border:1.5px solid var(--line);
    background:#fff; font-weight:700; font-size:15px; color:var(--ink); transition:.15s;}
  .seg2 button.on{background:var(--brown); color:#fff; border-color:var(--brown);}

  /* input */
  .field{padding:0 18px 14px;}
  .field label{font-size:12.5px; font-weight:600; color:var(--mocha); display:block; margin-bottom:7px;}
  .field input, .field textarea{width:100%; padding:14px; border:1.5px solid var(--line);
    border-radius:14px; font-family:inherit; font-size:15px; background:#fff; color:var(--ink);}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--accent);}

  /* sticky footer bar inside flow */
  .flowfoot{position:absolute; left:0; right:0; bottom:74px; padding:14px 18px 18px;
    background:linear-gradient(180deg, transparent, var(--cream2) 26%); z-index:55;}
  .quote{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; padding:0 4px;}
  .quote .ql{font-size:12px; color:var(--gray);}
  .quote .qv{font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:var(--brown);}
  .quote .qd{font-size:11px; color:var(--good); font-weight:700;}

  /* summary */
  .sumrow{display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px dashed var(--line); font-size:14px;}
  .sumrow .k{color:var(--gray);} .sumrow .v{font-weight:600; text-align:right;}
  .sumrow.tot{border-bottom:none; padding-top:14px;}
  .sumrow.tot .v{font-family:'Fraunces',serif; font-size:22px; color:var(--brown);}

  /* sheet (auth/add pet) */
  .sheetbg{position:absolute; inset:0; background:rgba(40,25,12,.45); z-index:70; opacity:0;
    transition:.25s; pointer-events:none;}
  .sheetbg.show{opacity:1; pointer-events:auto;}
  .sheet{position:absolute; left:0; right:0; bottom:0; z-index:71; background:var(--cream2);
    border-radius:28px 28px 0 0; padding:10px 18px 26px; transform:translateY(110%);
    transition:.32s cubic-bezier(.3,.8,.3,1); max-height:88%; overflow-y:auto;}
  .sheet.show{transform:translateY(0);}
  .grab{width:42px;height:5px;border-radius:6px;background:var(--line); margin:6px auto 16px;}
  .social{display:flex; align-items:center; justify-content:center; gap:11px; width:100%;
    padding:15px; border-radius:15px; font-weight:600; font-size:15.5px; margin-bottom:11px; border:1.5px solid var(--line); background:#fff;}
  .social:hover{background:var(--cream);}
  .social.g{border-color:#dadce0;}
  .social.z{background:#0068FF; color:#fff; border-color:#0068FF;}
  .social svg{width:22px;height:22px;}
  .authmore{display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:11px; border-radius:13px; font-weight:600; font-size:13px; color:var(--mocha);
    background:transparent; border:1.5px dashed var(--line); cursor:pointer;}
  .authmore:hover{background:var(--cream); border-color:var(--accent);}

  /* done */
  .done .seal{width:84px;height:84px;border-radius:50%; background:var(--good);
    display:flex;align-items:center;justify-content:center; margin:8px auto 18px; color:#fff;
    box-shadow:0 10px 30px rgba(63,141,82,.4);}
  .code{font-family:'Fraunces',serif; font-size:30px; font-weight:600; letter-spacing:2px; color:var(--brown);}

  /* reuse card */
  .reuse{padding:9px 12px; margin-bottom:7px; display:flex; gap:10px; align-items:center;}
  .reuse .av{width:34px;height:34px;border-radius:10px; background:var(--cream); display:flex;
    align-items:center;justify-content:center; font-size:17px; flex-shrink:0;}
  .reuse .rt{font-weight:700; font-size:13px; line-height:1.25;} .reuse .rd{font-size:10.5px; color:var(--gray); margin-top:1px;}
  .reuse .rs{font-size:10px; color:var(--good); font-weight:700; margin-top:1px;}
  .reuse .starbtn{font-size:15px;} .reuse .btn.sm{padding:7px 12px; font-size:12px;}

  .pophint{position:absolute; bottom:88px; left:14px; right:14px; z-index:55; background:var(--brown);
    color:#fff; border-radius:16px; padding:13px 15px; font-size:12.5px; box-shadow:var(--shadow);
    display:flex; gap:10px; align-items:center; opacity:0; transform:translateY(10px); transition:.3s; pointer-events:none;}
  .pophint.show{opacity:1; transform:translateY(0);}

  /* side legend */
  .legend{width:300px; max-width:100%;}
  .legend h3{font-family:'Fraunces',serif; color:var(--brown); font-size:20px; margin:0 0 4px;}
  .legend .sub{font-size:13px; color:var(--gray); margin-bottom:16px;}
  .legend .step{display:flex; gap:12px; padding:11px 0; border-bottom:1px solid var(--line);}
  .legend .num{width:26px;height:26px;border-radius:50%; background:var(--brown); color:#fff;
    font-size:12px; font-weight:700; display:flex;align-items:center;justify-content:center; flex-shrink:0;}
  .legend .st{font-weight:700; font-size:13.5px; color:var(--ink);}
  .legend .sd{font-size:12px; color:var(--gray); margin-top:2px; line-height:1.45;}
  .legend .reset{margin-top:18px;}
  @media(max-width:760px){ .legend{order:-1;} }

  /* ============================ ADMIN MODE ============================ */
  #adminroot{display:none;}
  #ppwrap.admin{display:block; max-width:none; padding:0; gap:0; background:#F5F1EA;}
  #ppwrap.admin .phone, #ppwrap.admin .legend{display:none;}
  #ppwrap.admin #adminroot{display:block; min-height:100vh; background:#F5F1EA;}
  html:has(#ppwrap.admin){background:#F5F1EA;}

  /* ===== ADMIN LAYOUT ===== */
  .admshell{display:flex; min-height:100vh; font-family:'Plus Jakarta Sans','Noto Sans KR','Apple SD Gothic Neo',sans-serif; color:var(--ink);}
  .admnav{width:240px; flex-shrink:0; background:var(--brown); color:#fff; padding:20px 14px;
    display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;}
  .admlogo{display:flex; align-items:center; gap:10px; padding:0 6px 18px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,.12);}
  .admlogo img{width:36px; height:auto; filter:brightness(2);}
  .al-t{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}
  .al-s{font-size:10.5px; opacity:.7; letter-spacing:1px; text-transform:uppercase;}
  .admnavbtn{display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px;
    background:transparent; color:#E8DBC8; font-size:14px; font-weight:500; text-align:left; transition:.15s;}
  .admnavbtn:hover{background:rgba(255,255,255,.08);}
  .admnavbtn.on{background:rgba(255,255,255,.14); color:#fff; font-weight:700;}
  .admnavbtn .ai{font-size:18px; width:22px;}
  .admnavbtn .al{flex:1;}
  .admnavbtn .badge{background:#E33; color:#fff; font-size:10px; font-weight:700; padding:2px 8px; border-radius:30px;}
  .admnavbtn .cnt{background:rgba(255,255,255,.18); font-size:11px; font-weight:700; padding:2px 8px; border-radius:30px;}
  .admbot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.12);}
  .admme{display:flex; align-items:center; gap:10px; padding:11px 8px; margin-top:6px;}
  .admme .ava{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;}
  .admme .mn{font-size:13px; font-weight:700; color:#fff;}
  .admme .mr{font-size:11px; opacity:.7;}
  .admmain{flex:1; padding:24px 28px 40px; max-width:none; overflow-x:auto;}

  /* head */
  .admhead{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; gap:10px; flex-wrap:wrap;}
  .ah-t{font-family:'Fraunces',serif; font-weight:600; font-size:26px; color:var(--brown); line-height:1.1;}
  .ah-s{font-size:12.5px; color:var(--gray); margin-top:4px;}
  .ah-cta{background:var(--brown); color:#fff; padding:9px 16px; border-radius:10px; font-size:13px; font-weight:700;}
  .ah-cta.ghost{background:#fff; color:var(--brown); border:1.5px solid var(--line);}

  /* KPI */
  .kpi4{display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:18px;}
  .kpi{background:#fff; border-radius:14px; padding:16px 18px; border:1px solid var(--line);}
  .kpi .kl{font-size:12px; color:var(--gray); font-weight:600;}
  .kpi .kv{font-family:'Fraunces',serif; font-weight:600; font-size:28px; color:var(--brown); margin-top:3px;}
  .kpi .kv span{font-size:13px; color:var(--gray); font-weight:400; margin-left:5px;}
  .kpi .ks{font-size:11px; color:var(--mocha); margin-top:6px; line-height:1.45;}
  .kpi.kpi-warn{background:linear-gradient(135deg,#FFF8EC,#FBF2DE); border-color:#F0DDBE;}
  .kpi.kpi-warn .kv{color:var(--brown);}
  .kpi.kpi-good{background:linear-gradient(135deg,#EEF7EF,#E4F0E4); border-color:#C8E3CC;}
  .kpi.kpi-good .kv{color:#2A6D38;}
  .kpi.kpi-info{background:linear-gradient(135deg,#F0EEFA,#E7E3F5); border-color:#CFCAE5;}
  .kpi.kpi-info .kv{color:#4A2F8A;}

  /* admin section label */
  .adm-section-label{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:var(--brown); margin:6px 0 11px; padding-left:2px;}
  .adm-section-sub{font-family:'Plus Jakarta Sans','Noto Sans KR',sans-serif; font-size:12px; color:var(--gray); font-weight:500;}

  /* funnel chart */
  .funnel{display:flex; flex-direction:column; gap:10px;}
  .fn-row{display:grid; grid-template-columns:130px 1fr; gap:11px; align-items:center; font-size:12.5px;}
  .fn-l{color:var(--mocha); font-weight:600;}
  .fn-bar{position:relative; background:#F3ECDF; border-radius:8px; height:24px; overflow:hidden;}
  .fn-fill{position:absolute; top:0; left:0; height:100%; border-radius:8px; transition:width .5s;}
  .fn-v{position:absolute; right:9px; top:50%; transform:translateY(-50%); font-size:11.5px; font-weight:700; color:var(--brown); z-index:2;}
  .fn-warn .fn-l{color:#C44;}

  /* dormant cards */
  .dorm-card{display:grid; grid-template-columns:1fr auto auto; gap:13px; align-items:center; padding:13px 14px; border-radius:11px; margin-bottom:8px;}
  .dorm-card.dorm-warn{background:#FFF1DE; border:1px solid #F0DDBE;}
  .dorm-card.dorm-danger{background:#FBE7E7; border:1px solid #F0C8C8;}
  .dorm-l .dorm-h{font-weight:700; font-size:13.5px; color:var(--brown);}
  .dorm-l .dorm-s{font-size:11.5px; color:var(--mocha); margin-top:2px;}
  .dorm-n{font-family:'Fraunces',serif; font-weight:600; font-size:22px; color:var(--brown);}
  .dorm-cta{background:var(--brown); color:#fff; font-size:11.5px; font-weight:700; padding:7px 12px; border-radius:9px; border:none; cursor:pointer; white-space:nowrap;}
  .dorm-cta:hover{background:var(--brown2);}

  /* nationality + service rows */
  .natrow, .svcrow{display:grid; grid-template-columns:1fr 90px; column-gap:11px; row-gap:4px; padding:9px 0; align-items:center; border-bottom:1px dashed var(--line);}
  .natrow:last-of-type, .svcrow:last-of-type{border-bottom:none;}
  .nat-h, .svc-h{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; grid-column:1 / -1;}
  .nat-l, .svc-l{font-weight:600; color:var(--ink);}
  .nat-c, .svc-c{font-size:11.5px; color:var(--gray); font-weight:600;}
  .nat-bar, .svc-bar{grid-column:1 / 2; background:#F3ECDF; border-radius:6px; height:9px; overflow:hidden; position:relative;}
  .nat-fill, .svc-fill{height:100%; border-radius:6px; transition:width .5s;}
  .nat-rev, .svc-rev{grid-column:2 / 3; font-family:'Fraunces',serif; font-weight:600; font-size:13.5px; color:var(--brown); text-align:right;}

  /* Option B — 월간 매출 트렌드 (12개월 막대) */
  .trendChart{display:flex; align-items:flex-end; gap:5px; height:108px; padding:8px 4px 4px; border-bottom:1px solid var(--line); position:relative;}
  .trendBar{flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:default; position:relative;}
  .trendBar .tb-val{font-size:9.5px; color:var(--gray); font-family:'Fraunces',serif; font-weight:600; white-space:nowrap;}
  .trendBar .tb-fill{width:100%; background:linear-gradient(180deg, var(--accent), var(--brown)); border-radius:4px 4px 0 0; transition:opacity .2s;}
  .trendBar:hover .tb-fill{opacity:.85;}
  .trendBar .tb-label{font-size:9.5px; color:var(--mocha); font-weight:600; margin-top:5px;}
  .trendStats{display:flex; justify-content:space-around; gap:10px; padding:12px 4px 0; font-size:11.5px;}
  .trendStats .ts-cell{flex:1; text-align:center;}
  .trendStats .ts-l{color:var(--gray); display:block; margin-bottom:3px; font-size:10.5px;}
  .trendStats .ts-v{color:var(--brown); font-weight:700; font-family:'Fraunces',serif; font-size:15px;}
  .trendStats .ts-v.up{color:var(--good);}
  .trendStats .ts-v.down{color:#C44;}

  /* Option B — 신규 vs 이탈 (이중 막대) */
  .signupChart{display:flex; align-items:flex-end; gap:9px; height:110px; padding:8px 4px 4px; border-bottom:1px solid var(--line);}
  .signupBar{flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .signupBar .sb-pair{display:flex; gap:2px; width:100%; height:90px; align-items:flex-end; justify-content:center;}
  .signupBar .sb-new{flex:1; background:var(--good); border-radius:3px 3px 0 0; transition:opacity .2s;}
  .signupBar .sb-churn{flex:1; background:#D88; border-radius:3px 3px 0 0; transition:opacity .2s;}
  .signupBar .sb-label{font-size:9.5px; color:var(--mocha); font-weight:600;}
  .signupLegend{display:flex; justify-content:center; gap:18px; padding:10px 0 4px; font-size:11.5px; color:var(--mocha);}
  .signupLegend i{display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:middle; margin-right:5px;}
  .signupLegend i.new{background:var(--good);}
  .signupLegend i.churn{background:#D88;}

  /* Option B — 패키지 소진율 막대 (5단계 stacked) */
  .pkgRow{padding:10px 0; border-bottom:1px dashed var(--line);}
  .pkgRow:last-of-type{border-bottom:none;}
  .pkgRow .pr-h{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;}
  .pkgRow .pr-l{font-size:12.5px; font-weight:600; color:var(--ink);}
  .pkgRow .pr-c{font-size:11.5px; color:var(--gray); font-weight:600;}
  .pkgRow .pr-bar{display:flex; height:18px; border-radius:6px; overflow:hidden; background:#F3ECDF;}
  .pkgRow .pr-seg{display:flex; align-items:center; justify-content:center; font-size:9.5px; color:#fff; font-weight:700; transition:opacity .2s;}
  .pkgRow .pr-seg:hover{opacity:.85;}
  .pkgRow .pr-seg.s-full{background:#3F8D52;}
  .pkgRow .pr-seg.s-most{background:#6BA85C;}
  .pkgRow .pr-seg.s-mid{background:#C9A45A;}
  .pkgRow .pr-seg.s-low{background:#D88;}
  .pkgRow .pr-seg.s-empty{background:#A44;}
  .pkgLegend{display:flex; flex-wrap:wrap; gap:9px 16px; padding-top:10px; font-size:11px; color:var(--mocha);}
  .pkgLegend i{display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin-right:5px;}

  /* Option C — 회원 디테일 필터 + 내보내기 */
  .md-filter-section{margin:14px 0 6px; padding:12px 14px; background:var(--cream2); border-radius:11px;}
  .md-filter-h{font-size:11.5px; font-weight:700; color:var(--brown); margin-bottom:7px; display:flex; align-items:center; justify-content:space-between;}
  .md-filter-row{display:flex; flex-wrap:wrap; gap:6px;}
  .md-filter-chip{padding:6px 11px; border-radius:18px; background:#fff; border:1.5px solid var(--line); font-size:12px; font-weight:600; color:var(--mocha); cursor:pointer; transition:all .15s;}
  .md-filter-chip:hover{border-color:var(--accent); color:var(--brown);}
  .md-filter-chip.on{background:var(--brown); color:#fff; border-color:var(--brown);}
  .md-filter-status{font-size:11.5px; color:var(--gray); margin-top:8px; padding-left:2px;}
  .md-export{display:flex; flex-direction:column; gap:8px; margin:14px 0 6px; padding:12px 14px; background:#FBF6EB; border-radius:11px; border:1px dashed #E0CFA8;}
  .md-export-h{font-size:11.5px; font-weight:700; color:var(--brown); margin-bottom:2px;}
  .md-export-row{display:flex; gap:8px; flex-wrap:wrap;}
  .md-export-btn{flex:1; min-width:130px; padding:9px 12px; background:#fff; border:1.5px solid var(--line); border-radius:9px; font-size:12px; font-weight:600; color:var(--ink); cursor:pointer; transition:all .15s;}
  .md-export-btn:hover{border-color:var(--accent); color:var(--brown); background:#FFF8EB;}
  .md-export-note{font-size:10.5px; color:var(--gray); line-height:1.5; margin-top:2px;}

  /* 360도 뷰 — 펫 프로필 / 운영 메모 / 요약 / 추천 액션 */
  .m360-section{margin:14px 0 6px;}
  .m360-h{font-size:12.5px; font-weight:700; color:var(--brown); margin-bottom:8px; padding-left:2px;}
  .m360-pet{display:flex; gap:11px; align-items:flex-start; padding:11px 13px; background:#fff; border:1.5px solid var(--line); border-radius:11px; margin-bottom:8px;}
  .m360-pet-ic{width:38px; height:38px; border-radius:10px; background:var(--cream2); display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
  .m360-pet-tx{flex:1; min-width:0;}
  .m360-pet-nm{font-weight:700; color:var(--ink); font-size:13.5px;}
  .m360-pet-meta{font-size:11.5px; color:var(--gray); margin-top:1px;}
  .m360-pet-traits{font-size:11.5px; color:var(--mocha); margin-top:5px; line-height:1.45; background:var(--cream2); border-radius:7px; padding:5px 8px;}
  .m360-vac{font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; align-self:flex-start;}
  .m360-vac.ok{background:#E4F0E4; color:#3F8D52;}
  .m360-vac.partial{background:#FBEFD9; color:#B8841F;}
  .m360-vac.no{background:#F6E1DE; color:#C0493A;}
  .m360-note{background:#FBF6EB; border:1px dashed #E0CFA8; border-radius:11px; padding:11px 13px; font-size:12px; color:var(--mocha); line-height:1.5;}
  .m360-stats{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .m360-stat{background:#fff; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px;}
  .m360-stat-l{font-size:10.5px; color:var(--gray); margin-bottom:3px;}
  .m360-stat-v{font-size:15px; font-weight:700; font-family:'Fraunces',serif; color:var(--brown);}
  .m360-actions{display:flex; flex-direction:column; gap:6px;}
  .m360-action{font-size:12px; color:var(--mocha); line-height:1.5; background:#fff; border:1.5px solid var(--line); border-left:3px solid var(--accent); border-radius:9px; padding:9px 12px;}
  .pkgRow:last-of-type{border-bottom:none;}
  .pkgRow .pr-h{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;}
  .pkgRow .pr-l{font-size:12.5px; font-weight:600; color:var(--ink);}
  .pkgRow .pr-c{font-size:11.5px; color:var(--gray); font-weight:600;}
  .pkgRow .pr-bar{display:flex; height:18px; border-radius:6px; overflow:hidden; background:#F3ECDF;}
  .pkgRow .pr-seg{display:flex; align-items:center; justify-content:center; font-size:9.5px; color:#fff; font-weight:700; transition:opacity .2s;}
  .pkgRow .pr-seg:hover{opacity:.85;}
  .pkgRow .pr-seg.s-full{background:#3F8D52;}
  .pkgRow .pr-seg.s-most{background:#6BA85C;}
  .pkgRow .pr-seg.s-mid{background:#C9A45A;}
  .pkgRow .pr-seg.s-low{background:#D88;}
  .pkgRow .pr-seg.s-empty{background:#A44;}
  .pkgLegend{display:flex; flex-wrap:wrap; gap:9px 16px; padding-top:10px; font-size:11px; color:var(--mocha);}
  .pkgLegend i{display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin-right:5px;}

  /* member row clickable hover */
  .m-row{cursor:pointer; transition:background .15s;}
  .m-row:hover{background:#FBF6EB !important;}

  /* 관리자 — 백신 알림 카드 */
  .vaccine-alert{background:#FBF1E3 !important;border-color:#F0DDBE !important;margin-bottom:16px;padding:14px 18px 16px;}
  .vaccine-alert-ok{background:#EEF7EF !important;border-color:#C8E3CC !important;margin-bottom:16px;padding:14px 18px;}
  .va-h{display:flex;align-items:center;gap:11px;}
  .va-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
  .va-ic.warn{background:var(--warn);color:#fff;}
  .va-ic.ok{background:var(--good);color:#fff;}
  .va-tx{flex:1;min-width:0;}
  .va-tx b{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--brown);display:block;}
  .va-tx span{font-size:12px;color:var(--mocha);display:block;margin-top:2px;line-height:1.45;}
  .va-list{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .va-row{display:grid;grid-template-columns:54px 1fr auto auto;gap:11px;align-items:center;background:#fff;border:1px solid #F0DDBE;border-radius:11px;padding:10px 13px;}
  .va-time{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--brown);}
  .va-pet b{font-weight:700;font-size:13px;color:var(--ink);}
  .va-pet i{font-style:normal;font-size:11.5px;color:var(--gray);margin-left:5px;}
  .va-detail{font-size:11px;color:var(--warn);margin-top:3px;font-weight:600;}
  .va-vac{flex-shrink:0;}
  .va-acts{display:flex;gap:5px;flex-shrink:0;}
  .va-btn{padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:11.5px;font-weight:700;color:var(--brown);cursor:pointer;white-space:nowrap;transition:.15s;}
  .va-btn:hover{background:var(--cream2);}
  .va-btn.primary{background:var(--brown);color:#fff;border-color:var(--brown);}
  .va-btn.primary:hover{background:var(--brown2);}

  /* 휴면 캠페인 시트 */
  .dcamp-summary{background:var(--cream2);border-radius:13px;padding:13px 16px;margin-bottom:14px;}
  .dcs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;color:var(--mocha);}
  .dcs-row + .dcs-row{border-top:1px dashed var(--line);}

  .dcamp-field{margin-bottom:14px;}
  .dcamp-field > label{display:block;font-size:12.5px;font-weight:600;color:var(--mocha);margin-bottom:7px;}
  .dcamp-field textarea:focus{border-color:var(--brown);outline:none;background:#fff;}

  /* toggle switch */
  .toggle{display:inline-flex;align-items:center;width:42px;height:24px;background:#D9D2C5;border-radius:30px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
  .toggle.on{background:var(--brown);}
  .toggle i{position:absolute;left:2px;top:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on i{transform:translateX(18px);}

  /* 발송 대상 미리보기 리스트 */
  .dcamp-target-list{display:flex;flex-direction:column;gap:5px;background:#FBF8F2;border-radius:11px;padding:6px;}
  .dcamp-target{display:grid;grid-template-columns:24px 1fr auto auto;gap:10px;align-items:center;padding:8px 10px;background:#fff;border-radius:8px;font-size:12px;}
  .dcamp-target.more{justify-content:center;font-size:11.5px;color:var(--gray);font-style:italic;background:none;padding:6px;display:block;text-align:center;}
  .dt-nm{font-weight:700;color:var(--brown);}
  .dt-pet{color:var(--mocha);font-size:11.5px;}
  .dt-last{font-size:11px;color:var(--gray);}

  /* 미리보기 카드 */
  .dcamp-preview-card{background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;}
  .dcp-h{display:flex;align-items:center;gap:11px;padding:13px 15px;background:#FBF8F2;border-bottom:1px solid var(--line);}
  .dcp-h-tx{flex:1;min-width:0;}
  .dcp-h-tx b{display:block;font-weight:700;font-size:13.5px;color:var(--brown);}
  .dcp-h-tx span{font-size:11.5px;color:var(--gray);}
  .dcp-body{padding:14px 16px;font-size:13px;line-height:1.65;color:var(--ink);white-space:pre-wrap;}
  .dcp-coupon{background:linear-gradient(135deg,#FBF2E4,#F6E8D4);border-top:1.5px dashed var(--accent);padding:11px 16px;font-size:12.5px;color:var(--brown);}
  .dcp-coupon b{color:var(--accentDk);font-family:'Fraunces',serif;}

  /* 발송 완료 통계 */
  .dcamp-sent-stats{background:var(--cream2);border-radius:13px;padding:14px 18px;margin-top:14px;}
  .dss-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;}
  .dss-row + .dss-row{border-top:1px dashed var(--line);}
  .dss-l{font-size:12.5px;color:var(--mocha);}
  .dss-v{font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:var(--brown);}
  .dss-v span{font-size:13px;color:var(--gray);font-weight:400;margin-left:4px;}

  /* member detail sheet */
  .md-head{padding:4px 4px 14px; border-bottom:1.5px solid var(--line); margin-bottom:14px;}
  .md-name{font-family:'Fraunces',serif; font-weight:600; font-size:24px; color:var(--brown); line-height:1.1;}
  .md-meta{font-size:12.5px; color:var(--mocha); margin-top:6px; display:flex; align-items:center; flex-wrap:wrap; gap:4px;}
  .md-pets{font-size:12px; color:var(--gray); margin-top:5px;}

  .md-balance{background:var(--cream2); border-radius:13px; padding:14px 16px; margin-bottom:16px;}
  .md-bal-h{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px;}
  .md-bal-h > span:first-child{font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--brown);}
  .md-bal-h em{font-style:normal; font-size:11px; color:var(--gray); font-weight:400; margin-left:3px;}
  .md-bal-bar{height:11px; background:#fff; border-radius:6px; display:flex; overflow:hidden; border:1px solid var(--line);}
  .md-bal-used{background:var(--mocha); height:100%; transition:width .5s;}
  .md-bal-rem{background:var(--good); height:100%; transition:width .5s;}
  .md-bal-legend{display:flex; justify-content:space-between; margin-top:7px; font-size:11px; color:var(--mocha);}
  .md-bal-legend span{display:inline-flex; align-items:center; gap:5px;}
  .md-bal-legend i{display:inline-block; width:9px; height:9px; border-radius:3px;}

  .md-svc-section, .md-tl-section{margin-bottom:16px;}
  .md-section-h{font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:var(--brown); padding:0 2px 9px;}

  .md-svc-row{display:grid; grid-template-columns:120px 1fr 110px; gap:10px; align-items:center; padding:8px 4px; border-bottom:1px dashed var(--line); font-size:12.5px;}
  .md-svc-row:last-child{border-bottom:none;}
  .md-svc-l{display:flex; align-items:center; gap:7px;}
  .md-svc-ic{width:26px; height:26px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0;}
  .md-svc-n{font-weight:600; color:var(--ink);}
  .md-svc-c{font-size:11px; color:var(--gray); margin-left:auto;}
  .md-svc-bar{background:#F3ECDF; border-radius:6px; height:8px; overflow:hidden;}
  .md-svc-fill{height:100%; border-radius:6px; transition:width .5s;}
  .md-svc-t{font-family:'Fraunces',serif; font-weight:600; font-size:13px; color:var(--brown); text-align:right;}
  .md-svc-t em{font-style:normal; font-size:10.5px; color:var(--gray); font-weight:400; margin-left:2px;}

  /* timeline */
  .md-tl{position:relative; padding-left:0;}
  .md-tl-row{display:grid; grid-template-columns:46px 24px 1fr; column-gap:8px; padding-bottom:10px; position:relative;}
  .md-tl-row:not(:last-child)::before{content:''; position:absolute; left:57px; top:30px; bottom:-4px; width:2px; background:#E8DFCC;}
  .md-tl-date{padding-top:11px; text-align:right;}
  .md-tl-d{font-family:'Fraunces',serif; font-weight:600; font-size:12.5px; color:var(--brown); line-height:1;}
  .md-tl-y{font-size:9.5px; color:var(--gray); margin-top:2px;}
  .md-tl-dot{width:12px; height:12px; border-radius:50%; background:var(--mocha); margin-top:13px; justify-self:center; border:2px solid #fff; box-shadow:0 0 0 2px #E8DFCC; z-index:1;}
  .md-tl-dot.charge{background:var(--good); box-shadow:0 0 0 2px #C8E3CC;}
  .md-tl-card{background:#fff; border:1px solid var(--line); border-radius:11px; padding:10px 12px; font-size:12.5px;}
  .md-tl-card.charge{background:linear-gradient(135deg,#EEF7EF,#E4F0E4); border-color:#C8E3CC;}
  .md-tl-row1{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .md-tl-ic{width:22px; height:22px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; flex-shrink:0;}
  .md-tl-ic.charge{background:#C8E3CC; color:#2A6D38;}
  .md-tl-label{font-weight:700; color:var(--ink); flex:1; min-width:0;}
  .md-tl-note{font-size:10.5px; background:var(--accent); color:#fff; padding:2px 7px; border-radius:30px; font-weight:700;}
  .md-tl-sub{font-size:11.5px; color:var(--mocha); margin-top:3px;}
  .md-tl-amt-row{display:flex; justify-content:space-between; align-items:center; margin-top:7px; padding-top:7px; border-top:1px dashed var(--line);}
  .md-tl-amt{font-family:'Fraunces',serif; font-weight:600; font-size:14px;}
  .md-tl-amt.plus{color:#2A6D38;}
  .md-tl-amt.minus{color:var(--brown);}
  .md-tl-bal{font-size:11px; color:var(--gray);}

  /* admin card */
  .admcard{background:#fff; border-radius:14px; padding:0; border:1px solid var(--line); margin-bottom:16px; overflow:hidden;}
  .cardh{padding:15px 18px 8px; font-weight:700; font-size:14.5px; color:var(--brown); border-bottom:1px solid var(--line);}
  .empty{padding:30px; text-align:center; color:var(--gray); font-size:13px;}
  .g2{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px;}

  /* booking row (간이) */
  .bkrow{display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid var(--line); font-size:13px;}
  .bkrow:last-child{border-bottom:none;}
  .bk-time{font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--brown); width:54px; flex-shrink:0;}
  .bk-pet, .bk-svc{display:flex; flex-direction:column; flex:1;}
  .bk-pet b, .bk-svc b{font-weight:700; font-size:13.5px; color:var(--ink);}
  .bk-pet i, .bk-svc i{font-style:normal; font-size:11.5px; color:var(--gray); margin-top:1px;}
  .bk-st{font-size:11px; font-weight:700; padding:4px 10px; border-radius:30px; white-space:nowrap;}
  .bk-cam{background:var(--cream2); color:var(--brown); font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:9px; border:1px solid var(--line);}
  .bk-cam:hover{background:var(--cream); border-color:var(--mochaSoft);}
  .bk-cam.ph{visibility:hidden; width:1px;}

  /* booking table */
  .bktable{display:flex; flex-direction:column; font-size:13px;}
  .bk-hd, .bk-tr{display:grid; grid-template-columns:60px 1.4fr 1.4fr 1fr 90px 110px; gap:12px; padding:11px 18px; align-items:center;}
  .mtable .bk-hd, .mtable .bk-tr{grid-template-columns:1.3fr 1fr 90px 1.1fr 1.1fr 80px 60px;}
  .bk-hd{background:#FAF6EF; font-size:11.5px; font-weight:700; color:var(--mocha); text-transform:uppercase; letter-spacing:.5px;}
  .bk-tr{border-bottom:1px solid var(--line);}
  .bk-tr:last-child{border-bottom:none;}
  .bk-tr:hover{background:#FBF8F2;}
  .bk-pr{font-weight:700; color:var(--brown);}
  .bk-pr em{font-style:normal; font-size:10.5px; color:var(--gray); font-weight:400;}
  .bk-act{display:flex; gap:5px; align-items:center;}
  .tag.pk{background:#E4F0E4; color:#3F8D52; font-size:11px; font-weight:700; padding:3px 7px; border-radius:8px;}
  .m-w{display:flex; flex-direction:column; gap:2px; min-width:0;}
  .m-w b{font-weight:700; line-height:1.3; display:block;} .m-w i{font-style:normal; font-size:11px; color:var(--gray); line-height:1.3; display:block;}
  .m-tier{background:var(--brown); color:#fff; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:30px;}
  .m-bal{font-weight:700; color:#3F8D52;} .m-used{color:var(--mocha);}
  .m-bal em, .m-used em{font-style:normal; font-size:10.5px; color:var(--gray); font-weight:400; margin-left:3px;}

  /* filter chips */
  .filters{display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap;}
  .fchip{padding:7px 13px; border-radius:30px; background:#fff; border:1px solid var(--line); font-size:12.5px; font-weight:600; color:var(--mocha);}
  .fchip.on{background:var(--brown); color:#fff; border-color:var(--brown);}

  /* timeline */
  .timeline{padding:6px 14px 14px;}
  .tl-row{display:flex; align-items:center; gap:14px; padding:5px 0; cursor:pointer;}
  .tl-time{font-family:'Fraunces',serif; font-weight:600; color:var(--brown); width:54px; flex-shrink:0;}
  .tl-bar{flex:1; padding:9px 13px; border-radius:9px; font-size:13px;}
  .tl-bar .pk, .tl-bar .lv{font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:30px; margin-left:7px;}
  .tl-bar .pk{background:#E4F0E4; color:#3F8D52;}
  .tl-bar .lv{background:#FBE7E7; color:#E33; display:inline-flex; align-items:center; gap:4px;}
  .tl-bar .lv i{width:6px;height:6px;border-radius:50%;background:#E33;animation:pulse 1.6s infinite;}

  /* chat */
  .chatprev{display:flex; align-items:flex-start; gap:11px; padding:11px 14px; border-bottom:1px solid var(--line); cursor:pointer; transition:.15s;}
  .chatprev:hover{background:#FBF8F2;} .chatprev.on{background:#F5EBDF;}
  .ch-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .ch-ic.kakao{background:#FEE500;color:#3C1E1E;} .ch-ic.zalo{background:#0068FF;color:#fff;}
  .ch-tx{flex:1; min-width:0;}
  .ch-h{display:flex; align-items:center; gap:7px;}
  .ch-h b{font-size:13.5px; font-weight:700;} .ch-pet{font-size:11.5px; color:var(--gray);}
  .ch-u{background:#E33;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:30px;margin-left:auto;}
  .ch-m{font-size:12px; color:var(--gray); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ch-at{font-size:11px; color:var(--gray); flex-shrink:0;}

  .chatlay{display:grid; grid-template-columns:320px 1fr; gap:14px; height:calc(100vh - 160px); min-height:520px;}
  .chatlist{padding:0; overflow-y:auto;}
  .chatwin{padding:0; display:flex; flex-direction:column;}
  .cw-head{display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--line);}
  .cw-name{font-weight:700; font-size:15px; color:var(--brown);}
  .cw-meta{font-size:11px; color:var(--gray);}
  .cw-body{flex:1; overflow-y:auto; padding:18px; background:#F9F5EE; display:flex; flex-direction:column; gap:9px;}
  .msg{display:flex; flex-direction:column; max-width:65%;}
  .msg.cust{align-self:flex-start;} .msg.staff{align-self:flex-end; align-items:flex-end;}
  .msg .bub{padding:9px 13px; border-radius:14px; font-size:13.5px; line-height:1.5;}
  .msg.cust .bub{background:#fff; color:var(--ink); border:1px solid var(--line);}
  .msg.staff .bub{background:var(--brown); color:#fff;}
  .msg .t{font-size:10.5px; color:var(--gray); margin-top:3px;}
  .cw-input{display:flex; gap:10px; padding:14px 18px; border-top:1px solid var(--line); background:#fff;}
  .cw-input input{flex:1; padding:10px 14px; border:1.5px solid var(--line); border-radius:11px; font-size:13.5px;}
  .cw-send{background:var(--brown); color:#fff; padding:10px 20px; border-radius:11px; font-weight:700; font-size:13px;}

  /* cam grid */
  .camgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .camtile{background:#fff; border-radius:13px; overflow:hidden; border:1px solid var(--line);}
  .ct-screen{position:relative; aspect-ratio:16/10; background:linear-gradient(135deg,#2a2520,#4a3d30); display:flex; align-items:center; justify-content:center;}
  .camtile:not(.on) .ct-screen{background:#2c2620;}
  .ct-screen .livedot{position:absolute; top:11px; left:11px; width:9px;height:9px;border-radius:50%;background:#E33;animation:pulse 1.6s infinite;}
  .ct-live{position:absolute; top:9px; left:24px; background:rgba(227,51,51,.92);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:30px;}
  .ct-off{background:rgba(255,255,255,.1); color:#888; font-size:11px; font-weight:600; padding:5px 11px; border-radius:30px;}
  .ct-pet{font-size:42px; filter:drop-shadow(0 3px 10px rgba(0,0,0,.3));}
  .ct-meta{display:flex; justify-content:space-between; align-items:center; padding:11px 14px; font-size:12.5px;}
  .ct-meta b{font-weight:700; color:var(--brown);} .ct-meta i{font-style:normal; font-size:11px; color:var(--gray); margin-top:2px; display:block;}

  /* admin responsive */
  @media(max-width:900px){
    .admshell{flex-direction:column;}
    .admnav{width:100%; height:auto; position:relative; flex-direction:row; padding:10px 12px; overflow-x:auto; gap:6px;}
    .admnav .admlogo{display:none;}
    .admnav .admbot{display:none;}
    .admnavbtn{flex-shrink:0; padding:8px 12px; font-size:12.5px;}
    .admnavbtn .al{display:none;} .admnavbtn .ai{font-size:18px;}
    .admnavbtn.on .al{display:inline;}
    .admmain{padding:18px 14px 30px;}
    .kpi4{grid-template-columns:1fr 1fr;}
    .g2{grid-template-columns:1fr;}
    .bk-hd, .bk-tr{grid-template-columns:1fr 1fr; gap:6px;}
    .bk-hd{display:none;}
    .bk-tr{padding:12px 14px; border-bottom:1px solid var(--line);}
    .mtable .bk-hd, .mtable .bk-tr{grid-template-columns:1fr 1fr; gap:6px;}
    .chatlay{grid-template-columns:1fr; height:auto;}
    .camgrid{grid-template-columns:1fr 1fr;}
    .fn-row{grid-template-columns:110px 1fr; gap:8px;}
    .fn-l{font-size:11.5px;}
    .fn-v{font-size:10.5px;}
    .dorm-card{grid-template-columns:1fr auto; gap:8px;}
    .dorm-card .dorm-cta{grid-column:1 / -1; width:100%;}
    .natrow, .svcrow{grid-template-columns:1fr 80px;}
    .adm-section-label{font-size:15px;}
    .md-svc-row{grid-template-columns:100px 1fr 90px; gap:7px;}
    .md-svc-n{font-size:11.5px;}
    .md-name{font-size:21px;}
    .va-row{grid-template-columns:46px 1fr; gap:8px;}
    .va-vac{grid-column:1 / -1; margin-top:2px;}
    .va-acts{grid-column:1 / -1; margin-top:2px;}
    .va-btn{flex:1;}
    .dcamp-target{grid-template-columns:24px 1fr auto; gap:6px;}
    .dcamp-target .dt-last{display:none;}
  }

  /* ---- tour (둘러보기) ---- */
  .tourhead{padding:18px 18px 6px;}
  .tourwrap{display:flex; gap:10px; padding:6px 12px 4px;}
  .floorcol{display:flex; flex-direction:column; gap:8px; flex-shrink:0; width:62px;}
  .floorbtn{border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:10px 4px;
    display:flex; flex-direction:column; align-items:center; gap:3px; transition:.15s; cursor:pointer;}
  .floorbtn .fnum{font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--brown);}
  .floorbtn .ftag{font-size:8.5px; color:var(--gray); text-align:center; line-height:1.1; font-weight:600;}
  .floorbtn.on{background:var(--brown); border-color:var(--brown);}
  .floorbtn.on .fnum{color:#fff;} .floorbtn.on .ftag{color:#E2C9AE;}
  .floorbtn:active{transform:scale(.96);}
  .floormain{flex:1; min-width:0;}
  .floorlabel{padding:2px 4px 10px;}
  .floorlabel .flname{font-weight:700; font-size:15px; color:var(--brown);}
  .floorlabel .fldesc{font-size:11.5px; color:var(--gray); margin-top:2px; line-height:1.4;}
  .spotrail{display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory;
    padding-bottom:8px; margin:0 -4px; padding-left:4px; padding-right:4px;}
  .spotrail::-webkit-scrollbar{height:0;}
  .spot{flex:0 0 86%; scroll-snap-align:center; height:300px; border-radius:22px; position:relative;
    overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; padding:18px;
    color:#fff; box-shadow:var(--shadowSm);}
  .spotgrain{position:absolute; inset:0; opacity:.16; mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.6) .6px, transparent .7px); background-size:5px 5px;}
  .spottop{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:2;}
  .spotemoji{font-size:34px; filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
  .spotno{font-size:11px; font-weight:700; background:rgba(255,255,255,.2); padding:5px 11px;
    border-radius:30px; backdrop-filter:blur(4px);}
  .spotbody{position:relative; z-index:2; margin-top:auto; margin-bottom:14px;}
  .spottitle{font-family:'Fraunces',serif; font-weight:600; font-size:25px; line-height:1.1;
    text-shadow:0 2px 12px rgba(0,0,0,.35);}
  .spotsub{font-size:13px; opacity:.92; margin-top:6px; text-shadow:0 1px 8px rgba(0,0,0,.35);}
  .spotcta{position:relative; z-index:2; align-self:flex-start; background:rgba(255,255,255,.95);
    color:var(--brown); font-weight:700; font-size:14px; padding:11px 18px; border-radius:13px;
    display:inline-flex; align-items:center; gap:8px;}
  .spotcta span{transition:.2s;} .spotcta:hover span{transform:translateX(3px);}
  .spotcta.alt{background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.4);
    backdrop-filter:blur(4px); padding:11px 16px;}
  .spotctaPair{position:relative; z-index:2; display:flex; gap:8px; flex-wrap:wrap;}
  .spotinfo{position:relative; z-index:2; align-self:flex-start; background:rgba(255,255,255,.18);
    color:#fff; font-weight:600; font-size:12px; padding:8px 14px; border-radius:11px;
    backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,.25);}
  .spotbadge{position:absolute; top:14px; right:14px; z-index:3; display:flex; align-items:center; gap:5px;
    background:rgba(227,51,51,.92); color:#fff; padding:5px 10px; border-radius:30px;
    font-size:10.5px; font-weight:700; letter-spacing:.6px;}
  .spotbadge .livedot{width:6px;height:6px;}
  .livecamspot .spotno{display:none;}
  .raildots{display:flex; justify-content:center; gap:7px; padding:10px 0 2px;}
  .rdot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:.2s;}
  .rdot.on{background:var(--accent); width:20px; border-radius:6px;}

  /* ---- service picker sheet ---- */
  .svcpick{display:flex; align-items:center; gap:13px; width:100%; padding:13px; margin-bottom:9px;
    border:1.5px solid var(--line); border-radius:15px; background:#fff; text-align:left;}
  .svcpick:hover{border-color:var(--mochaSoft); background:var(--cream2);}
  .svcpick .ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .svcpick .t{display:flex;flex-direction:column;}
  .svcpick .t b{font-size:15px;color:var(--ink);} .svcpick .t i{font-style:normal;font-size:12px;color:var(--accentDk);font-weight:600;margin-top:2px;}
  .svcpick .go{margin-left:auto;color:var(--mochaSoft);font-size:20px;}
  .walkinpair{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .walkincard{background:var(--cream2); border:1.5px solid var(--line); border-radius:15px;
    padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .walkincard.wide{flex-direction:row; align-items:center; padding:12px 14px; gap:13px; width:100%; text-align:left;}
  .walkincard.wide .we{font-size:24px; flex-shrink:0;}
  .walkincard.wide .wt{display:flex; flex-direction:column; flex:1;}
  .walkincard.wide .wt b{font-size:14px;color:var(--brown);}
  .walkincard.wide .wt i{font-style:normal;font-size:11.5px;color:var(--gray);font-weight:400;margin-top:1px;}
  .walkincard.wide .go{color:var(--mochaSoft);font-size:18px;}
  .walkincard:hover{background:#F5EBDF; border-color:var(--mochaSoft);}
  .walkincard .we{font-size:26px;}
  .walkincard .wt{font-weight:700; font-size:14px; color:var(--brown); margin-top:2px;}
  .walkincard .ws{font-size:11px; color:var(--gray);}

  /* ---- USP grid (라이브카메라·픽업·채팅·VIP) ---- */
  .uspgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;}
  .uspcard{background:#fff; border:1.5px solid var(--line); border-radius:15px;
    padding:14px 12px; text-align:left; transition:.15s;}
  .uspcard:hover{border-color:var(--mochaSoft); transform:translateY(-1px);}
  .uspcard .ue{font-size:24px; margin-bottom:6px;}
  .uspcard .ut{font-weight:700; font-size:13.5px; color:var(--brown);}
  .uspcard .us{font-size:11.5px; color:var(--gray); margin-top:3px; line-height:1.35;}

  /* ---- 라이브 카메라 ---- */
  .livecam{padding:2px 2px;}
  .livehead{display:flex; align-items:center; gap:8px; padding:0 4px 10px; font-size:13.5px; color:var(--brown);}
  .livedot{width:9px;height:9px;border-radius:50%;background:#E33; box-shadow:0 0 0 0 rgba(227,51,51,.5); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(227,51,51,.6);}70%{box-shadow:0 0 0 8px rgba(227,51,51,0);}100%{box-shadow:0 0 0 0 rgba(227,51,51,0);}}
  .liveago{margin-left:auto; font-size:11px; color:var(--gray); font-weight:400;}
  .livescreen{position:relative; aspect-ratio:16/10; border-radius:16px; overflow:hidden;
    background:linear-gradient(135deg,#2a2520,#4a3d30);}
  .livegrain{position:absolute; inset:0; opacity:.2; mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.3) 1px, transparent 1.3px); background-size:4px 4px;
    animation:noise 1.2s infinite linear;}
  @keyframes noise{0%{transform:translate(0,0);}25%{transform:translate(-2px,1px);}50%{transform:translate(1px,-1px);}75%{transform:translate(-1px,-1px);}100%{transform:translate(0,0);}}
  .livecenter{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; z-index:2;}
  .livepaw{font-size:56px; filter:drop-shadow(0 4px 16px rgba(0,0,0,.4)); animation:bob 2s infinite ease-in-out;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .livetext{font-weight:600; font-size:14px; margin-top:10px;}
  .livesub{font-size:11px; opacity:.7; margin-top:3px;}
  .livecontrols{position:absolute; bottom:10px; right:12px; display:flex; gap:6px; z-index:3;}
  .livecontrols .lc{width:28px;height:28px; background:rgba(0,0,0,.45); border-radius:8px;
    display:flex;align-items:center;justify-content:center; font-size:13px;}
  .livemeta{display:flex; gap:12px; padding:10px 4px 0; font-size:11.5px; color:var(--mocha);}
  .livemeta .lm{display:flex; align-items:center; gap:5px;}

  /* ---- VIP 정액권 카드 ---- */
  .vipcard{background:linear-gradient(135deg,var(--brown),#5a3f2a); color:#fff; border-radius:16px;
    padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadowSm); position:relative;}
  .viptop{display:flex; align-items:baseline; justify-content:space-between;}
  .vippay{font-family:'Fraunces',serif; font-weight:600; font-size:22px;}
  .vipoff{background:var(--accent); color:#fff; font-weight:700; font-size:12px; padding:3px 9px; border-radius:30px;}
  .vipsub{font-size:11.5px; opacity:.85; margin-top:4px;}
  .vipsub b{font-weight:600; color:#F2D8B0;}

  /* ---- 더보기: VIP 배너 + 그리드 ---- */
  .vipbanner{display:flex; align-items:center; gap:12px; width:100%;
    background:linear-gradient(120deg,#4A2F1D 0%, #6b4530 50%, #B5793A 100%); color:#fff;
    border-radius:18px; padding:18px 18px; margin:16px 0 6px; box-shadow:var(--shadowSm);
    position:relative; overflow:hidden; text-align:left;}
  .vipbanner::after{content:''; position:absolute; right:-30px; top:-40px; width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,215,150,.25), transparent 65%); pointer-events:none;}
  .vbleft{flex:1; min-width:0;}
  .vbkicker{font-size:10px; letter-spacing:1.5px; font-weight:700; opacity:.7;}
  .vbtitle{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:2px 0 4px;}
  .vbsub{font-size:12.5px; opacity:.95;} .vbsub b{font-weight:700; color:#F5D8AE;}
  .vbright{display:flex; flex-direction:column; align-items:flex-end; gap:8px; z-index:1;}
  .vbcrown{font-size:30px;}
  .vbgo{font-size:11.5px; font-weight:700; background:rgba(255,255,255,.18); padding:5px 11px; border-radius:30px;}

  .moregrid{display:flex; flex-direction:column; gap:9px; margin-top:14px;}
  .moreitem{display:flex; align-items:center; gap:12px; padding:13px 14px; width:100%; text-align:left;
    background:#fff; border:1.5px solid var(--line); border-radius:14px;}
  .moreitem:hover{border-color:var(--mochaSoft); background:var(--cream2);}
  .mi-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .mi-tx{flex:1;display:flex;flex-direction:column;}
  .mi-tx b{font-size:14px;color:var(--ink);font-weight:700;}
  .mi-tx i{font-style:normal;font-size:11.5px;color:var(--gray);margin-top:1px;}
  .mi-go{color:var(--mochaSoft);font-size:18px;}

  /* ---- 마이펫: 현재 상태 라이브 + 직원채팅 ---- */
  .livestrip{display:flex; gap:9px; overflow-x:auto; margin:0 -18px 6px; padding:6px 18px 10px;}
  .livestrip::-webkit-scrollbar{height:0;}
  .liveitem{flex:0 0 auto; display:flex; align-items:center; gap:9px; padding:11px 14px;
    background:#fff; border:1.5px solid var(--line); border-radius:13px; min-width:160px;}
  .liveitem:hover{border-color:var(--mochaSoft); background:var(--cream2);}
  .liveic{width:34px;height:34px;border-radius:10px;background:#FBE7E7;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .livet{display:flex;flex-direction:column;text-align:left;}
  .livet b{font-size:13px; color:var(--brown); font-weight:700;}
  .livet i{font-style:normal; font-size:11px; color:#E33; font-weight:700;}
  .liveitem.chat .livet i{color:var(--gray);font-weight:500;}

  /* ---- 마이펫 빠른 액션 / 상태 카드 ---- */
  .qa-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:14px 0 4px;}
  .qa-card{background:#fff; border:1.5px solid var(--line); border-radius:14px;
    padding:13px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .qa-card.primary{background:var(--brown); color:#fff; border-color:var(--brown);}
  .qa-card.primary .qa-ic{font-size:22px;}
  .qa-card .qa-ic{font-size:22px; color:var(--brown);}
  .qa-card.primary .qa-ic{color:#fff;}
  .qa-card .qa-t{font-size:12.5px; font-weight:700;}

  .statuscard{padding:0; overflow:hidden; margin-top:6px;}
  .sc-head{display:flex; justify-content:space-between; align-items:center; padding:12px 16px 8px;}
  .sc-badge{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    padding:5px 11px; border-radius:30px; background:#E4F5E7; color:#3F8D52;}
  .sc-badge.live i{width:7px;height:7px;border-radius:50%;background:#E33;animation:pulse 1.6s infinite;}
  .sc-badge.live{background:#FBE7E7; color:#E33;}
  .sc-time{font-size:11.5px; color:var(--gray);}
  .sc-body{display:flex; align-items:center; gap:13px; padding:6px 16px 14px;}
  .sc-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .sc-info{flex:1;}
  .sc-svc{font-weight:700; font-size:15px; color:var(--brown);}
  .sc-pet{font-size:12px; color:var(--gray); margin-top:2px;}
  .statuscard .livestrip{margin:0; padding:6px 16px 16px;}

  .upcomingcard{display:flex; align-items:center; gap:12px; padding:13px 14px; margin-bottom:8px;}
  .up-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .up-info{flex:1;}
  .up-svc{font-weight:700; font-size:14px; color:var(--brown);}
  .up-meta{font-size:11.5px; color:var(--gray); margin-top:2px;}
  .up-badge{background:var(--cream2); color:var(--mocha); font-size:11px; font-weight:700; padding:4px 10px; border-radius:30px;}

  .emptycard{text-align:center; padding:24px 16px; margin-top:6px;}
  .em-ic{font-size:42px; opacity:.5; margin-bottom:8px;}
  .em-t{font-weight:700; font-size:15px; color:var(--brown);}
  .em-s{font-size:12.5px; color:var(--gray); line-height:1.6; margin-top:6px;}

  /* ---- 내 패키지 카드 (마이펫) ---- */
  .pkgcard{background:linear-gradient(135deg,#FBF2E4,#F6E8D4);border:1.5px solid #E8D4B2;border-radius:14px;padding:14px 16px;margin-top:8px;}
  .pkg-h{display:flex;align-items:center;gap:11px;}
  .pkg-ic{font-size:26px;width:42px;height:42px;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #E8D4B2;}
  .pkg-tx{flex:1;min-width:0;}
  .pkg-nm{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--brown);line-height:1.25;}
  .pkg-pet{font-size:11.5px;color:var(--mocha);margin-top:2px;}
  .pkg-remain{text-align:right;flex-shrink:0;}
  .pkg-r-n{font-family:'Fraunces',serif;font-weight:600;font-size:24px;color:var(--good);line-height:1;}
  .pkg-r-n span{font-size:13px;color:var(--gray);font-weight:400;}
  .pkg-r-l{font-size:10px;color:var(--gray);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .pkg-bar{height:7px;background:#fff;border-radius:5px;overflow:hidden;border:1px solid rgba(232,212,178,.6);margin-top:11px;}
  .pkg-fill{height:100%;background:linear-gradient(90deg,var(--good),#5fa56e);border-radius:5px;transition:width .5s;}
  .pkg-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--mocha);margin-top:7px;}
  .pkg-meta .pkg-warn{color:#C44;font-weight:700;}

  /* ---- 결제 방법 선택 카드 ---- */
  .paychoice{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:12px;margin-bottom:9px;text-align:left;cursor:pointer;transition:.15s;}
  .paychoice:hover{border-color:var(--brown);background:#FBF8F2;}
  .paychoice .pc-ic{font-size:26px;width:46px;height:46px;background:var(--cream2);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .paychoice .pc-tx{flex:1;min-width:0;}
  .paychoice .pc-t1{font-weight:700;font-size:14.5px;color:var(--brown);display:flex;align-items:center;gap:7px;}
  .paychoice .pc-t2{font-size:12px;color:var(--mocha);margin-top:3px;line-height:1.45;}
  .paychoice .pc-t3{font-size:11.5px;color:var(--good);margin-top:4px;font-weight:600;}
  .paychoice .pc-arr{font-size:18px;color:var(--gray);flex-shrink:0;}
  .paychoice-pkg{background:linear-gradient(135deg,#FBF2E4,#F6E8D4);border-color:#E8D4B2;}
  .paychoice-pkg .pc-ic{background:#fff;border:1px solid #E8D4B2;}
  .pc-rec{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:30px;}

  /* ---- 환영 쿠폰 카드 (vDone 첫 예약) ---- */
  .welcome-coupon{position:relative;background:linear-gradient(135deg,#F6E8D4,#E8C9A0);border:1.5px solid #C09660;border-radius:16px;padding:16px;margin-top:14px;overflow:hidden;}
  .welcome-coupon::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 70%);}
  .wc-burst{position:absolute;top:8px;right:12px;font-size:20px;animation:pulse 1.8s infinite;}
  .wc-h{display:flex;align-items:center;gap:11px;position:relative;z-index:1;}
  .wc-ic{font-size:28px;width:46px;height:46px;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .wc-tx{flex:1;min-width:0;}
  .wc-t1{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--brown);}
  .wc-t2{font-size:12px;color:var(--mocha);margin-top:3px;}
  .wc-coupon{display:flex;align-items:center;background:#fff;border:1.5px dashed var(--accent);border-radius:11px;padding:11px 14px;margin-top:12px;position:relative;z-index:1;}
  .wc-c-l{flex:1;min-width:0;}
  .wc-c-val{font-family:'Fraunces',serif;font-weight:600;font-size:28px;color:var(--accentDk);line-height:1;}
  .wc-c-val span{font-size:18px;}
  .wc-c-lab{font-size:11px;color:var(--mocha);margin-top:4px;}
  .wc-c-r{text-align:right;flex-shrink:0;border-left:1px dashed var(--line);padding-left:11px;margin-left:11px;}
  .wc-c-exp{font-size:11.5px;font-weight:700;color:var(--brown);}
  .wc-c-d{font-size:10.5px;color:var(--gray);margin-top:2px;}
  .wc-foot{font-size:11px;color:var(--mocha);margin-top:10px;text-align:center;position:relative;z-index:1;}

  /* ---- 내 쿠폰 카드 (마이펫) ---- */
  .couponcard{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--line);border-left:4px solid var(--accent);border-radius:13px;padding:13px 15px;margin-top:8px;}
  .couponcard .cp-ic{font-size:24px;width:40px;height:40px;background:linear-gradient(135deg,#FBF2E4,#F6E8D4);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .couponcard .cp-tx{flex:1;min-width:0;}
  .couponcard .cp-t1{font-weight:700;font-size:14px;color:var(--brown);}
  .couponcard .cp-t2{font-size:11.5px;color:var(--mocha);margin-top:2px;line-height:1.45;}
  .couponcard .cp-meta{display:flex;justify-content:space-between;gap:10px;font-size:10.5px;color:var(--gray);margin-top:6px;}
  .couponcard .cp-meta .cp-warn{color:#C44;font-weight:700;}
  .couponcard .cp-val{text-align:right;flex-shrink:0;}
  .couponcard .cp-n{font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:var(--accentDk);line-height:1;}
  .couponcard .cp-n span{font-size:15px;}

  /* ---- profile head with edit ---- */
  .profileHead{display:flex;align-items:center;gap:12px;margin:18px 0 4px;}
  .ph-avatar{width:50px;height:50px;border-radius:50%;background:var(--brown);color:#fff;
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;flex-shrink:0;}
  .ph-tx{flex:1;min-width:0;}
  .ph-name{font-weight:700;font-size:17px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .ph-meta{font-size:12px;color:var(--gray);margin-top:2px;}
  .creditbadge{font-size:11px;font-weight:700;background:linear-gradient(135deg,#B5793A,#8a6b4f);color:#fff;padding:3px 9px;border-radius:30px;}
  .ph-edit{width:36px;height:36px;border-radius:50%;background:#fff;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .ph-edit:hover{background:var(--cream2);border-color:var(--mochaSoft);}

  /* ---- pet card clickable ---- */
  .petcard{flex:0 0 120px;padding:14px;text-align:center;background:#fff;cursor:pointer;}
  .petcard:hover{border-color:var(--mochaSoft);}
  .petcard.add{border-style:dashed;color:var(--mocha);}
  .pc-ic{width:46px;height:46px;border-radius:50%;background:var(--cream);
    display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px;}
  .pc-plus{font-size:26px;margin-bottom:6px;}
  .pc-nm{font-weight:700;font-size:14px;}
  .pc-sub{font-size:11px;color:var(--gray);margin-top:2px;}

  /* ---- 빠른 액션 4개 그리드 ---- */
  .qa-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin:14px 0 4px;}
  .qa-card{background:#fff; border:1.5px solid var(--line); border-radius:14px;
    padding:13px 6px; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .qa-card.primary{background:var(--brown); color:#fff; border-color:var(--brown);}
  .qa-card .qa-ic{font-size:22px; color:var(--brown);}
  .qa-card.primary .qa-ic{color:#fff;}
  .qa-card .qa-t{font-size:11.5px; font-weight:700;}

  /* ---- pay chip + upcoming expanded ---- */
  .paychip{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:30px;margin-left:6px;vertical-align:middle;}
  .paychip.ok{background:#E4F5E7;color:#3F8D52;}
  .paychip.pend{background:#FFF1DE;color:#B5793A;}
  .upcomingcard.expanded{display:block;padding:12px 14px;}
  .up-row{display:flex;align-items:center;gap:12px;}
  .up-dleft{font-size:11px;color:var(--accentDk);font-weight:600;margin-top:3px;}
  .up-badge.paid{background:#E4F5E7;color:#3F8D52;}
  .up-badge.wait{background:#FFF1DE;color:#B5793A;}
  .up-actions{display:flex;gap:6px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);flex-wrap:wrap;}
  .up-actions .btn.sm{flex:0 0 auto;padding:7px 13px;font-size:12.5px;}
  .btn.danger{color:#C44;}
  .sectitle .cnt{font-size:11px;font-weight:700;background:var(--accent);color:#fff;padding:2px 9px;border-radius:30px;margin-left:7px;vertical-align:middle;}
  .starbtn{font-size:16px;color:var(--mochaSoft);background:transparent;padding:4px;margin-right:4px;}
  .starbtn.on{color:#FFB400;}

  /* ---- QR 결제 시트 ---- */
  .qrcard{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;}
  .qr-amount{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:12px;border-bottom:1px dashed var(--line);}
  .qr-amount span{font-size:12px;color:var(--gray);}
  .qr-amount b{font-family:'Fraunces',serif;font-size:22px;color:var(--brown);font-weight:600;}
  .qr-img{position:relative;aspect-ratio:1/1;background:var(--cream2);border-radius:12px;margin:12px 0;overflow:hidden;}
  .qr-img img{width:100%;height:100%;object-fit:contain;}
  .qr-fallback{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;}
  .qr-bank{padding:6px 0 4px;}
  .qr-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;}
  .qr-row span{color:var(--gray);} .qr-row b{font-weight:700;color:var(--ink);text-align:right;max-width:60%;word-break:break-all;}
  .qr-hint{font-size:11px;color:var(--mocha);background:var(--cream2);padding:9px 12px;border-radius:10px;margin-top:10px;line-height:1.5;}

  /* ---- 정기 배송 ---- */
  .cyclegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .cyclegrid .chip{justify-content:center;padding:9px 4px;font-size:11.5px;}
  .subcatalog{display:flex;flex-direction:column;gap:8px;}
  .subitem{display:flex;align-items:center;gap:12px;padding:11px 13px;background:#fff;border:1.5px solid var(--line);border-radius:13px;}
  .subitem.on{border-color:var(--accent);background:#FFF7EB;}
  .si-ic{font-size:22px;flex-shrink:0;}
  .si-tx{flex:1;min-width:0;}
  .si-tx b{display:block;font-size:13.5px;font-weight:700;color:var(--brown);}
  .si-tx i{font-style:normal;font-size:11px;color:var(--gray);margin-top:1px;display:block;}
  .qty{display:flex;align-items:center;gap:8px;}
  .qty button{width:28px;height:28px;border-radius:8px;background:var(--cream2);font-size:16px;font-weight:700;color:var(--brown);}
  .qty span{min-width:18px;text-align:center;font-weight:700;font-size:14px;}

  /* ---- pet detail sheet ---- */
  .petdetail{padding:0 2px;}
  .pd-head{display:flex;align-items:center;gap:14px;padding:6px 4px 14px;}
  .pd-emoji{font-size:48px;}
  .pd-tx{flex:1;}
  .pd-name{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--brown);}
  .pd-meta{font-size:12.5px;color:var(--gray);margin-top:2px;}
  .pd-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 16px;}

let CURRENT_LANG = 'kr';

// 번역 헬퍼 — 미정의 키는 KR로 fallback, 그래도 없으면 키 그대로 반환
function t(key, vars){
  const entry = I18N[key];
  let text;
  if(!entry){ text = key; }
  else text = entry[CURRENT_LANG] || entry.kr || key;
  if(vars){
    text = text.replace(/\{(\w+)\}/g, (_, k)=> vars[k] !== undefined ? vars[k] : `{${k}}`);
  }
  return text;
}

// 언어 변경 — 전체 화면 다시 그리기
function setLang(lang){
  if(!['kr','vi','en'].includes(lang)) return;
  if(CURRENT_LANG === lang) return;
  CURRENT_LANG = lang;
  // 메뉴/룸 데이터 다국어 재구성 (nm/ds가 i18n으로 빌드됨)
  if(typeof rebuildPriceMenus === 'function') rebuildPriceMenus();
  // 현재 화면 재렌더링
  if(typeof render === 'function' && S.view) render(S.view);
  if(typeof renderAdmin === 'function' && document.getElementById('ppwrap')?.classList.contains('admin')) renderAdmin();
  // 시트가 열려 있으면 닫기 (시트 텍스트도 갱신 필요한데, 일부 시트는 state를 잃음)
  if(typeof closeSheet === 'function') closeSheet();
  hint(t('langChanged.toast.'+lang));
}

// 언어 토글 버튼 HTML (상단바 우측에 삽입)
function langToggleHTML(){
  const labels = { kr:'한', vi:'VI', en:'EN' };
  return `<div class="langtoggle">
    <button class="lt-btn" onclick="toggleLangMenu()" aria-label="${t('topbar.langLabel')}">
      <span class="lt-cur">${labels[CURRENT_LANG]}</span>
      <span class="lt-arr">▾</span>
    </button>
    <div class="lt-menu" id="ltMenu" style="display:none">
      <button class="lt-opt ${CURRENT_LANG==='kr'?'on':''}" onclick="setLang('kr');toggleLangMenu()"><span>한국어</span><i>KR</i></button>
      <button class="lt-opt ${CURRENT_LANG==='vi'?'on':''}" onclick="setLang('vi');toggleLangMenu()"><span>Tiếng Việt</span><i>VI</i></button>
      <button class="lt-opt ${CURRENT_LANG==='en'?'on':''}" onclick="setLang('en');toggleLangMenu()"><span>English</span><i>EN</i></button>
    </div>
  </div>`;
}
function toggleLangMenu(){
  const m = document.getElementById('ltMenu');
  if(!m) return;
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
// 바깥 클릭 시 메뉴 닫기
document.addEventListener('click', (e)=>{
  const m = document.getElementById('ltMenu');
  const t = document.querySelector('.langtoggle');
  if(m && t && !t.contains(e.target)) m.style.display = 'none';
});
