// 가격 계산 헬퍼 — 펫 체중에서 자동 적용
function priceFor(serviceKey, pet, sub){
  const w = wIdx(pet?.band || 'w1');
  const s = SERVICES[serviceKey];
  if(serviceKey==='grooming') return s.weightPrices[w];
  if(serviceKey==='spa')      return s.weightPrices[w];
  if(serviceKey==='pool'){
    const m = s.poolMenus.find(x=>x.id===sub) || s.poolMenus[0];
    return m.weightPrices[w];
  }
  if(serviceKey==='daycare'){
    const m = s.menus.find(x=>x.id===sub) || s.menus[1];
    return m.pr;
  }
  return 0;
}
// 표시용 시작가 (<2kg 기준)
function fromPrice(k){
  const s=SERVICES[k];
  if(s.weightPrices) return s.weightPrices[0];
  if(s.poolMenus)    return s.poolMenus[0].weightPrices[0];
  if(s.menus)        return s.menus[0].pr;
  if(s.speciesRooms) return s.speciesRooms.dog[0].rate;
  return 0;
}

// === 예약 흐름 호환 레이어: 기존 단일 menus/rooms 인터페이스를 새 가격 구조에서 동적 생성 ===
// 펫 1번째의 체중 기준으로 menus/rooms를 만들어 예약 흐름에 주입한다.
// 펫이 없으면 <2kg 기준으로 시작가 표시. 펫 선택이 바뀔 때마다 rebuild.
function rebuildPriceMenus(){
  const p = S.pets[S.d?.petIds?.[0]?.split('|')[0]] || S.pets[0];
  const w = wIdx(p?.band || 'w0');
  const band = WEIGHT_BANDS[w].label;
  // 그루밍
  SERVICES.grooming.menus = [
    { id:'full', nm:t('bk.menu.grooming.full'), ds:t('bk.menu.ds.fullGroom',{band}), pr: String(SERVICES.grooming.weightPrices[w]) },
    { id:'bath', nm:t('bk.menu.grooming.bath'), ds:t('bk.menu.ds.basicCare',{band}), pr: String(Math.round(SERVICES.grooming.weightPrices[w]*0.6)) },
  ];
  // 스파(목욕)
  SERVICES.spa.menus = [
    { id:'bath',  nm:t('bk.menu.spa.bath'),  ds:t('bk.menu.ds.bath',{band}), pr: String(SERVICES.spa.weightPrices[w]) },
    { id:'plus',  nm:t('bk.menu.spa.plus'),  ds:t('bk.menu.ds.nails'),       pr: String(SERVICES.spa.weightPrices[w] + 80000) },
    { id:'medsh', nm:t('bk.menu.spa.medsh'), ds:t('bk.menu.ds.medsh'),       pr: String(SERVICES.spa.weightPrices[w] + 60000) },
  ];
  // 수영장
  SERVICES.pool.menus = SERVICES.pool.poolMenus.map(m=>({
    id:m.id,
    nm:t('bk.menu.pool.'+m.id),
    ds:t(m.id==='swim'?'bk.menu.ds.swim':'bk.menu.ds.poolFull', {band}),
    pr: String(m.weightPrices[w])
  }));
  // 유치원: 메뉴 nm/ds도 다국어 (poolMenus처럼 데이터가 있다면 그대로, 아니면 i18n)
  if(SERVICES.daycare.menus){
    SERVICES.daycare.menus = SERVICES.daycare.menus.map(m=>({
      ...m,
      nm: I18N['bk.menu.daycare.'+m.id] ? t('bk.menu.daycare.'+m.id) : m.nm,
    }));
  }
  // 호텔: 강아지 객실 기본
  SERVICES.hotel.rooms = SERVICES.hotel.speciesRooms.dog.map(r=>({
    id:r.id, nm:r.nm, ds:r.ds, rate:r.rate
  }));
}
// 초기 1회 실행 + 펫이 추가될 때 갱신

const $ = id => document.getElementById(id);
const screen = () => $('screen');
function fmt(n){ return n.toLocaleString('en-US'); }
// 옵션명 i18n 헬퍼 — 예약 카드 표시 시 menu id를 다국어 라벨로 변환
// optName 데이터에 한국어 라벨이 박혀있어도 b.room (id)이 있으면 i18n으로 우선 적용
function optNameLabel(b){
  if(!b) return '';
  if(!b.room) return b.optName || '';
  const s = SERVICES[b.service];
  if(!s) return b.optName || '';
  // 호텔: rooms에서 찾기
  if(s.type==='stay'){
    const r = s.rooms?.find(x=>x.id===b.room);
    return r?.nm || b.optName || '';
  }
  // 메뉴: i18n 키 우선 (bk.menu.{service}.{id})
  const key = 'bk.menu.'+b.service+'.'+b.room;
  if(I18N[key]) return t(key);
  // 폴백: menus 배열에서 찾기 (rebuildPriceMenus가 i18n 처리해둠)
  const m = s.menus?.find(x=>x.id===b.room);
  return m?.nm || b.optName || '';
}
function setTab(t){ document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on', e.dataset.tab===t)); }
function hint(txt){ $('hintTxt').textContent=txt; $('hint').classList.add('show');
  clearTimeout(window._ht); window._ht=setTimeout(()=>$('hint').classList.remove('show'),2600); }

function go(v, opt){ S.view=v; render(v, opt); screen().scrollTop=0;
  setTab(['home','tour','mypet','more'].includes(v)?v:'');
}

// ============================ RENDER ROUTER ============================
function render(v, opt){
  const s = screen();
  if(v==='home') s.innerHTML = vHome();
  else if(v==='tour') s.innerHTML = vTour();
  else if(v==='mypet') s.innerHTML = vMyPet();
  else if(v==='more') s.innerHTML = vMore();
  else if(v==='flow') s.innerHTML = vFlow();
  else if(v==='done') s.innerHTML = vDone(opt);
  renderTabbar(v);
  bindFlow();
}

function topbar(back){
  const authChip = S.loggedIn
    ? `<button class="meChip" onclick="go('mypet')" title="${t('mypet.title')}"><span class="meAv">${(S.user?.name||'P')[0]}</span><span class="meNm">${S.user?.name||'회원'}</span></button>`
    : `<div class="authChips"><button class="authMini" onclick="openAuth('home')">${t('auth.login')}</button><button class="authMini primary" onclick="openAuth('home')">${t('auth.signup')}</button></div>`;
  return `<div class="topbar">
    ${back?`<button class="back" onclick="${back}">‹</button>`:`<div class="brand">${paw}Posh Pet</div>`}
    ${back?`<div class="brand" style="font-size:16px">${S.view==='flow'?t('bk.title'):'Posh Pet'}</div>`:''}
    <div class="topRight">
      ${back?'':authChip}
      ${langToggleHTML()}
    </div>
  </div>`;
}

// 예약 상태 분류 (오늘 기준)
// today (today/staying) | upcoming (future) | past
function classifyBooking(b){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(b.dateObj); d.setHours(0,0,0,0);
  const s = SERVICES[b.service];
  // 호텔 투숙은 dateB까지 진행 중
  if(s.type==='stay' && b.config?.dateB){
    const end = new Date(b.config.dateB.y, b.config.dateB.m, b.config.dateB.d); end.setHours(0,0,0,0);
    if(today >= d && today <= end) return 'today';
    if(today < d) return 'upcoming';
    return 'past';
  }
  if(+d === +today) return 'today';
  if(+d > +today)   return 'upcoming';
  return 'past';
}
// daysUntil(arg): 예약 객체(b.dateObj), Date, 또는 'YYYY-MM-DD' 문자열 모두 지원
function daysUntil(arg){
  const today = new Date(); today.setHours(0,0,0,0);
  let target;
  if(arg && typeof arg === 'object' && arg.dateObj) target = new Date(arg.dateObj);
  else if(arg instanceof Date) target = new Date(arg);
  else target = new Date(arg);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
// 변경/취소 가능 여부: 전전일(D-2)까지 자유, 전일부터 상담 안내
function canChangeFree(b){ return daysUntil(b) >= 2; }

function payState(b){ return b.paid ? 'confirmed' : 'pending'; }

// 다시 이용하기 리스트: 서비스별 최근 3 + 즐겨찾기 영구
function buildReuseList(all){
  // 정렬 기준: 즐겨찾기 우선 → 그다음 최신순(날짜 내림차순), 최대 6개
  const byRecent = (a,b) => {
    const ad = a.dateObj ? new Date(a.dateObj).getTime() : 0;
    const bd = b.dateObj ? new Date(b.dateObj).getTime() : 0;
    return bd - ad;  // 최신이 앞
  };
  const starred = all.filter(b=>b.starred).sort(byRecent);
  const rest    = all.filter(b=>!b.starred).sort(byRecent);
  return [...starred, ...rest].slice(0, 6);
}
function toggleStar(id){
  const b = S.bookings.find(x=>x.id===id);
  if(b){ b.starred = !b.starred; hint(b.starred?t('toast.starredOn'):t('toast.starredOff')); render('mypet'); }
}

    </div>

function pickService(k){
  if(!S.loggedIn){ S._pendingSvc=k; openAuth('book'); return; }
  // logged in but no pet yet (e.g. signed up via My Pet) → register first, then resume this service
  if(S.pets.length===0){ S._pendingSvc=k; openAddPet('pickAfter'); return; }
  rebuildPriceMenus();  // 체중 기반 가격 재계산
  S.d.service=k; S.d.step=0; S.d.room=null; S.d.dateA=S.d.dateB=S.d.time=null; S.d.petIds=[];
  S.d.pickup=null; S.d.addrId=null; S.d.phoneId=null;
  S.d.addonAddr=null; S.d.addonAddrLabel=null;
  S.d.addonPhone=null; S.d.addonPhoneLabel=null;
  S.d.notes='';
  // 가입 시 자동 저장된 본인 번호가 있으면 default 선택
  const defPhone = S.phones.find(p=>p.isDefault) || S.phones[0];
  if(defPhone) S.d.phoneId = defPhone.id;
  S.prefill=false;
  go('flow');
}

// VietQR 이미지 (img.vietqr.io 공개 API) — 정확한 Napas 27 포맷을 자동 생성
function vietqrUrl(amount, memo){
  const a = encodeURIComponent(PAYINFO.accountNo);
  const b = PAYINFO.bankCode;
  const amt = encodeURIComponent(amount||'');
  const m = encodeURIComponent(memo||'');
  const n = encodeURIComponent(PAYINFO.accountName);
  // template=compact2: 금액·내용 자동 포함, 모양 깔끔
  return `https://img.vietqr.io/image/${b}-${a}-compact2.png?amount=${amt}&addInfo=${m}&accountName=${n}`;
}
function openPayQR(bookingId){
  const b = S.bookings.find(x=>x.id===bookingId);
  if(!b){ hint(t('paysheet.notFound')); return; }

  // 그루밍/스파 예약이고 활성 패키지가 있으면 선택 시트
  if(PACKAGE_CONFIG[b.service]){
    const petId = (b.petIds||[])[0]?.split('|')[0];
    const pk = petId ? findActivePackage(b.service, petId) : null;
    if(pk){
      openPaymentChoiceSheet(b, pk);
      return;
    }
  }

  // 기본: QR 결제로 직행
  const svcKey = 'svc.'+b.service;
  const svcName = I18N[svcKey+'.name'] ? t(svcKey+'.name') : SERVICES[b.service].name;
  payQRSheet({
    title:t('paysheet.bookTitle'),
    sub:`${svcName} · ${b.code}`,
    amount: b.amount || estimateAmount(b),
    memo:`POSHPET ${b.code}`,
    onPaid: ()=>{ b.paid=true; hint(t('paysheet.paidToast')); closeSheet(); render('mypet'); }
  });
}

function payWithPackage(bookingId, packageId){
  const b = S.bookings.find(x=>x.id===bookingId);
  const pk = S.packages.find(x=>x.id===packageId);
  if(!b || !pk){ hint(t('paychoice.infoError')); return; }
  if(consumePackage(packageId)){
    b.paid = true;
    b.paidBy = 'package';
    b.packageId = packageId;
    hint(t('paychoice.deducted',{rem:pk.remainUses}));
    closeSheet();
    render('mypet');
  } else {
    hint(t('paychoice.pkgError'));
  }
}

        const catUnit = I18N['subs.cat.'+cat.id+'.unit'] ? t('subs.cat.'+cat.id+'.unit') : cat.unit;
        return `<div class="subitem ${qty>0?'on':''}">
          <span class="si-ic">${cat.emoji}</span>
          <div class="si-tx">
            <b>${catNm}</b>

          </div>
          <div class="qty">
            <button onclick="adjustSubQty('${cat.id}',-1)">−</button>
            <span>${qty}</span>
            <button onclick="adjustSubQty('${cat.id}',1)">+</button>
          </div>
        </div>`;
      }).join('')}
    </div>

    ${d.items.length?`<div style="margin-top:14px;padding:12px 14px;background:var(--cream2);border-radius:13px;display:flex;justify-content:space-between;font-size:13.5px">
      <span>${t('subs.summary',{n:d.items.length, q:sumQty})}</span><b style="color:var(--brown)">${t('subs.perRoundTotal',{amt:fmt(sumTotal)})}</b>

    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${t('common.close')}</button>
  `);
}
function adjustSubQty(catId, delta){
  const d = S._subDraft;
  const cat = SUBSCRIBE_CATALOG.find(c=>c.id===catId);
  let it = d.items.find(x=>x.id===catId);
  if(!it && delta>0){
    it = { id:cat.id, nm:cat.nm, emoji:cat.emoji, unit:cat.unit, price:cat.defaultPrice, qty:0 };
    d.items.push(it);
  }
  if(it){
    it.qty = Math.max(0, it.qty + delta);
    if(it.qty===0) d.items = d.items.filter(x=>x.id!==catId);
  }
  renderSubscribeEditor();
}
function saveSubscription(){
  S.subscription = S._subDraft;
  S._subDraft = null;
  hint(t('subs.savedToast'));
  closeSheet();
  setTimeout(openSubscribeView, 200);
}
function nextDateInWeeks(weeks){
  const d = new Date(); d.setDate(d.getDate() + weeks*7);
  const mEnArr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return t('subs.dateFmt', { m: d.getMonth()+1, d: d.getDate(), mEn: mEnArr[d.getMonth()] });
}
function openPaySub(){
  const sub = S.subscription;
  if(!sub) return;
  const total = sub.items.reduce((a,it)=>a+it.qty*it.price,0);
  payQRSheet({
    title: t('subs.payTitle'),
    sub: t('subs.paySub',{n:sub.items.length, date:sub.nextDate}),
    amount: total,
    memo:`POSHPET SUB ${(S.user?.name||'').slice(0,10)}`,
    onPaid: ()=>{ hint(t('subs.paidToast')); closeSheet(); }
  });
}

  const p = S.phones.find(x=>x.id===id); if(!p) return;

function changeBooking(id){
  const b = S.bookings.find(x=>x.id===id); if(!b) return;
  // 변경 모드 진입: 기존 예약을 그대로 draft에 로딩, editId로 표시
  S.d = {...b.config, editId:id};   // editId가 있으면 submitBooking이 update로 동작
  S.prefill = true;
  // 날짜·시간만 다시 선택하도록 date 단계로 점프 (메뉴는 유지)
  const st = steps();
  const dateIdx = st.indexOf(SERVICES[b.service].type==='stay'?'dates':'date');
  S.d.dateA=null; S.d.dateB=null; S.d.time=null;
  S.d.step = dateIdx;
  go('flow');
  hint(t('toast.changeMode'));
}
function cancelBooking(id){
  const b = S.bookings.find(x=>x.id===id); if(!b) return;
  if(!confirm(t('confirm.cancelBooking',{code:b.code, status:b.paid?t('cancel.refundCredit'):t('cancel.unpaid')}))) return;
  if(b.paid){
    S.credit = (S.credit||0) + (b.amount||0);
  }
  S.bookings = S.bookings.filter(x=>x.id!==id);
  hint(t('toast.bookCancelled'));
  render('mypet');
}

// 충전 금액 → 할인율 계산 (정액권 단계 룰을 자연스럽게 확장)
// 5M 미만: 불가, 5M~: 10%, 10M~: 15%, 18M~: 20%, 25M~: 25%
function discountForCharge(amount){
  if(amount < 5000000) return null;        // 최소 충전 금액 미만
  if(amount < 10000000) return 10;
  if(amount < 18000000) return 15;
  if(amount < 25000000) return 20;
  return 25;                                 // 25M 이상 모두 25%
}

// 맞춤 충전 시트 (75M 큰손 대응)

      ${presets.map(v=>`<button class="chip" type="button" onclick="setCustomVip(${v})" style="flex:1;min-width:0">${fmt(v/1000000)}M</button>`).join('')}

    </div>

    <div id="customVipPreview" style="background:var(--cream2);border-radius:13px;padding:14px 16px;margin-top:12px;font-size:12.5px;line-height:1.75;color:var(--mocha);min-height:80px">

function setCustomVip(v){
  const inp = document.getElementById('customVipAmount');
  if(!inp) return;
  inp.value = v;
  updateCustomVipPreview();
}
function updateCustomVipPreview(){
  const inp = document.getElementById('customVipAmount');
  const prev = document.getElementById('customVipPreview');
  const btn = document.getElementById('customVipPay');
  if(!inp || !prev || !btn) return;
  const amount = parseInt(inp.value, 10) || 0;
  const off = discountForCharge(amount);
  if(off === null){
    prev.innerHTML = `<div style="color:var(--gray)">최소 충전 금액 <b style="color:var(--brown)">5,000,000 VND</b> 이상으로 입력해주세요.</div>`;
    btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
    return;
  }
  const pay = Math.round(amount * (100 - off) / 100);
  const saving = amount - pay;
  prev.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px dashed var(--line)">
      <span>충전 가치</span><b style="color:var(--brown);font-size:14px">${fmt(amount)} VND</b>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
      <span>할인율</span><b style="color:var(--accentDk)">−${off}%</b>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px dashed var(--line)">
      <span style="font-weight:700;color:var(--brown)">결제 금액</span>
      <b style="color:var(--good);font-size:16px">${fmt(pay)} VND</b>
    </div>
    <div style="font-size:11px;color:var(--gray);text-align:right;margin-top:2px">${fmt(saving)} VND 절약</div>
  `;
  btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
  btn.dataset.amount = amount;
  btn.dataset.pay = pay;
  btn.dataset.off = off;
}
function payCustomVip(){
  const btn = document.getElementById('customVipPay');
  if(!btn) return;
  const amount = parseInt(btn.dataset.amount, 10);
  const pay = parseInt(btn.dataset.pay, 10);
  const off = parseInt(btn.dataset.off, 10);
  if(!amount || !pay) return;
  // 기존 openPayVipQR과 동일한 흐름으로 진행 (가상의 pkg 객체)
  const pkg = { id: 'pcustom', price: amount, pay, off };
  openPayVipQR(pkg);
}

// flow step model per service type
function steps(){
  const s=SERVICES[S.d.service];
  if(s.type==='stay') return ['room','dates','pet','pickup','confirm'];
  return ['menu','date','time','pet','pickup','confirm'];
}
function curStep(){ return steps()[S.d.step]; }

function vFlow(){
  const s=SERVICES[S.d.service]; const st=steps(); const cur=st[S.d.step];
  let body='';
  if(cur==='room') body=stepRoom(s);
  else if(cur==='menu') body=stepMenu(s);
  else if(cur==='dates') body=stepDates(true);
  else if(cur==='date') body=stepDates(false);
  else if(cur==='time') body=stepTime(s);
  else if(cur==='pet') body=stepPet();
  else if(cur==='pickup') body=stepPickup(s);
  else if(cur==='confirm') body=stepConfirm(s);

  const segs = st.map((_,i)=>`<div class="seg ${i<=S.d.step?'on':''}"></div>`).join('');
  return topbar('flowBack()') + `
    <div class="prog">${segs}</div>
    <div class="steplabel">${S.prefill?t('bk.prefilled'):''}${t('bk.stepLabel',{n:S.d.step+1, total:st.length})}</div>
    ${body}`;
}

// --- step: dates / single date ---
function stepDates(range){
  return `<div class="qtitle">${range?t('bk.dates.range.title'):t('bk.dates.single.title')}</div>
  <div class="qsub">${range?t('bk.dates.range.sub'):t('bk.dates.single.sub')}</div>
  ${calendar(range)}
  <div style="height:170px"></div>
  ${range?flowFootStay():flowFoot(!!S.d.dateA,t('bk.dates.next'))}`;
}
function calendar(range){
  const y=S.calYear, m=S.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  // 오늘 기준 (실제 현재 날짜). 자정 비교를 위해 시분초 제거
  const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="day mut"></div>`;
  for(let d=1; d<=days; d++){
    const dt=new Date(y,m,d);
    const past = dt < today;
    // 시연용 휴무일: 오늘로부터 +7, +14일 (항상 미래라 자연스러움)
    const offDays = [new Date(today.getTime()+7*86400000), new Date(today.getTime()+14*86400000)];
    const off = offDays.some(o=> o.getFullYear()===y && o.getMonth()===m && o.getDate()===d);
    let cls='day';
    if(past||off){ cls+= off?' off':' mut'; }
    const aT=S.d.dateA, bT=S.d.dateB;
    if(range && aT){
      if(d===aT.d && m===aT.m) cls+=' start';
      else if(bT && d===bT.d && m===bT.m) cls+=' end';
      else if(bT && dt>new Date(y,aT.m,aT.d) && dt<new Date(y,bT.m,bT.d)) cls+=' range';
    } else if(!range && aT && d===aT.d && m===aT.m) cls+=' sel';
    cells+=`<div class="${cls}" onclick="pickDay(${d},${range})">${d}</div>`;
  }
  // 월 라벨: 한국어 "2026년 5월", 영어 "May 2026", 베트남어 "Tháng 5, 2026"
  const lang = (typeof CURRENT_LANG !== 'undefined' && CURRENT_LANG) ? CURRENT_LANG : 'kr';
  const mEnNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthLabel = lang==='en' ? `${mEnNames[m]} ${y}`
                   : lang==='vi' ? `Tháng ${m+1}, ${y}`
                   : `${y}년 ${m+1}월`;
  return `<div class="cal"><div class="calhead">
      <button class="back" onclick="navMonth(-1)">‹</button>
      <div>${monthLabel}</div>
      <button class="back" onclick="navMonth(1)">›</button></div>
    <div class="calgrid">${[0,1,2,3,4,5,6].map(d=>`<div class="dow">${t('bk.dow.'+d)}</div>`).join('')}${cells}</div></div>`;
}
function navMonth(dir){ S.calMonth+=dir; if(S.calMonth<0){S.calMonth=11;S.calYear--;} if(S.calMonth>11){S.calMonth=0;S.calYear++;} render('flow'); }
function pickDay(d,range){
  const sel={d, m:S.calMonth, y:S.calYear};
  if(range){
    if(!S.d.dateA || (S.d.dateA&&S.d.dateB)){ S.d.dateA=sel; S.d.dateB=null; }
    else { const a=new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d); const b=new Date(sel.y,sel.m,sel.d);
      if(b<=a){ S.d.dateA=sel; S.d.dateB=null; } else S.d.dateB=sel; }
  } else { S.d.dateA=sel; }
  render('flow');
}
function nights(){ if(!S.d.dateA||!S.d.dateB) return 0;
  return Math.round((new Date(S.d.dateB.y,S.d.dateB.m,S.d.dateB.d)-new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d))/864e5); }

// --- step: pickup ---
function stepPickup(s){
  // R4: 픽업 단계 진입 시 기본값을 '네, 픽업 받을게요'로
  if(S.d.pickup===null || S.d.pickup===undefined){
    S.d.pickup = 'yes';
    // 기본 주소가 있으면 자동 선택 (없으면 사용자가 고르거나 추가)
    if(!S.d.addrId){
      const defAddr = S.addresses.find(a=>a.isDefault) || S.addresses[0];
      if(defAddr) S.d.addrId = defAddr.id;
    }
  }
  const has = S.d.pickup!==null;
  const addrOk = S.d.pickup==='no' || addressReady();
  const phoneOk = phoneReady();
  return `<div class="qtitle">${t('bk.pickup.title')}</div>
  <div class="qsub">${t('bk.pickup.sub')}</div>

  <div class="pad">
    <div class="sublabel">${t('bk.pickup.label')}</div>
    <div class="seg2">
      <button class="${S.d.pickup==='no'?'on':''}" onclick="selPickup('no')">${t('bk.pickup.no')}</button>
      <button class="${S.d.pickup==='yes'?'on':''}" onclick="selPickup('yes')">${t('bk.pickup.yes')}</button>
    </div>
    ${S.d.pickup==='yes' ? pickupAddrSection() : ''}

    <div class="sublabel" style="margin-top:18px">${t('bk.phone.label')}</div>
    ${phoneSection()}

    <div class="sublabel" style="margin-top:18px">${t('bk.notes.label')} <span class="optional">(${t('common.optional')})</span></div>
    <div class="field" style="padding:0">
      <textarea id="notesIn" rows="3" placeholder="${t('bk.notes.ph')}"
        oninput="S.d.notes=this.value" style="resize:none;font-family:inherit;width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:13.5px;line-height:1.5">${S.d.notes||''}</textarea>
    </div>
  </div>

  <div style="height:170px"></div>
  ${flowFoot(has && addrOk && phoneOk, t('bk.pickup.next'))}`;
}

function addressReady(){
  // 픽업=yes일 때만 주소 검증
  if(S.d.pickup!=='yes') return true;
  // 신규 입력 모드: 라벨 + 주소 둘 다
  if(S.d.addrId==='__new__'){
    return !!(S.d.addonAddrLabel && S.d.addonAddrLabel.trim() &&
              S.d.addonAddr && S.d.addonAddr.trim().length>4);
  }
  // 저장된 주소에서 선택
  return !!(S.d.addrId && S.addresses.find(a=>a.id===S.d.addrId));
}
function phoneReady(){
  // 신규 입력 모드: 라벨 + 번호 둘 다
  if(S.d.phoneId==='__new__'){
    return !!(S.d.addonPhoneLabel && S.d.addonPhoneLabel.trim() &&
              S.d.addonPhone && S.d.addonPhone.replace(/\D/g,'').length>=8);
  }
  // 저장된 번호에서 선택
  return !!(S.d.phoneId && S.phones.find(p=>p.id===S.d.phoneId));
}

function pickupAddrSection(){
  // 신규 입력 모드인지 판단
  const adding = S.d.addrId==='__new__';
  if(adding || S.addresses.length===0){
    return `<div class="field" style="margin-top:14px">
      <label>${t('bk.addr.labelTitle')} <span class="optional">${t('bk.addr.labelHint')}</span></label>
      <input id="addrLabelIn" placeholder="${t('bk.addr.labelPh')}" value="${S.d.addonAddrLabel||''}" oninput="S.d.addonAddrLabel=this.value; refreshFootBtn()">
    </div>
    <div class="field" style="padding:0">
      <label>${t('bk.addr.detail')}</label>
      <input id="addrIn" placeholder="${t('bk.addr.detailPh')}" value="${S.d.addonAddr||''}" oninput="S.d.addonAddr=this.value; refreshFootBtn()">
      <div style="font-size:11px;color:var(--gray);margin-top:8px">${t('bk.addr.saveNote')}</div>

function calcTotal(){
  const s=SERVICES[S.d.service];
  let result;
  if(s.type==='stay'){
    const rate=s.rooms.find(r=>r.id===S.d.room).rate; const n=nights();
    const sub=rate*n;
    let pct=0; if(n>=30)pct=12; else if(n>=14)pct=8; else if(n>=7)pct=5;
    const discount=Math.round(sub*pct/100);
    result = {sub, discount, rate:pct, total:sub-discount};
  } else {
    const m=s.menus.find(x=>x.id===S.d.room);
    const v = typeof m.pr === 'number' ? m.pr : parseInt(String(m.pr).replace(/,/g,''))||0;
    result = {sub:v, discount:0, total:v};
  }
  // 쿠폰 할인 적용 (선택된 쿠폰이 있고, 해당 서비스에 유효한 경우)
  result.coupon = null;
  result.couponDiscount = 0;
  if(S.d.couponId){
    const c = getActiveCoupons().find(x=>x.id===S.d.couponId);
    if(c && (!c.restrictTo || c.restrictTo === S.d.service)){
      const cd = couponDiscountAmount(c, result.total);
      result.coupon = c;
      result.couponDiscount = cd;
      result.total = Math.max(0, result.total - cd);
    }
  }
  return result;
}

function flowFoot(enabled, label){

  return `<div class="flowfoot"><button class="btn ${enabled?'':'soft'}" id="flowNext" onclick="flowNext()">${label} →</button></div>`;
}
function flowFootStay(){
  const n=nights(); const ok=S.d.dateA&&S.d.dateB;
  let q='';
  if(ok){ const tt=calcTotal();
    q=`<div class="quote"><div><div class="ql">${t('bk.nights',{n:n})}</div>${tt.discount?`<div class="qd">${t('bk.longDiscount',{p:tt.rate})}</div>`:''}</div>
       <div class="qv">${fmt(tt.total)}</div></div>`; }
  return `<div class="flowfoot">${q}<button class="btn ${ok?'':'soft'}" id="flowNext" onclick="flowNext()">${t('bk.nextPet')}</button></div>`;

function flowNext(){
  const cur = curStep();
  // 단계별 검증 - 막혔다면 무엇이 부족한지 알려준다
  if(cur==='menu' && !S.d.room){ hint(t('bk.val.menu')); return; }
  if(cur==='room' && !S.d.room){ hint(t('bk.val.room')); return; }
  if((cur==='date' || cur==='dates') && !S.d.dateA){ hint(t('bk.val.date')); return; }
  if(cur==='dates' && !S.d.dateB){ hint(t('bk.val.dateOut')); return; }
  if(cur==='time' && !S.d.time){ hint(t('bk.val.time')); return; }
  if(cur==='pet' && S.d.petIds.length===0){ hint(t('bk.val.pet')); return; }
  if(cur==='pickup'){
    if(S.d.pickup===null){ hint(t('bk.val.pickup')); return; }
    if(S.d.pickup==='yes' && !addressReady()){
      if(S.d.addrId==='__new__'){
        if(!S.d.addonAddrLabel?.trim()){ hint(t('bk.val.addrLabel')); return; }
        hint(t('bk.val.addrLine')); return;
      }
      hint(t('bk.val.addrPick')); return;
    }
    if(!phoneReady()){
      if(S.d.phoneId==='__new__'){
        if(!S.d.addonPhoneLabel?.trim()){ hint(t('bk.val.phoneLabel')); return; }
        hint(t('bk.val.phoneNum')); return;
      }
      hint(t('bk.val.phonePick')); return;
    }
  }
  if(S.d.step < steps().length-1){ S.d.step++; render('flow'); screen().scrollTop=0; }
}
function flowBack(){
  if(S.d.step>0){ S.d.step--; render('flow'); screen().scrollTop=0; }
  else {
    // 변경 모드에서 뒤로 가면 마이펫으로
    if(S.d.editId){ S.d.editId=null; go('mypet'); return; }
    go('tour'); openServicePicker();
  }
}

function submitBooking(){
  // 1) 신규 입력한 주소가 있으면 라벨과 함께 영구 저장
  if(S.d.pickup==='yes' && S.d.addrId==='__new__' && S.d.addonAddr && S.d.addonAddrLabel){
    const newAddr = {
      id:'ad'+Date.now(),
      label:S.d.addonAddrLabel.trim(),
      line:S.d.addonAddr.trim(),
      isDefault: S.addresses.length===0,  // 첫 주소면 기본으로
    };
    S.addresses.push(newAddr);
    S.d.addrId = newAddr.id;
  }
  // 2) 신규 입력한 전화번호도 라벨과 함께 영구 저장
  if(S.d.phoneId==='__new__' && S.d.addonPhone && S.d.addonPhoneLabel){
    const newPh = {
      id:'ph'+Date.now(),
      label:S.d.addonPhoneLabel.trim(),
      number:S.d.addonPhone.trim(),
      isDefault: S.phones.length===0,
    };
    S.phones.push(newPh);
    S.d.phoneId = newPh.id;
  }

  const s=SERVICES[S.d.service];
  const optName = s.type==='stay'? s.rooms.find(r=>r.id===S.d.room)?.nm : s.menus.find(m=>m.id===S.d.room)?.nm;
  const petNames=S.pets.filter(p=>S.d.petIds.includes(p.id)).map(p=>p.name).join(', ');
  const dateObj = new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d);
  const dateLabel = s.type==='stay'
    ? `${S.d.dateA.m+1}/${S.d.dateA.d}–${S.d.dateB.m+1}/${S.d.dateB.d}`
    : `${S.d.dateA.m+1}월 ${S.d.dateA.d}일`;
  const code='PP-'+Math.random().toString(36).slice(2,6).toUpperCase()+Math.floor(Math.random()*90+10);

  // 선택된 주소/번호의 라벨도 예약에 보존 (vDone, 마이펫에서 보여주기 위해)
  const addrSel = S.addresses.find(a=>a.id===S.d.addrId);
  const phoneSel = S.phones.find(p=>p.id===S.d.phoneId);
  const total = calcTotal();

  // 변경 모드: 기존 예약 업데이트
  if(S.d.editId){
    const idx = S.bookings.findIndex(x=>x.id===S.d.editId);
    if(idx >= 0){
      const orig = S.bookings[idx];
      const updated = {
        ...orig,  // 원본의 id, code, paid, starred 등 유지
        service:S.d.service, room:S.d.room, optName,
        petNames, petIds:[...S.d.petIds],
        dateObj, dateLabel,
        pickup:S.d.pickup,
        addrLabel: addrSel?.label || null,
        addrLine:  addrSel?.line  || null,
        phoneLabel:phoneSel?.label|| null,
        phoneNum:  phoneSel?.number|| null,
        notes: (S.d.notes||'').trim(),
        amount: total.total || orig.amount,
        config:{...S.d, editId:null},  // editId는 빼고 보존
      };
      S.bookings[idx] = updated;
      S.d.editId = null;  // 변경 모드 종료
      S._lastWasUpdate = true;  // vDone에서 텍스트 분기용
      hint('✓ 예약이 변경되었습니다');
      go('done', updated);
      return;
    }
  }
  S._lastWasUpdate = false;

  // 적용된 쿠폰 (있으면 예약에 보존 + 사용 처리)
  const usedCoupon = total.coupon || null;

  // 신규 예약 (code는 위에서 이미 선언됨)
  const b={
    id:'b'+Date.now(),
    service:S.d.service, room:S.d.room, optName,
    petNames, petIds:[...S.d.petIds],
    dateObj, dateLabel,
    pickup:S.d.pickup,
    addrLabel: addrSel?.label || null,
    addrLine:  addrSel?.line  || null,
    phoneLabel:phoneSel?.label|| null,
    phoneNum:  phoneSel?.number|| null,
    notes: (S.d.notes||'').trim(),
    amount: total.total || 0,
    couponId: usedCoupon?.id || null,
    couponLabel: usedCoupon ? couponLabel(usedCoupon) : null,
    couponDiscount: total.couponDiscount || 0,
    paid: false,         // 입금 전 = 예약 대기
    starred: false,
    code,
    config:{...S.d}
  };
  S.bookings.push(b);
  // 쿠폰 사용 마킹 (예약 시점에 소진 — 다른 예약에 중복 사용 방지)
  if(usedCoupon){
    const cp = S.coupons.find(x=>x.id===usedCoupon.id);
    if(cp){ cp.usedAt = getToday(); cp.usedBooking = b.code; }
    S.d.couponId = null;  // draft 정리
  }
  go('done', b);
}

function vDone(b){
  const s=SERVICES[b.service];
  const svcKey = 'svc.'+b.service;

// ========== 점진적 정보 수집 (Progressive Disclosure) ==========
// 첫 예약 후, 미입력 정보가 있고 아직 권유받지 않은 경우에만 안내 카드 표시.
// "나중에" 누르면 영구히 다시 묻지 않음 (사용자 의사 존중).
function shouldShowProfileBoost(b){
  if(S._lastWasUpdate) return false;       // 변경 예약에선 안 보임
  if(S.profileBoostShown) return false;    // 이미 한 번 응답 (예/나중에)
  // 채워질 정보가 있는지 확인
  const u = S.user || {};
  const userMissing = !u.country || !u.gender || !u.birthday || u.marketingOptIn===null;
  const petMissing = (b.petIds||[]).some(id=>{
    const p = S.pets.find(x=>x.id===id);
    return p && (!p.gender || !p.birthday || !p.photo);
  });
  return userMissing || petMissing;
}

// 시연용 사진 선택 (실제로는 파일 업로드 다이얼로그)
function pickPetPhoto(petIdx){
  const emojis = ['🐶','🐕','🦮','🐕‍🦺','🐩','🐱','🐈','🐈‍⬛'];
  const cur = S._boostDraft.pets[petIdx].photo;
  const idx = emojis.indexOf(cur);
  const next = emojis[(idx+1) % emojis.length];
  S._boostDraft.pets[petIdx].photo = next;
  renderProfileBoostSheet();
}
function saveProfileBoost(){
  const d = S._boostDraft;
  // 본인 정보 머지 (null/빈값은 기존 유지)
  S.user = {
    ...S.user,
    country: d.user.country ?? S.user?.country,
    gender:  d.user.gender ?? S.user?.gender,
    birthday: d.user.birthday || S.user?.birthday,
    marketingOptIn: d.user.marketingOptIn,
  };
  // 펫 정보 머지
  d.pets.forEach(bp=>{
    const idx = S.pets.findIndex(p=>p.id===bp.id);
    if(idx>=0){
      S.pets[idx] = {
        ...S.pets[idx],
        gender:   bp.gender   || S.pets[idx].gender,
        birthday: bp.birthday || S.pets[idx].birthday,
        photo:    bp.photo    || S.pets[idx].photo,
      };
    }
  });
  S._boostDraft = null;
  hint(t('boost.savedToast'));
  closeSheet();
  // 마이펫으로 안전하게 이동 (done 화면에서 호출됐을 수 있어서 booking 컨텍스트 없을 수도 있음)
  go('mypet');
}

// 그루밍 12개월 유효, 스파 90일 유효.
const PACKAGE_CONFIG = {
  grooming: { name:'그루밍 10+2회 패키지', validDays:365, icon:'✂️', service:'grooming' },
  spa:      { name:'스파 10+2회 패키지',   validDays:90,  icon:'🛁', service:'spa' },

// 펫 + 서비스로 사용 가능한 활성 패키지 찾기
function findActivePackage(service, petId){
  if(!S.packages) S.packages = [];
  const today = new Date();
  return S.packages.find(pk =>
    pk.service === service &&
    pk.petId === petId &&
    pk.remainUses > 0 &&
    new Date(pk.expiry) >= today
  );
}

// 만료일 계산 헬퍼 (오늘 + N일)
function addDays(days){
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${t('pkgBuy.cancel')}</button>
  `);
}

function getToday(){
  return new Date().toISOString().slice(0,10);
}

// 패키지를 S.packages에 추가 (실제 구매 완료 시 호출)
function grantPackage(service, petId){
  const cfg = PACKAGE_CONFIG[service];
  const pet = S.pets.find(p=>p.id===petId);
  if(!cfg || !pet) return;
  if(!S.packages) S.packages = [];
  S.packages.push({
    id: 'PK-' + Date.now().toString(36).toUpperCase(),
    service,
    petId,
    petName: pet.name,
    totalUses: 12,
    remainUses: 12,
    purchasedAt: getToday(),
    expiry: addDays(cfg.validDays),
  });
}

function confirmPackagePurchase(service, petId, amount){
  const pkgCfgName = t('pkgCfg.'+service+'.name');
  const petName = S.pets.find(p=>p.id===petId)?.name || '';
  payQRSheet({
    title: t('pkgBuy.paySheet.title'),
    sub: t('pkgBuy.paySheet.sub',{pet:petName}),
    amount,
    memo: 'POSHPET PKG ' + service.toUpperCase(),
    onPaid: ()=>{
      grantPackage(service, petId);
      hint(t('pkgBuy.granted',{name:pkgCfgName}));
      closeSheet();
      render(S.view);
    }
  });
}

function payPackageWithCredit(service, petId, amount){
  if((S.credit||0) < amount){ alert(t('pkgBuy.lowCredit')); return; }
  S.credit -= amount;
  grantPackage(service, petId);
  hint(t('pkgBuy.granted',{name:t('pkgCfg.'+service+'.name')}));
  closeSheet();
  render(S.view);
}

// 패키지에서 1회 차감 (예약 결제 시 호출)
function consumePackage(packageId){
  const pk = S.packages.find(x=>x.id===packageId);
  if(!pk || pk.remainUses <= 0) return false;
  pk.remainUses -= 1;
  pk.lastUsed = getToday();
  return true;
}

// 마이펫 — 그루밍 주기 리마인더 배너 (9번)
// 종별 권장 주기: 개 5-6주(38일 기준), 고양이 8-10주(63일 기준)
// 마지막 그루밍 이후 주기가 임박/도래하면 노출 + regroom 쿠폰 자동 발급
function groomCycleDays(species){
  return species === 'cat' ? 63 : 38;   // 고양이 ~9주, 개 ~5.5주
}
function renderGroomReminder(){
  if(!S.loggedIn || !S.pets.length) return '';
  const today = new Date();
  // 펫별 마지막 그루밍 예약 찾기 (과거 분류)
  let best = null;  // {pet, last, ago, cycleDays, due}
  S.pets.forEach(pet=>{
    const grooms = (S.bookings||[]).filter(b=>
      b.service==='grooming' && (b.petIds||[]).includes(pet.id) && b.dateObj
    ).sort((a,b)=> new Date(b.dateObj) - new Date(a.dateObj));
    if(!grooms.length) return;
    const last = new Date(grooms[0].dateObj);
    const ago = Math.round((today - last) / 86400000);
    if(ago < 0) return;
    const cycleDays = groomCycleDays(pet.species);
    // 주기의 80% 이상 지나면 노출 (임박), 100% 넘으면 due
    if(ago >= cycleDays * 0.8){
      const cand = { pet, last, ago, cycleDays, due: ago >= cycleDays };
      // 가장 시급한(주기 초과율 큰) 펫 1마리만
      if(!best || (cand.ago/cand.cycleDays) > (best.ago/best.cycleDays)) best = cand;
    }
  });
  if(!best) return '';
  // due 상태면 regroom 쿠폰 자동 발급 (중복 방지)
  if(best.due){
    const hasReg = (S.coupons||[]).some(c=>c.template==='regroom' && !c.usedAt && new Date(c.expiry)>=today);
    if(!hasReg) grantCoupon('regroom');
  }
  const cycleWeeks = Math.round(best.cycleDays / 7);
  // 권장 다음 날짜
  const nextDate = new Date(best.last); nextDate.setDate(nextDate.getDate() + best.cycleDays);
  const dateLabel = t('card.month',{m:nextDate.getMonth()+1, d:nextDate.getDate()});
  const title = best.due
    ? t('groomRemind.dueTitle',{pet:best.pet.name})
    : t('groomRemind.soonTitle',{pet:best.pet.name});
  const sub = best.due
    ? t('groomRemind.dueSub',{ago:best.ago, cycle:cycleWeeks})
    : t('groomRemind.soonSub',{date:dateLabel, ago:best.ago});
  const hasCoupon = best.due;
  return `<div class="card" style="padding:14px 16px;margin-top:14px;background:linear-gradient(135deg,#F2EBDD,#EFE3CF);border:1.5px solid #E0CFA8">
    <div style="display:flex;align-items:flex-start;gap:11px">
      <span style="font-size:24px;line-height:1.1">✂️</span>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--brown);line-height:1.3">${title}</div>
        <div style="font-size:11.5px;color:var(--mocha);margin-top:3px;line-height:1.45">${sub}</div>
        ${hasCoupon?`<div style="font-size:11px;color:var(--accentDk);font-weight:700;margin-top:5px">${t('groomRemind.couponHint')}</div>`:''}
      </div>
    </div>
    <button class="btn" style="margin-top:11px;font-size:13px;padding:11px" onclick="S._pendingSvc=null;pickService('grooming')">${t('groomRemind.cta')}</button>
  </div>`;
}

// 마이펫 — '내 패키지' 섹션 렌더링
// 패키지 권유 배너: 그루밍/스파 과거 이용 2회+이고 활성 패키지가 없을 때
// 마이펫에 자연스럽게 노출 (재방문 트리거 + 1회 이탈률 45.5% 대응)
function renderPackageSuggestion(){
  if(!S.loggedIn) return '';

  const counts = { grooming:0, spa:0 };
  (S.bookings||[]).forEach(b=>{
    if((b.service==='grooming' || b.service==='spa') && classifyBooking(b)==='past'){

        <div style="font-size:11.5px;color:var(--mocha);margin-top:2px;line-height:1.4">${t('myPkg.suggest.desc',{svc:svcName, n:counts[svc]})}</div>

    </div>
  </div>`;
}

// ============================ 쿠폰 시스템 ============================
// 1회 이탈률 45.5% 해결의 핵심 트리거: 첫 예약 후 자동 발급 쿠폰.
// 핸드오프 문서 8.4에 명시된 '신규→재방문' 재방문 트리거.
const COUPON_TEMPLATES = {
  // 첫 예약 후 자동 발급 (다음 방문 10% 할인)
  welcome15: {
    id: 'welcome15',
    type: 'percent',
    value: 10,
    labelKey: 'coupon.welcome15.label',
    descKey: 'coupon.welcome15.desc',
    sourceKey: 'coupon.welcome15.source',
    validDays: 30,
    icon: '🎁',
  },
  // 그루밍 주기 도래 시 발급 (9번: 개 5-6주, 고양이 8-10주)
  regroom: {
    id: 'regroom',
    type: 'percent',
    value: 10,
    labelKey: 'coupon.regroom.label',
    descKey: 'coupon.regroom.desc',
    sourceKey: 'coupon.regroom.source',
    validDays: 21,
    icon: '✂️',
    restrictTo: 'grooming',
  },
};

// 쿠폰 발급 (S.coupons에 추가) — 라벨/설명/출처는 i18n 키를 보관, 표시 시 t()로 변환
function grantCoupon(templateId){
  const tpl = COUPON_TEMPLATES[templateId];
  if(!tpl) return null;
  if(!S.coupons) S.coupons = [];
  const c = {
    id: 'CP-' + Date.now().toString(36).toUpperCase(),
    template: templateId,
    type: tpl.type,
    value: tpl.value,
    labelKey: tpl.labelKey,
    descKey: tpl.descKey,
    sourceKey: tpl.sourceKey,
    icon: tpl.icon,
    restrictTo: tpl.restrictTo || null,
    issuedAt: getToday(),
    expiry: addDays(tpl.validDays),
  };
  S.coupons.push(c);
  return c;
}
// 쿠폰 표시 헬퍼 (i18n)
function couponLabel(c){ return c.labelKey ? t(c.labelKey) : (c.label||''); }
function couponDesc(c){ return c.descKey ? t(c.descKey) : (c.desc||''); }
function couponSource(c){ return c.sourceKey ? t(c.sourceKey) : (c.source||''); }

// 활성 쿠폰 가져오기 (만료 안 됨 + 미사용)
function getActiveCoupons(){
  if(!S.coupons) return [];
  const today = new Date();
  return S.coupons.filter(c => !c.usedAt && new Date(c.expiry) >= today);
}

// 특정 서비스에 적용 가능한 활성 쿠폰 (restrictTo 없으면 모든 서비스)
function couponsForService(service){
  return getActiveCoupons().filter(c => !c.restrictTo || c.restrictTo === service);
}
// 자동 추천 — 해당 서비스에 적용 가능한 가장 큰 할인 쿠폰
function bestCouponForService(service){
  const list = couponsForService(service);
  if(!list.length) return null;
  // percent는 value 그대로, amount는 대략 비교 위해 큰 값 우선
  return list.slice().sort((a,b)=>{
    const av = a.type==='percent' ? a.value*10000 : a.value;
    const bv = b.type==='percent' ? b.value*10000 : b.value;
    return bv-av;
  })[0];
}
// 쿠폰 할인액 계산
function couponDiscountAmount(c, baseAmount){
  if(!c) return 0;
  if(c.type==='percent') return Math.round(baseAmount * c.value / 100);
  return Math.min(baseAmount, c.value);
}

// 첫 예약 트리거 — vDone에서 호출
// 한 번만 발급 (S.coupons에 같은 template이 있으면 스킵)
function maybeIssueWelcomeCoupon(){
  if(!S.coupons) S.coupons = [];
  const already = S.coupons.some(c => c.template === 'welcome15');
  if(already) return null;
  if(S.bookings.length !== 1) return null;   // 첫 예약일 때만
  return grantCoupon('welcome15');
}

// --- reuse booking ---
function reuseBooking(id){
  const b=S.bookings.find(x=>x.id===id); if(!b) return;
  S.d={...b.config}; S.prefill=true;
  // jump to date step
  const st=steps(); const dateIdx=st.indexOf(SERVICES[b.service].type==='stay'?'dates':'date');
  S.d.dateA=null; S.d.dateB=null; S.d.time=null; // re-pick date only

    Zalo:  {name:'Minh', contact:'Zalo @minh',    channel:'Zalo',     phoneAuto:'0901 234 567',  country:'VN'},
    Kakao: {name:'지현', contact:'카톡 @jhpark',   channel:'카카오톡',  phoneAuto:'010-9876-5432', country:'KR'},
    Phone: {name:'회원', contact:S._phone||'010-····-····', channel:'문자(SMS)', phoneAuto:S._phone||'010-0000-0000', country:null},
  };
  S.user = {
    ...profiles[provider],
    gender: null,            // 가입 직후 비어있음 — 나중에 선택 입력
    birthday: null,
    marketingOptIn: null,    // null = 미선택, true/false = 응답
  };
  // 가입 직후 본인 전화번호를 default 연락처로 자동 저장
  if(S.phones.length===0 && S.user.phoneAuto){
    S.phones.push({ id:'ph'+Date.now(), label:'본인', number:S.user.phoneAuto, isDefault:true });
  }
  // 시연용 데이터 시드 — 마이펫 화면에서 다시 이용하기·패키지 안내 배너가 자연스럽게 보이도록
  // 펫 1마리 + 과거 그루밍 2~3회, 스파 1회 (모두 past 분류). 활성 패키지 없음.
  // 펫 추가 흐름이 따로 진행되는 경우(forBooking이고 pets 비어있을 때)에는 시드 안 함
  if(S.pets.length === 0 && S.bookings.length === 0 && !S._pendingSvc){
    const lulu = {
      id:'p-demo-lulu', name:'Lulu', species:'dog', breed:'말티즈', band:'w1', emoji:'🐶',
      vaccines:{ rabies:'ok', core:'ok', note:'2026-02-10 하노이 동물병원' },
      traits:'', gender:null, birthday:null, photo:null,
    };
    S.pets.push(lulu);
    // 과거 그루밍 3건 (가장 오래된 → 최근 순)
    const mkPast = (daysAgo, svc, room, optKey, amount) => {
      const d = new Date(Date.now() - daysAgo*86400000);
      const m = d.getMonth(), day = d.getDate();
      return {
        id:'b-demo-'+svc+'-'+daysAgo,
        service:svc, room, optName:optKey,    // optName도 호환 위해 저장
        petNames:'Lulu', petIds:[lulu.id],
        dateObj:d, dateLabel:`${m+1}/${day}`,
        pickup:'none', notes:'', amount, paid:true, starred:false,
        code:'PP-DEMO'+daysAgo,
        config:{ service:svc, room, dateA:{y:d.getFullYear(),m,d:day}, time:'14:00', petIds:[lulu.id] },
      };
    };
    S.bookings.push(
      mkPast(160, 'grooming', 'full', '풀 그루밍', 600000),
      mkPast(105, 'grooming', 'full', '풀 그루밍', 600000),
      mkPast(50,  'grooming', 'bath', '목욕 & 위생', 360000),
      mkPast(75,  'spa',      'bath', '기본 케어',   320000),
    );
  }
  closeSheet();
  // R3: 재로그인 여부 — 이번 로그인 전에 이미 마지막 수단이 기록돼 있었으면 '다시 로그인'
  const wasReturning = !!S._lastProvider;
  S._lastProvider = provider;   // 이번 수단을 기억 (다음 진입 시 기본 표시)
  const provLabel = t('auth.provName.'+provider) || provider;
  hint(wasReturning ? t('auth.welcomeBack',{provider:provLabel}) : t('auth.welcome',{provider:provLabel}));
  const after=S._authAfter;
  const forBooking = (after==='book' || S._pendingSvc);
  if(forBooking){
    if(S.pets.length===0){ openAddPet(S._pendingSvc?'pickAfter':'flowStart'); }
    else if(S._pendingSvc){ const k=S._pendingSvc; S._pendingSvc=null; pickService(k); }
    else startBooking();
  } else {
    go(after||'mypet');
  }
}

function setVaccine(kind, val){

  renderPetSheet();

// 종 선택: 고양이는 광견병 대상이 아니므로 rabies 값을 비운다
function setPetSpecies(sp){
  S._petDraft.species = sp;
  S._petDraft.breed = null;
  if(sp==='cat' && S._petDraft.vaccines){ S._petDraft.vaccines.rabies = null; }
  renderPetSheet();
}
// 한 펫의 백신 상태 요약
// species를 넘기면 고양이는 광견병(rabies) 판정에서 제외 (고양이=core만, 개=rabies+core)
function vaccinesSummary(v, species){
  if(!v) return { cls:'unknown', label:t('vac.sum.unknown'), ok:false };
  const isCat = species === 'cat';
  if(isCat){
    // 고양이: 종합백신(core)만 본다
    if(v.core==='ok') return { cls:'ok', label:t('vac.sum.ok'), ok:true };
    if(v.core==='no') return { cls:'no', label:t('vac.sum.no'), ok:false };
    return { cls:'unknown', label:t('vac.sum.unknown'), ok:false };
  }
  // 개(또는 미지정): rabies + core 둘 다
  const ok = v.rabies==='ok' && v.core==='ok';
  if(ok) return { cls:'ok', label:t('vac.sum.ok'), ok:true };
  if(v.rabies==='no' || v.core==='no') return { cls:'no', label:t('vac.sum.no'), ok:false };
  if(v.rabies==='ok' || v.core==='ok') return { cls:'partial', label:t('vac.sum.partial'), ok:false };
  return { cls:'unknown', label:t('vac.sum.unknown'), ok:false };
}
function refreshPetReady(){ const d=S._petDraft; const b=$('petSave');
  if(b) b.disabled=!(d.name.trim()&&d.breed&&d.band); }
function savePet(){
  const d=S._petDraft;
  const emoji = d.species==='dog'?'🐶':'🐱';
  const vaccines = d.vaccines || {rabies:null, core:null, note:''};
  const traits = (d.traits||'').trim();
  // 편집 모드: 기존 펫 업데이트 (gender·birthday·photo 등 추가 필드 유지)
  if(d.editId){
    const idx = S.pets.findIndex(p=>p.id===d.editId);
    if(idx>=0){
      S.pets[idx] = {
        ...S.pets[idx],
        name:d.name.trim(), species:d.species, breed:d.breed, band:d.band, emoji, vaccines, traits,
        // 편집 모드에서 변경된 추가 정보가 있으면 반영, 없으면 기존 값 유지
        gender:  d.gender   !== undefined ? d.gender   : S.pets[idx].gender,
        birthday:d.birthday !== undefined ? d.birthday : S.pets[idx].birthday,
        photo:   d.photo    !== undefined ? d.photo    : S.pets[idx].photo,
      };
      closeSheet();
      hint(t('petForm.savedEdit',{name:d.name}));
      render('mypet');
      return;
    }
  }
  // 신규 등록 — 가입·예약 흐름에선 추가 정보는 비워두고 나중에 권유
  const pet={
    id:'p'+Date.now(), name:d.name.trim(), species:d.species, breed:d.breed, band:d.band, emoji,
    vaccines, traits,
    gender:null, birthday:null, photo:null,    // 추가 정보 슬롯 (나중에 채움)
  };
  S.pets.push(pet);
  closeSheet();
  const after=S._petAfter;
  if(after==='flow'){ S.d.petIds.push(pet.id); render('flow'); }
  else if(after==='pickAfter' && S._pendingSvc){ const k=S._pendingSvc; S._pendingSvc=null; pickService(k); }
  else if(after==='flowStart'){ startBooking(); }
  else if(S.view==='mypet'){ go('mypet'); }
  hint(t('petForm.savedNew',{name:pet.name}));
}

function openSheetHTML(html){ $('sheet').innerHTML=html; $('sheet').classList.add('show'); $('sheetbg').classList.add('show'); }

function bindFlow(){
  // 둘러보기 갤러리 도트 동기화
  const rail = $('spotrail');
  if(rail){
    const dots = document.querySelectorAll('.rdot');
    const sync = ()=>{
      const i = Math.round(rail.scrollLeft / (rail.scrollWidth / dots.length));
      dots.forEach((d,di)=>d.classList.toggle('on', di===Math.min(i,dots.length-1)));
    };
    rail.addEventListener('scroll', sync, {passive:true});
    sync();
  }
}

// 관리자 라우터
function goAdmin(view){
  ADMIN.view = view;
  location.hash = '#/admin/'+view;
  renderAdmin();
}
function renderAdmin(){
  const root = document.getElementById('adminroot');
  let body;
  if(ADMIN.view==='bookings')      body = vAdminBookings();
  else if(ADMIN.view==='members')  body = vAdminMembers();
  else if(ADMIN.view==='chat')     body = vAdminChat();
  else if(ADMIN.view==='livecam')  body = vAdminLiveCam();
  else                             body = vAdminDashboard();
  root.innerHTML = vAdminShell(body);
  window.scrollTo(0,0);
}

function vAdminShell(content){
  const navItems = [
    {k:'dashboard', l:t('admin.nav.dashboard'),  i:'📊'},
    {k:'bookings',  l:t('admin.nav.bookings'),   i:'📅'},
    {k:'members',   l:t('admin.nav.members'),    i:'👑'},
    {k:'chat',      l:t('admin.nav.chat'),       i:'💬'},
    {k:'livecam',   l:t('admin.nav.livecam'),    i:'📹'},
  ];
  const todayCount = ADMIN.todayBookings.length;
  const unread = ADMIN.chats.reduce((a,c)=>a+(c.unread||0),0);
  return `<div class="admshell">
    <aside class="admnav">
      <div class="admlogo">
        <img src="${LOGO_MARK}" alt="Posh Pet">
        <div><div class="al-t">Posh Pet</div><div class="al-s">${t('admin.short.toAdmin').replace('PoshPet ','')}</div></div>
      </div>
      ${navItems.map(n=>`<button class="admnavbtn ${ADMIN.view===n.k?'on':''}" onclick="goAdmin('${n.k}')">
        <span class="ai">${n.i}</span><span class="al">${n.l}</span>
        ${n.k==='chat'&&unread?`<span class="badge">${unread}</span>`:''}
        ${n.k==='bookings'?`<span class="cnt">${todayCount}</span>`:''}
      </button>`).join('')}
      <div class="admbot">
        <button class="admnavbtn" onclick="location.hash='';location.reload()"><span class="ai">🏠</span><span class="al">${t('admin.toCustomer')}</span></button>
        <div class="admme">
          <div class="ava">${ADMIN.staff.avatar}</div>
          <div><div class="mn">${ADMIN.staff.name}</div><div class="mr">${ADMIN.staff.role}</div></div>
        </div>
      </div>
    </aside>
    <main class="admmain">${content}</main>
  </div>`;
}

function renderMonthlyTrendChart(){
  const data = ADMIN.insights.monthlyRevenue;
  const max = Math.max(...data.map(d=>d.val));
  const avg = (data.reduce((a,d)=>a+d.val,0) / data.length).toFixed(1);
  const peak = max.toFixed(1);
  const prev = data[data.length-2].val;
  const cur  = data[data.length-1].val;
  const growth = ((cur - prev) / prev * 100).toFixed(1);
  const sign = growth >= 0 ? '+' : '';
  const cls = growth >= 0 ? 'up' : 'down';
  // 월 표시 (다국어)
  const lang = (typeof CURRENT_LANG !== 'undefined' && CURRENT_LANG) ? CURRENT_LANG : 'kr';
  const enShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthLabel = (mStr) => {
    const n = parseInt(mStr.split('-')[1], 10);
    if(lang==='vi') return 'T'+n;
    if(lang==='en') return enShort[n-1];
    return n+'월';
  };
  return `<div class="card admcard">
    <div class="cardh">${t('admin.dash.trendHead')} <span class="adm-section-sub">${t('admin.dash.trendSub')}</span></div>
    <div style="padding:14px 18px 16px">
      <div class="trendChart">
        ${data.map(d=>{
          const h = (d.val / max * 95).toFixed(1);
          return `<div class="trendBar">
            <div class="tb-val">${d.val.toFixed(1)}</div>
            <div class="tb-fill" style="height:${h}px"></div>
            <div class="tb-label">${monthLabel(d.m)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="trendStats">
        <div class="ts-cell"><span class="ts-l">${t('admin.dash.trendAvg')}</span><span class="ts-v">${avg}M</span></div>
        <div class="ts-cell"><span class="ts-l">${t('admin.dash.trendPeak')}</span><span class="ts-v">${peak}M</span></div>
        <div class="ts-cell"><span class="ts-l">${t('admin.dash.trendGrowth')}</span><span class="ts-v ${cls}">${sign}${growth}%</span></div>
      </div>
      <div style="background:var(--cream2);border-radius:10px;padding:10px 13px;margin-top:14px;font-size:11.5px;line-height:1.55;color:var(--mocha)">
        ${t('admin.dash.trendTip')}
      </div>
    </div>
  </div>`;
}

// Option B 헬퍼: 신규 vs 이탈 추이 (12개월 이중 막대)
function renderSignupChart(){
  const data = ADMIN.insights.monthlySignup;
  const max = Math.max(...data.flatMap(d=>[d.new, d.churn]));
  const totalNew   = data.reduce((a,d)=>a+d.new, 0);
  const totalChurn = data.reduce((a,d)=>a+d.churn, 0);
  const net = totalNew - totalChurn;
  const avg = (totalNew / data.length).toFixed(1);
  // 월 표시
  const lang = (typeof CURRENT_LANG !== 'undefined' && CURRENT_LANG) ? CURRENT_LANG : 'kr';
  const enShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthLabel = (mStr) => {
    const n = parseInt(mStr.split('-')[1], 10);
    if(lang==='vi') return 'T'+n;
    if(lang==='en') return enShort[n-1];
    return n+'월';
  };
  return `<div class="card admcard">
    <div class="cardh">${t('admin.dash.signupHead')} <span class="adm-section-sub">${t('admin.dash.signupSub')}</span></div>
    <div style="padding:14px 18px 16px">
      <div class="signupChart">
        ${data.map(d=>{
          const hNew   = (d.new   / max * 86).toFixed(1);
          const hChurn = (d.churn / max * 86).toFixed(1);
          return `<div class="signupBar">
            <div class="sb-pair">
              <div class="sb-new"   style="height:${hNew}px"   title="${t('admin.dash.signupNew')} ${d.new}"></div>
              <div class="sb-churn" style="height:${hChurn}px" title="${t('admin.dash.signupChurn')} ${d.churn}"></div>
            </div>
            <div class="sb-label">${monthLabel(d.m)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="signupLegend">
        <span><i class="new"></i>${t('admin.dash.signupNew')} ${totalNew}</span>
        <span><i class="churn"></i>${t('admin.dash.signupChurn')} ${totalChurn}</span>
        <span style="color:var(--good);font-weight:700">${t('admin.dash.signupNet')} +${net}</span>
      </div>
      <div style="background:var(--cream2);border-radius:10px;padding:10px 13px;margin-top:6px;font-size:11.5px;line-height:1.55;color:var(--mocha)">
        ${t('admin.dash.signupTip',{avg, net})}
      </div>
    </div>
  </div>`;
}

// Option B 헬퍼: 패키지 소진율 (잔여 횟수 분포 스택 바)
function renderPackageBurnChart(){
  const data = ADMIN.insights.packageBurn;
  // 카테고리별 잔여 구간 정의
  const buckets = {
    grooming:{ order:['12','9-11','6-8','3-5','0-2'], classes:['s-full','s-most','s-mid','s-low','s-empty'] },
    spa:     { order:['12','9-11','6-8','3-5','0-2'], classes:['s-full','s-most','s-mid','s-low','s-empty'] },
    daycare: { order:['20','15-19','10-14','5-9','0-4'], classes:['s-full','s-most','s-mid','s-low','s-empty'] },
  };
  const labelKeys = {
    grooming:'admin.dash.pkgGrooming',
    spa:'admin.dash.pkgSpa',
    daycare:'admin.dash.pkgDaycare',
  };
  return `<div class="card admcard">
    <div class="cardh">${t('admin.dash.pkgHead')} <span class="adm-section-sub">${t('admin.dash.pkgSub')}</span></div>
    <div style="padding:14px 18px 16px">
      ${Object.keys(data).map(svc=>{
        const d = data[svc];
        const bk = buckets[svc];
        return `<div class="pkgRow">
          <div class="pr-h">
            <span class="pr-l">${t(labelKeys[svc])}</span>
            <span class="pr-c">${t('admin.dash.pkgActive',{n:d.total})}</span>
          </div>
          <div class="pr-bar">
            ${bk.order.map((label, i)=>{
              const cnt = d.remaining[label];
              const pct = (cnt / d.total * 100).toFixed(1);
              if(cnt <= 0) return '';
              return `<div class="pr-seg ${bk.classes[i]}" style="width:${pct}%" title="${t('admin.dash.pkgRemUses',{label})} ${cnt}">${cnt}</div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
      <div class="pkgLegend">
        ${buckets.grooming.order.map((label, i)=>`<span><i class="${buckets.grooming.classes[i]}" style="background:${['#3F8D52','#6BA85C','#C9A45A','#D88','#A44'][i]}"></i>${t('admin.dash.pkgRemUses',{label})}</span>`).join('')}
      </div>
      <div style="background:var(--cream2);border-radius:10px;padding:10px 13px;margin-top:12px;font-size:11.5px;line-height:1.55;color:var(--mocha)">
        ${t('admin.dash.pkgTip')}
      </div>
    </div>
  </div>`;
}

// 백신 필요 서비스 식별 (daycare·pool·hotel은 필수)
const VACCINE_REQUIRED_SVCS = ['daycare','pool','hotel'];

// 오늘 체크인 예정 중 백신 미등록·일부등록 케이스 카드
function renderTodayVaccineAlert(todayBookings){
  // 백신 필요 서비스 + 아직 체크인 안 됨(scheduled, waiting) + 백신 부족
  const targets = todayBookings.filter(b =>
    VACCINE_REQUIRED_SVCS.includes(b.svc) &&
    (b.vaccine === 'missing' || b.vaccine === 'partial') &&
    (b.status === 'scheduled' || b.status === 'waiting')
  );
  if(targets.length === 0){
    const okCount = todayBookings.filter(b=>VACCINE_REQUIRED_SVCS.includes(b.svc) && (b.status==='scheduled'||b.status==='waiting')).length;
    return `<div class="card admcard vaccine-alert-ok">
      <div class="va-h">
        <span class="va-ic ok">✓</span>
        <div class="va-tx"><b>${t('admin.vac.allOk')}</b><span>${t('admin.vac.allOkSub',{n:okCount})}</span></div>
      </div>
    </div>`;
  }
  return `<div class="card admcard vaccine-alert">

function sendVaccineReminderMsg(bookingId){
  const b = ADMIN.todayBookings.find(x=>x.id===bookingId);

  ADMIN.selectedChat = ADMIN.chats[0].id;
  goAdmin('chat');
}

// 시연용: 현장 확인으로 처리

  const b = ADMIN.todayBookings.find(x=>x.id===bookingId);

  b.vaccineDetail = t('admin.vac.onsiteNote');
  renderAdmin();
}

const CAMPAIGN_STATE = {
  segment: '3m', lang: 'auto', channels: ['kakao','zalo'],
  optInOnly: true, discount: 10, customText: null,
  step: 'compose', sentCount: 0,
};

function openDormantCampaign(segment){
  CAMPAIGN_STATE.segment = segment;
  CAMPAIGN_STATE.lang = 'auto';
  CAMPAIGN_STATE.channels = ['kakao','zalo'];
  CAMPAIGN_STATE.optInOnly = true;
  CAMPAIGN_STATE.discount = segment === '3m' ? 10 : 20;
  CAMPAIGN_STATE.customText = null;
  CAMPAIGN_STATE.step = 'compose';
  CAMPAIGN_STATE.sentCount = 0;
  renderDormantCampaign();
}

function getDormantTargets(){
  const list = CAMPAIGN_STATE.segment === '3m'
    ? ADMIN.dormantCustomers.threeMonths
    : ADMIN.dormantCustomers.sixMonths;
  return list.filter(c => {
    if(CAMPAIGN_STATE.optInOnly && !c.optIn) return false;
    if(CAMPAIGN_STATE.channels.length === 0) return false;
    if(!CAMPAIGN_STATE.channels.includes(c.ch)) return false;
    return true;
  });
}

function renderMessageForCustomer(c){
  const lang = CAMPAIGN_STATE.lang === 'auto'
    ? (c.ch === 'kakao' ? 'kr' : 'vi')
    : CAMPAIGN_STATE.lang;
  const tpl = DORMANT_TEMPLATES[CAMPAIGN_STATE.segment][lang];
  const raw = CAMPAIGN_STATE.customText || tpl.text;
  const lastDate = new Date(c.last);
  const today = new Date();
  const days = Math.max(0, Math.round((today - lastDate) / 86400000));
  return raw
    .replace(/\{이름\}/g, c.name)
    .replace(/\{펫\}/g, c.pet)
    .replace(/\{일수\}/g, days)
    .replace(/\{할인\}/g, CAMPAIGN_STATE.discount);
}

function toggleCampChannel(ch){
  const i = CAMPAIGN_STATE.channels.indexOf(ch);
  if(i>=0) CAMPAIGN_STATE.channels.splice(i,1);
  else CAMPAIGN_STATE.channels.push(ch);
  renderDormantCampaign();
}

function confirmDormantCampaign(){
  const targets = getDormantTargets();
  if(targets.length === 0){ hint(t('admin.camp.noTargets')); return; }
  CAMPAIGN_STATE.sentCount = targets.length;
  CAMPAIGN_STATE.step = 'sent';
  const now = new Date();
  const stamp = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const label = CAMPAIGN_STATE.segment === '3m' ? t('admin.camp.camp3m') : t('admin.camp.camp6m');
  ADMIN.campaigns.push({
    id: 'CMP-' + Date.now().toString(36).toUpperCase(),
    label, segment: CAMPAIGN_STATE.segment,
    recipients: targets.length, discount: CAMPAIGN_STATE.discount,
    sentAt: stamp,
  });
  renderDormantCampaign();
}

// VIP 회원 상세 — 사용 내역 시계열 (Berry 시트 스타일)
function openMemberDetail(memberId){
  const m = ADMIN.members.find(x=>x.id===memberId);
  if(!m) return;

  // Option C — 필터 상태 초기화 (없으면 기본값)
  if(!ADMIN._mdFilter) ADMIN._mdFilter = { svc:'all', period:'all', memberId:null };
  if(ADMIN._mdFilter.memberId !== memberId){
    // 다른 회원으로 바뀌면 필터 리셋
    ADMIN._mdFilter = { svc:'all', period:'all', memberId };
  }
  const F = ADMIN._mdFilter;

  // 기간 필터를 위한 기준일 계산
  const today = new Date();
  const cutoffDays = F.period==='3m' ? 90 : F.period==='6m' ? 180 : F.period==='1y' ? 365 : null;
  const cutoffDate = cutoffDays ? new Date(today - cutoffDays*86400000).toISOString().slice(0,10) : null;

  // 잔액 진행률 (충전 → 현재 — 필터 무관, 전체 기준)
  const totalCharged = m.history.filter(h=>h.type==='charge').reduce((a,h)=>a+h.amount, 0);
  const usedPct = totalCharged ? Math.min(100, Math.round(m.used / totalCharged * 100)) : 0;
  const remainPct = 100 - usedPct;

  // 서비스별 사용 집계 (전체 기준 — 필터로는 변하지 않음, "총 누적"임)
  const svcAgg = {};
  m.history.filter(h=>h.type==='service').forEach(h=>{
    const key = h.svc || 'etc';
    if(!svcAgg[key]) svcAgg[key] = { count:0, total:0 };
    svcAgg[key].count += 1;
    svcAgg[key].total += Math.abs(h.amount);
  });
  // 서비스별 메타: 이름은 i18n으로 동적 가져옴, 아이콘/컬러는 상수
  const svcMeta = {
    grooming:{name:t('admin.mDetail.svcCol.grooming'), icon:'✂️', color:'#7a5a3a'},
    spa:     {name:t('admin.mDetail.svcCol.spa'),      icon:'🛁', color:'#3f6b52'},
    pool:    {name:t('admin.mDetail.svcCol.pool'),     icon:'🏊', color:'#2f6b7a'},
    daycare: {name:t('admin.mDetail.svcCol.daycare'),  icon:'🎾', color:'#7a6b3a'},
    hotel:   {name:t('admin.mDetail.svcCol.hotel'),    icon:'🛏️', color:'#5a3f6b'},
    etc:     {name:t('admin.mDetail.svcCol.etc'),      icon:'·',  color:'#888'},
  };
  const svcEntries = Object.entries(svcAgg)
    .map(([k,v])=>({key:k, meta:svcMeta[k]||svcMeta.etc, ...v}))
    .sort((a,b)=>b.total-a.total);
  const svcMaxTotal = svcEntries[0]?.total || 1;
  // 어떤 서비스 키들이 이 회원에게 있는지 — 필터 칩에 표시
  const availableSvcs = Object.keys(svcAgg);

  // 시계열 — 최신순 정렬, 필터 적용
  const allHistory = [...m.history].sort((a,b)=>b.date.localeCompare(a.date));
  const filteredHistory = allHistory.filter(h => {
    // 서비스 필터: charge는 항상 보임, service는 svc 매칭
    if(F.svc !== 'all' && h.type==='service' && h.svc !== F.svc) return false;
    // 기간 필터: cutoffDate보다 이전이면 제외
    if(cutoffDate && h.date < cutoffDate) return false;
    return true;
  });

  // ===== 360도 뷰 파생 데이터 =====
  const totalVisits = m.history.filter(h=>h.type==='service').length;
  const favSvc = svcEntries[0] ? svcEntries[0].meta.name : '—';
  // 이용 기간 (가입월 → 오늘, 개월)
  let tenureMonths = 0;
  if(m.joined && /^\d{4}-\d{2}/.test(m.joined)){
    const [jy, jm] = m.joined.split('-').map(Number);
    tenureMonths = (today.getFullYear()-jy)*12 + (today.getMonth()+1 - jm);
    tenureMonths = Math.max(0, tenureMonths);
  }
  // 추천 액션 계산
  const actions = [];
  if(m.balance <= 2000000){
    actions.push(t('admin.m360.actLowBalance',{bal:fmt(m.balance)+' VND'}));
  }
  (m.petProfiles||[]).forEach(p=>{
    if(p.vaccine==='partial' || p.vaccine==='no'){
      actions.push(t('admin.m360.actVacMissing',{pet:p.name}));
    }
  });
  // 그루밍 주기: 마지막 그루밍이 오래됐으면 (간단히 history 기준)
  const lastGroom = m.history.filter(h=>h.svc==='grooming').sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(lastGroom){
    const ago = Math.round((today - new Date(lastGroom.date)) / 86400000);
    if(ago >= 40){
      const gp = (m.petProfiles||[]).find(p=>p.species==='dog') || (m.petProfiles||[])[0];
      if(gp) actions.push(t('admin.m360.actGroomDue',{pet:gp.name}));
    }
  }
  if(actions.length === 0) actions.push(t('admin.m360.actAllGood'));

  // 백신 상태 → 라벨/클래스
  const vacInfo = (v) => v==='ok' ? {cls:'ok', label:t('admin.m360.vacOk')}
                       : v==='partial' ? {cls:'partial', label:t('admin.m360.vacPartial')}
                       : {cls:'no', label:t('admin.m360.vacNo')};

  openSheetHTML(`<div class="grab"></div>
    <!-- 헤더 -->
    <div class="md-head">
      <div class="md-h-l">
        <div class="md-name">${m.name}</div>
        <div class="md-meta">
          ${m.contact} · <span class="m-tier">${t('admin.mem.tierName',{tier:m.tier})}</span>
          <span style="color:var(--gray);margin-left:6px">${t('admin.mDetail.joined',{d:m.joined})}</span>
        </div>
        <div class="md-pets">${t('admin.mDetail.pets',{pets:m.petNames.join(' · '), recent:m.recent})}</div>
      </div>
    </div>

    <!-- 360도: 고객 요약 -->
    <div class="m360-section">
      <div class="m360-h">${t('admin.m360.statsHead')}</div>
      <div class="m360-stats">
        <div class="m360-stat"><div class="m360-stat-l">${t('admin.m360.statVisits')}</div><div class="m360-stat-v">${totalVisits}</div></div>
        <div class="m360-stat"><div class="m360-stat-l">${t('admin.m360.statSpend')}</div><div class="m360-stat-v">${fmt(m.used)}</div></div>
        <div class="m360-stat"><div class="m360-stat-l">${t('admin.m360.statFav')}</div><div class="m360-stat-v">${favSvc}</div></div>
        <div class="m360-stat"><div class="m360-stat-l">${t('admin.m360.statTenure')}</div><div class="m360-stat-v">${t('admin.m360.tenureMonths',{n:tenureMonths})}</div></div>
      </div>
    </div>

    <!-- 360도: 추천 액션 -->
    <div class="m360-section">
      <div class="m360-h">${t('admin.m360.nextHead')}</div>
      <div class="m360-actions">
        ${actions.map(a=>`<div class="m360-action">${a}</div>`).join('')}
      </div>
    </div>

    <!-- 360도: 반려동물 프로필 -->
    ${(m.petProfiles && m.petProfiles.length) ? `<div class="m360-section">
      <div class="m360-h">${t('admin.m360.petsHead')}</div>
      ${m.petProfiles.map(p=>{
        const vi = vacInfo(p.vaccine);
        return `<div class="m360-pet">
          <div class="m360-pet-ic">${p.species==='cat'?'🐱':'🐶'}</div>
          <div class="m360-pet-tx">
            <div class="m360-pet-nm">${p.name}</div>
            <div class="m360-pet-meta">${p.breed} · ${p.band}</div>
            ${p.traits?`<div class="m360-pet-traits"><b>${t('admin.m360.traitsLabel')}:</b> ${p.traits}</div>`:''}
          </div>
          <span class="m360-vac ${vi.cls}">${vi.label}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- 360도: 운영 메모 -->
    ${m.staffNote ? `<div class="m360-section">
      <div class="m360-h">${t('admin.m360.noteHead')}</div>
      <div class="m360-note">📝 ${m.staffNote}</div>
    </div>` : ''}

    <!-- 잔액 진행 바 -->
    <div class="md-balance">
      <div class="md-bal-h">
        <span>${t('admin.mDetail.balance',{v:fmt(m.balance)+' <em>VND</em>'})}</span>
        <span style="color:var(--gray);font-size:11.5px">${t('admin.mDetail.totalCharged',{v:fmt(totalCharged)})}</span>
      </div>
      <div class="md-bal-bar">
        <div class="md-bal-used" style="width:${usedPct}%"></div>
        <div class="md-bal-rem" style="width:${remainPct}%"></div>
      </div>
      <div class="md-bal-legend">
        <span><i style="background:var(--mocha)"></i>${t('admin.mDetail.legendUsed',{v:fmt(m.used), pct:usedPct})}</span>
        <span><i style="background:var(--good)"></i>${t('admin.mDetail.legendRem',{v:fmt(m.balance), pct:remainPct})}</span>
      </div>
    </div>

    <!-- 서비스별 사용 집계 -->
    <div class="md-svc-section">
      <div class="md-section-h">${t('admin.mDetail.svcUseHead')} <span class="adm-section-sub">${t('admin.mDetail.svcUseSub',{n:m.history.filter(h=>h.type==='service').length})}</span></div>
      ${svcEntries.map(s=>`
        <div class="md-svc-row">
          <div class="md-svc-l">
            <span class="md-svc-ic" style="background:${s.meta.color}20;color:${s.meta.color}">${s.meta.icon}</span>
            <span class="md-svc-n">${s.meta.name}</span>
            <span class="md-svc-c">${t('admin.mDetail.svcCountUnit',{n:s.count})}</span>
          </div>
          <div class="md-svc-bar"><div class="md-svc-fill" style="width:${(s.total/svcMaxTotal*100).toFixed(0)}%;background:${s.meta.color}"></div></div>
          <div class="md-svc-t">${fmt(s.total)} <em>VND</em></div>
        </div>`).join('')}
    </div>

    <!-- Option C: 필터 -->
    <div class="md-filter-section">
      <div class="md-filter-h">
        <span>${t('admin.mDetail.filterSvcHead')}</span>
      </div>
      <div class="md-filter-row">
        <button class="md-filter-chip ${F.svc==='all'?'on':''}" onclick="ADMIN._mdFilter.svc='all';openMemberDetail('${m.id}')">${t('admin.mDetail.filterAll')}</button>
        ${availableSvcs.map(svcKey=>{
          const meta = svcMeta[svcKey] || svcMeta.etc;
          return `<button class="md-filter-chip ${F.svc===svcKey?'on':''}" onclick="ADMIN._mdFilter.svc='${svcKey}';openMemberDetail('${m.id}')">${meta.icon} ${meta.name}</button>`;
        }).join('')}
      </div>
      <div class="md-filter-h" style="margin-top:12px">
        <span>${t('admin.mDetail.filterPeriodHead')}</span>
      </div>
      <div class="md-filter-row">
        <button class="md-filter-chip ${F.period==='3m'?'on':''}" onclick="ADMIN._mdFilter.period='3m';openMemberDetail('${m.id}')">${t('admin.mDetail.period3m')}</button>
        <button class="md-filter-chip ${F.period==='6m'?'on':''}" onclick="ADMIN._mdFilter.period='6m';openMemberDetail('${m.id}')">${t('admin.mDetail.period6m')}</button>
        <button class="md-filter-chip ${F.period==='1y'?'on':''}" onclick="ADMIN._mdFilter.period='1y';openMemberDetail('${m.id}')">${t('admin.mDetail.period1y')}</button>
        <button class="md-filter-chip ${F.period==='all'?'on':''}" onclick="ADMIN._mdFilter.period='all';openMemberDetail('${m.id}')">${t('admin.mDetail.periodAll')}</button>
      </div>
      <div class="md-filter-status">${t('admin.mDetail.filterShowing',{n:filteredHistory.length, total:allHistory.length})}</div>
    </div>

    <!-- 사용 내역 시계열 -->
    <div class="md-tl-section">
      <div class="md-section-h">${t('admin.mDetail.tlHead')} <span class="adm-section-sub">${t('admin.mDetail.tlHeadSub')}</span></div>
      <div class="md-tl">
        ${filteredHistory.length === 0 ? `<div class="empty" style="padding:24px;text-align:center;color:var(--gray)">${t('admin.mDetail.filterEmpty')}</div>` : filteredHistory.map((h,i)=>{
          const meta = h.svc ? (svcMeta[h.svc]||svcMeta.etc) : null;
          const isCharge = h.type==='charge';
          return `<div class="md-tl-row">
            <div class="md-tl-date">
              <div class="md-tl-d">${h.date.slice(5)}</div>
              <div class="md-tl-y">${h.date.slice(0,4)}</div>
            </div>
            <div class="md-tl-dot ${isCharge?'charge':''}" style="${meta?`background:${meta.color}`:''}"></div>
            <div class="md-tl-card ${isCharge?'charge':''}">
              <div class="md-tl-row1">
                ${meta?`<span class="md-tl-ic" style="background:${meta.color}20;color:${meta.color}">${meta.icon}</span>`:'<span class="md-tl-ic charge">＋</span>'}
                <span class="md-tl-label">${h.label}</span>
                ${h.note?`<span class="md-tl-note">${h.note}</span>`:''}
              </div>
              ${h.pet?`<div class="md-tl-sub">${h.pet}</div>`:''}
              ${h.paid?`<div class="md-tl-sub">${h.paid}</div>`:''}
              <div class="md-tl-amt-row">
                <span class="md-tl-amt ${isCharge?'plus':'minus'}">${h.amount>0?'+':''}${fmt(h.amount)} VND</span>
                <span class="md-tl-bal">${t('admin.mDetail.tlBalance',{v:fmt(h.balance)})}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Option C: 내보내기 -->
    <div class="md-export">
      <div class="md-export-h">${t('admin.mDetail.exportHead')}</div>
      <div class="md-export-row">
        <button class="md-export-btn" onclick="exportMemberHistory('${m.id}','pdf')">${t('admin.mDetail.exportPdf')}</button>
        <button class="md-export-btn" onclick="exportMemberHistory('${m.id}','excel')">${t('admin.mDetail.exportExcel')}</button>
        <button class="md-export-btn" onclick="exportMemberHistory('${m.id}','email')">${t('admin.mDetail.exportEmail')}</button>
      </div>
      <div class="md-export-note">${t('admin.mDetail.exportNote')}</div>
    </div>

    <button class="btn ghost" style="margin-top:14px" onclick="openContactSheet()">${t('admin.mDetail.msgCta',{name:m.name})}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${t('admin.mDetail.closeBtn')}</button>
  `);
}

// Option C: 내보내기 시연 (실제로는 백오피스 호출)
function exportMemberHistory(memberId, format){
  const m = ADMIN.members.find(x=>x.id===memberId);
  if(!m) return;
  if(format === 'pdf'){
    hint(t('admin.mDetail.exportPdfToast',{name:m.name}));
  } else if(format === 'excel'){
    hint(t('admin.mDetail.exportExcelToast',{name:m.name}));
  } else if(format === 'email'){
    hint(t('admin.mDetail.exportEmailToast',{name:m.name}));
  }
}

// 해시 변경 감지
function checkRouteHash(){
  const h = location.hash || '';
  if(h.startsWith('#/admin')){
    document.getElementById('ppwrap').classList.add('admin');
    const seg = h.split('/')[2] || 'dashboard';
    ADMIN.view = ['dashboard','bookings','members','chat','livecam'].includes(seg) ? seg : 'dashboard';
    renderAdmin();
  } else {
    document.getElementById('ppwrap').classList.remove('admin');
  }
}
window.addEventListener('hashchange', checkRouteHash);
