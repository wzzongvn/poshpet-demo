function payWithPackage(bookingId, packageId){
  const b = S.bookings.find(x=>x.id===bookingId);
  const pk = S.packages.find(x=>x.id===packageId);
  if(!b || !pk){ hint(t('pay.pkg.notInfo')); return; }
  if(consumePackage(packageId)){
    b.paid = true;
    b.paidBy = 'package';
    b.packageId = packageId;
    hint(t('pay.pkg.done',{n:pk.remainUses}));
    closeSheet();
    render('mypet');
  } else {
    hint(t('pay.pkg.fail'));
  }
}

function openSubscribeEditor(existing){
  // 임시 편집 상태
  S._subDraft = existing
    ? JSON.parse(JSON.stringify(existing))
    : { cycle:3, items:[], nextDate:nextDateInWeeks(3) };

}
function renderSubscribeEditor(){
  const d = S._subDraft;
  const sumQty = d.items.reduce((a,it)=>a+it.qty,0);
  const sumTotal = d.items.reduce((a,it)=>a+it.qty*it.price,0);
  openSheetHTML(`<div class="grab"></div>
    <div style="font-family:'Fraunces',serif;font-size:21px;color:var(--brown);font-weight:600;padding:0 2px 2px">${t('sub.editTitle')}</div>

    <div class="sublabel">${t('sub.cycleLabel')}</div>
    <div class="cyclegrid">
      ${CYCLES.map(c=>`<button class="chip ${d.cycle===c.id?'on':''}" onclick="S._subDraft.cycle=${c.id}; S._subDraft.nextDate=nextDateInWeeks(${c.id}); renderSubscribeEditor()">${cycleName(c)}</button>`).join('')}

    <div class="sublabel" style="margin-top:14px">${t('sub.itemsLabel')}</div>
    <div class="subcatalog">
      ${SUBSCRIBE_CATALOG.map(cat=>{
        const it = d.items.find(x=>x.id===cat.id);
        const qty = it?.qty || 0;
        return `<div class="subitem ${qty>0?'on':''}">
          <span class="si-ic">${cat.emoji}</span>
          <div class="si-tx">
            <b>${subItemName(cat)}</b>
            <i>${fmt(cat.defaultPrice)} VND / ${subUnit(cat)}</i>
          </div>
          <div class="qty">
            <button onclick="adjustSubQty('${cat.id}',-1)">−</button>
            <span>${qty}</span>
            <button onclick="adjustSubQty('${cat.id}',1)">+</button>
          </div>
        </div>`;
      }).join('')}
    </div>

    ${d.items.length?`<div style="margin-top:14px;padding:12px 14px;background:var(--cream2);border-radius:13px;display:flex;justify-content:space-between;font-size:13.5px">
      <span>${t('sub.summary',{n:d.items.length,q:sumQty})}</span><b style="color:var(--brown)">${t('sub.perRunPrice',{amount:fmt(sumTotal)})}</b>
    </div>`:''}

    <button class="btn" style="margin-top:14px" ${d.items.length?'':'disabled'} onclick="saveSubscription()">${t('sub.start')}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${t('sub.close')}</button>
  `, renderSubscribeEditor);
}
function adjustSubQty(catId, delta){
  const d = S._subDraft;
  const cat = SUBSCRIBE_CATALOG.find(c=>c.id===catId);
  let it = d.items.find(x=>x.id===catId);
  if(!it && delta>0){
    it = { id:cat.id, nm:cat.nm, nmKey:cat.nmKey, emoji:cat.emoji, unit:cat.unit, unitKey:cat.unitKey, price:cat.defaultPrice, qty:0 };
    d.items.push(it);
  }
  if(it){
    it.qty = Math.max(0, it.qty + delta);
    if(it.qty===0) d.items = d.items.filter(x=>x.id!==catId);
  }
  renderSubscribeEditor();
}
function saveSubscription(){
  S.subscription = S._subDraft;
  S._subDraft = null;
  hint(t('sub.saved'));
  closeSheet();
  setTimeout(openSubscribeView, 200);
}
function nextDateInWeeks(weeks){
  const d = new Date(); d.setDate(d.getDate() + weeks*7);
  return t('sub.dateFmt',{m:d.getMonth()+1, d:d.getDate()});
}
function openPaySub(){
  const sub = S.subscription;
  if(!sub) return;
  const total = sub.items.reduce((a,it)=>a+it.qty*it.price,0);
  payQRSheet({
    title:t('sub.payTitle'),
    sub:t('sub.paySub',{n:sub.items.length, date:sub.nextDate}),
    amount: total,
    memo:`POSHPET SUB ${(S.user?.name||'').slice(0,10)}`,
    onPaid: ()=>{ hint(t('sub.payDone')); closeSheet(); }
  });
}

  const p = S.phones.find(x=>x.id===id); if(!p) return;
  const lbl = prompt('번호 별칭', p.label); if(lbl===null) return;
  const num = prompt('번호', p.number); if(num===null) return;

  if(!confirm('이 번호를 삭제하시겠어요?')) return;

  S.phones = S.phones.filter(x=>x.id!==id);

function changeBooking(id){
  const b = S.bookings.find(x=>x.id===id); if(!b) return;
  // 변경 모드 진입: 기존 예약을 그대로 draft에 로딩, editId로 표시
  S.d = {...b.config, editId:id};   // editId가 있으면 submitBooking이 update로 동작
  S.prefill = true;
  // 날짜·시간만 다시 선택하도록 date 단계로 점프 (메뉴는 유지)
  const st = steps();
  const dateIdx = st.indexOf(SERVICES[b.service].type==='stay'?'dates':'date');
  S.d.dateA=null; S.d.dateB=null; S.d.time=null;
  S.d.step = dateIdx;
  go('flow');
  hint(t('toast.changeMode'));
}
function cancelBooking(id){
  const b = S.bookings.find(x=>x.id===id); if(!b) return;
  if(!confirm(t('confirm.cancelBooking',{code:b.code, status:b.paid?t('cancel.refundCredit'):t('cancel.unpaid')}))) return;
  if(b.paid){
    S.credit = (S.credit||0) + (b.amount||0);
  }
  S.bookings = S.bookings.filter(x=>x.id!==id);
  hint(t('toast.bookCancelled'));
  render('mypet');
}

// 충전 금액 → 할인율 계산 (정액권 단계 룰을 자연스럽게 확장)
// 5M 미만: 불가, 5M~: 10%, 10M~: 15%, 18M~: 20%, 25M~: 25%
function discountForCharge(amount){
  if(amount < 5000000) return null;        // 최소 충전 금액 미만
  if(amount < 10000000) return 10;
  if(amount < 18000000) return 15;
  if(amount < 25000000) return 20;
  return 25;                                 // 25M 이상 모두 25%
}

// 맞춤 충전 시트 (75M 큰손 대응)
function openCustomVip(){
  const presets = [35000000, 50000000, 75000000];
  openSheetHTML(`<div class="grab"></div>

      ${presets.map(v=>`<button class="chip" type="button" onclick="setCustomVip(${v})" style="flex:1;min-width:0">${fmt(v/1000000)}M</button>`).join('')}
    </div>

    <div class="field" style="padding:0">
      <label>${t('cvip.valLabel')}</label>
      <input id="customVipAmount" type="number" inputmode="numeric" placeholder="${t('cvip.valPh')}" oninput="updateCustomVipPreview()" min="5000000" step="1000000">
    </div>

    <div id="customVipPreview" style="background:var(--cream2);border-radius:13px;padding:14px 16px;margin-top:12px;font-size:12.5px;line-height:1.75;color:var(--mocha);min-height:80px">
      <div style="color:var(--gray)">${t('cvip.placeholder')}</div>

function setCustomVip(v){
  const inp = document.getElementById('customVipAmount');
  if(!inp) return;
  inp.value = v;
  updateCustomVipPreview();
}
function updateCustomVipPreview(){
  const inp = document.getElementById('customVipAmount');
  const prev = document.getElementById('customVipPreview');
  const btn = document.getElementById('customVipPay');
  if(!inp || !prev || !btn) return;
  const amount = parseInt(inp.value, 10) || 0;
  const off = discountForCharge(amount);
  if(off === null){
    prev.innerHTML = `<div style="color:var(--gray)">최소 충전 금액 <b style="color:var(--brown)">5,000,000 VND</b> 이상으로 입력해주세요.</div>`;
    btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
    return;
  }
  const pay = Math.round(amount * (100 - off) / 100);
  const saving = amount - pay;
  prev.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px dashed var(--line)">
      <span>충전 가치</span><b style="color:var(--brown);font-size:14px">${fmt(amount)} VND</b>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
      <span>할인율</span><b style="color:var(--accentDk)">−${off}%</b>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px dashed var(--line)">
      <span style="font-weight:700;color:var(--brown)">결제 금액</span>
      <b style="color:var(--good);font-size:16px">${fmt(pay)} VND</b>
    </div>
    <div style="font-size:11px;color:var(--gray);text-align:right;margin-top:2px">${fmt(saving)} VND 절약</div>
  `;
  btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
  btn.dataset.amount = amount;
  btn.dataset.pay = pay;
  btn.dataset.off = off;
}
function payCustomVip(){
  const btn = document.getElementById('customVipPay');
  if(!btn) return;
  const amount = parseInt(btn.dataset.amount, 10);
  const pay = parseInt(btn.dataset.pay, 10);
  const off = parseInt(btn.dataset.off, 10);
  if(!amount || !pay) return;
  // 기존 openPayVipQR과 동일한 흐름으로 진행 (가상의 pkg 객체)
  const pkg = { id: 'pcustom', price: amount, pay, off };
  openPayVipQR(pkg);
}

// flow step model per service type
function steps(){
  const s=SERVICES[S.d.service];
  if(s.type==='stay') return ['room','dates','pet','pickup','confirm'];
  return ['menu','date','time','pet','pickup','confirm'];
}
function curStep(){ return steps()[S.d.step]; }

function vFlow(){
  const s=SERVICES[S.d.service]; const st=steps(); const cur=st[S.d.step];
  let body='';
  if(cur==='room') body=stepRoom(s);
  else if(cur==='menu') body=stepMenu(s);
  else if(cur==='dates') body=stepDates(true);
  else if(cur==='date') body=stepDates(false);
  else if(cur==='time') body=stepTime(s);
  else if(cur==='pet') body=stepPet();
  else if(cur==='pickup') body=stepPickup(s);
  else if(cur==='confirm') body=stepConfirm(s);

  const segs = st.map((_,i)=>`<div class="seg ${i<=S.d.step?'on':''}"></div>`).join('');
  return topbar('flowBack()') + `
    <div class="prog">${segs}</div>
    <div class="steplabel">${S.prefill?t('bk.prefilled'):''}${t('bk.stepLabel',{n:S.d.step+1, total:st.length})}</div>
    ${body}`;
}

// --- step: dates / single date ---
function stepDates(range){
  return `<div class="qtitle">${range?t('bk.dates.range.title'):t('bk.dates.single.title')}</div>
  <div class="qsub">${range?t('bk.dates.range.sub'):t('bk.dates.single.sub')}</div>
  ${calendar(range)}
  <div style="height:96px"></div>
  ${range?flowFootStay():flowFoot(!!S.d.dateA,t('bk.dates.next'))}`;
}
function calendar(range){
  const y=S.calYear, m=S.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date(2026,4,27);
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="day mut"></div>`;
  for(let d=1; d<=days; d++){
    const dt=new Date(y,m,d);
    const past = dt < new Date(2026,4,27);
    const off = (m===4 && (d===18 || d===25)); // some full days
    let cls='day';
    if(past||off){ cls+= off?' off':' mut'; }
    const aT=S.d.dateA, bT=S.d.dateB;
    if(range && aT){
      if(d===aT.d && m===aT.m) cls+=' start';
      else if(bT && d===bT.d && m===bT.m) cls+=' end';
      else if(bT && dt>new Date(y,aT.m,aT.d) && dt<new Date(y,bT.m,bT.d)) cls+=' range';
    } else if(!range && aT && d===aT.d && m===aT.m) cls+=' sel';
    cells+=`<div class="${cls}" onclick="pickDay(${d},${range})">${d}</div>`;
  }
  const monthLabel = t('bk.month',{y,m:t('bk.mn.'+(m+1))});
  return `<div class="cal"><div class="calhead">
      <button class="back" onclick="navMonth(-1)">‹</button>
      <div>${monthLabel}</div>
      <button class="back" onclick="navMonth(1)">›</button></div>
    <div class="calgrid">${[0,1,2,3,4,5,6].map(d=>`<div class="dow">${t('bk.dow.'+d)}</div>`).join('')}${cells}</div></div>`;
}
function navMonth(dir){ S.calMonth+=dir; if(S.calMonth<0){S.calMonth=11;S.calYear--;} if(S.calMonth>11){S.calMonth=0;S.calYear++;} render('flow'); }
function pickDay(d,range){
  const sel={d, m:S.calMonth, y:S.calYear};
  if(range){
    if(!S.d.dateA || (S.d.dateA&&S.d.dateB)){ S.d.dateA=sel; S.d.dateB=null; }
    else { const a=new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d); const b=new Date(sel.y,sel.m,sel.d);
      if(b<=a){ S.d.dateA=sel; S.d.dateB=null; } else S.d.dateB=sel; }
  } else { S.d.dateA=sel; }
  render('flow');
}
function nights(){ if(!S.d.dateA||!S.d.dateB) return 0;
  return Math.round((new Date(S.d.dateB.y,S.d.dateB.m,S.d.dateB.d)-new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d))/864e5); }

function addressReady(){
  // 픽업=yes일 때만 주소 검증
  if(S.d.pickup!=='yes') return true;
  // 신규 입력 모드: 라벨 + 주소 둘 다
  if(S.d.addrId==='__new__'){
    return !!(S.d.addonAddrLabel && S.d.addonAddrLabel.trim() &&
              S.d.addonAddr && S.d.addonAddr.trim().length>4);
  }
  // 저장된 주소에서 선택
  return !!(S.d.addrId && S.addresses.find(a=>a.id===S.d.addrId));
}
function phoneReady(){
  // 신규 입력 모드: 라벨 + 번호 둘 다
  if(S.d.phoneId==='__new__'){
    return !!(S.d.addonPhoneLabel && S.d.addonPhoneLabel.trim() &&
              S.d.addonPhone && S.d.addonPhone.replace(/\D/g,'').length>=8);
  }
  // 저장된 번호에서 선택
  return !!(S.d.phoneId && S.phones.find(p=>p.id===S.d.phoneId));
}

// --- step: confirm ---
function stepConfirm(s){
  const total=calcTotal();
  const petNames=S.pets.filter(p=>S.d.petIds.includes(p.id)).map(p=>p.name).join(', ');
  let dateLabel='';
  if(s.type==='stay'){ const n=nights();
    dateLabel=t('bk.confirm.nights',{a:`${S.d.dateA.m+1}/${S.d.dateA.d}`, b:`${S.d.dateB.m+1}/${S.d.dateB.d}`, n}); }
  else dateLabel=t('bk.confirm.dateAt',{m:S.d.dateA.m+1, d:S.d.dateA.d, t:S.d.time});
  const optName = s.type==='stay'? s.rooms.find(r=>r.id===S.d.room)?.nm : s.menus.find(m=>m.id===S.d.room)?.nm;
  const svcKey = 'svc.'+S.d.service;
  const svcName = I18N[svcKey+'.name'] ? t(svcKey+'.name') : s.name;

  // 픽업 표시 - 저장 목록에서 골랐는지 / 신규인지에 따라 다름
  let pickupText = t('bk.confirm.pickupNo');
  if(S.d.pickup==='yes'){
    if(S.d.addrId && S.d.addrId!=='__new__'){
      const a=S.addresses.find(x=>x.id===S.d.addrId);
      if(a) pickupText = t('bk.confirm.pickupYes',{label:a.label, line:a.line});
    } else if(S.d.addonAddrLabel){
      pickupText = t('bk.confirm.pickupYes',{label:S.d.addonAddrLabel, line:S.d.addonAddr||''});
    }
  }
  // 연락 번호
  let phoneText = '';
  if(S.d.phoneId && S.d.phoneId!=='__new__'){
    const p=S.phones.find(x=>x.id===S.d.phoneId);
    if(p) phoneText = `${p.label} · ${p.number}`;
  } else if(S.d.addonPhoneLabel){
    phoneText = `${S.d.addonPhoneLabel} · ${S.d.addonPhone||''}`;
  }

  return `<div class="qtitle">${t('bk.confirm.title')}</div>
  <div class="qsub">${t('bk.confirm.sub')}</div>
  <div class="pad">
    <div class="card" style="padding:16px 18px">
      <div class="sumrow"><span class="k">${t('bk.confirm.svc')}</span><span class="v">${svcName} · ${optName||''}</span></div>
      <div class="sumrow"><span class="k">${t('bk.confirm.date')}</span><span class="v">${dateLabel}</span></div>
      <div class="sumrow"><span class="k">${t('bk.confirm.pet')}</span><span class="v">${petNames}</span></div>
      <div class="sumrow"><span class="k">${t('bk.confirm.pickup')}</span><span class="v">${pickupText}</span></div>
      ${phoneText?`<div class="sumrow"><span class="k">${t('bk.confirm.phone')}</span><span class="v">${phoneText}</span></div>`:''}
      ${S.d.notes?`<div class="sumrow"><span class="k">${t('bk.confirm.notes')}</span><span class="v" style="text-align:right;max-width:60%">${S.d.notes}</span></div>`:''}
      ${total.discount?`<div class="sumrow"><span class="k">${t('bk.confirm.sub2')}</span><span class="v">${fmt(total.sub)} VND</span></div>
        <div class="sumrow"><span class="k" style="color:var(--good)">${t('bk.confirm.discount',{p:total.rate})}</span><span class="v" style="color:var(--good)">−${fmt(total.discount)}</span></div>`:''}
      <div class="sumrow tot"><span class="k">${t('bk.confirm.total')}</span><span class="v">${fmt(total.total)} VND</span></div>

// 백신 필요 서비스에서 펫별 백신 상태 안내
// 사장님 원칙: 미등록이어도 예약은 그대로 확정, 체크인 전까지만 등록하면 됨
// b: 예약 객체 (선택). 있으면 체크인 시한을 명시.
function vaccineNoticeForBooking(petIds, b){
  const pets = S.pets.filter(p=>petIds.includes(p.id));
  if(!pets.length) return '';
  const allOk = pets.every(p=>vaccinesSummary(p.vaccines).ok);
  if(allOk){
    return `<div class="card vaccineNotice ok">
      <div class="vn-h">${t('vac.ok.title')}</div>
      <div class="vn-tx">${t('vac.ok.lead',{names:pets.map(p=>p.name).join(', ')})}</div>
    </div>`;
  }
  // 부족한 펫
  const rows = pets.filter(p=>!vaccinesSummary(p.vaccines).ok).map(p=>{
    const v = vaccinesSummary(p.vaccines);
    return `<div class="vn-pet" onclick="closeFlowSheetIfAny&&closeFlowSheetIfAny();openPetSheet('${p.id}')">
      <span class="vn-emoji">${p.emoji}</span>
      <span class="vn-nm">${p.name}</span>
      <span class="vaccineBadge ${v.cls}">${v.label}</span>
      <span class="vn-go">›</span>
    </div>`;
  }).join('');

  // 체크인 시한 표시 (예약 객체가 있는 경우)
  const deadlineHtml = b ? `<div class="vn-deadline">
    <span class="vn-d-ic">⏰</span>
    <div class="vn-d-tx">
      <div class="vn-d-l">${t('vac.deadline.label')}</div>
      <div class="vn-d-v">${b.dateLabel}${b.config?.time?' '+b.config.time:''}<span class="vn-d-pre">${t('vac.deadline.pre')}</span></div>
    </div>
  </div>` : '';

  return `<div class="card vaccineNotice warn">
    <div class="vn-h">${t('vac.warn.title')}</div>
    <div class="vn-tx">${t('vac.warn.lead')}</div>
    ${deadlineHtml}
    <div class="vn-pets">${rows}</div>
    <div class="vn-actions">
      <button class="vn-act primary" onclick="closeFlowSheetIfAny&&closeFlowSheetIfAny();openPetSheet('${pets.filter(p=>!vaccinesSummary(p.vaccines).ok)[0].id}')">${t('vac.act.register')}</button>
      <button class="vn-act" onclick="openContactSheet()">${t('vac.act.photo')}</button>
    </div>
  </div>`;
}

function calcTotal(){
  const s=SERVICES[S.d.service];
  if(s.type==='stay'){
    const rate=s.rooms.find(r=>r.id===S.d.room).rate; const n=nights();
    const sub=rate*n;
    let pct=0; if(n>=30)pct=12; else if(n>=14)pct=8; else if(n>=7)pct=5;
    const discount=Math.round(sub*pct/100);
    return {sub, discount, rate:pct, total:sub-discount};
  }
  const m=s.menus.find(x=>x.id===S.d.room);
  const v = typeof m.pr === 'number' ? m.pr : parseInt(String(m.pr).replace(/,/g,''))||0;
  return {sub:v, discount:0, total:v};
}

// --- flow footer (live quote) ---
function flowFoot(enabled, label){
  // 항상 클릭 가능. 무엇이 부족한지 flowNext에서 알려준다 (silent fail 방지)
  return `<div class="flowfoot"><button class="btn ${enabled?'':'soft'}" id="flowNext" onclick="flowNext()">${label} →</button></div>`;
}
function flowFootStay(){
  const n=nights(); const ok=S.d.dateA&&S.d.dateB;
  let q='';
  if(ok){ const tt=calcTotal();
    q=`<div class="quote"><div><div class="ql">${t('bk.nights',{n:n})}</div>${tt.discount?`<div class="qd">${t('bk.longDiscount',{p:tt.rate})}</div>`:''}</div>
       <div class="qv">${fmt(tt.total)}</div></div>`; }
  return `<div class="flowfoot">${q}<button class="btn ${ok?'':'soft'}" id="flowNext" onclick="flowNext()">${t('bk.nextPet')}</button></div>`;
}
function flowNext(){
  const cur = curStep();
  // 단계별 검증 - 막혔다면 무엇이 부족한지 알려준다
  if(cur==='menu' && !S.d.room){ hint(t('bk.val.menu')); return; }
  if(cur==='room' && !S.d.room){ hint(t('bk.val.room')); return; }
  if((cur==='date' || cur==='dates') && !S.d.dateA){ hint(t('bk.val.date')); return; }
  if(cur==='dates' && !S.d.dateB){ hint(t('bk.val.dateOut')); return; }
  if(cur==='time' && !S.d.time){ hint(t('bk.val.time')); return; }
  if(cur==='pet' && S.d.petIds.length===0){ hint(t('bk.val.pet')); return; }
  if(cur==='pickup'){
    if(S.d.pickup===null){ hint(t('bk.val.pickup')); return; }
    if(S.d.pickup==='yes' && !addressReady()){
      if(S.d.addrId==='__new__'){
        if(!S.d.addonAddrLabel?.trim()){ hint(t('bk.val.addrLabel')); return; }
        hint(t('bk.val.addrLine')); return;
      }
      hint(t('bk.val.addrPick')); return;
    }
    if(!phoneReady()){
      if(S.d.phoneId==='__new__'){
        if(!S.d.addonPhoneLabel?.trim()){ hint(t('bk.val.phoneLabel')); return; }
        hint(t('bk.val.phoneNum')); return;
      }
      hint(t('bk.val.phonePick')); return;
    }
  }
  if(S.d.step < steps().length-1){ S.d.step++; render('flow'); screen().scrollTop=0; }
}
function flowBack(){
  if(S.d.step>0){ S.d.step--; render('flow'); screen().scrollTop=0; }
  else {
    // 변경 모드에서 뒤로 가면 마이펫으로
    if(S.d.editId){ S.d.editId=null; go('mypet'); return; }
    go('tour'); openServicePicker();
  }
}

function submitBooking(){
  // 1) 신규 입력한 주소가 있으면 라벨과 함께 영구 저장
  if(S.d.pickup==='yes' && S.d.addrId==='__new__' && S.d.addonAddr && S.d.addonAddrLabel){
    const newAddr = {
      id:'ad'+Date.now(),
      label:S.d.addonAddrLabel.trim(),
      line:S.d.addonAddr.trim(),
      isDefault: S.addresses.length===0,  // 첫 주소면 기본으로
    };
    S.addresses.push(newAddr);
    S.d.addrId = newAddr.id;
  }
  // 2) 신규 입력한 전화번호도 라벨과 함께 영구 저장
  if(S.d.phoneId==='__new__' && S.d.addonPhone && S.d.addonPhoneLabel){
    const newPh = {
      id:'ph'+Date.now(),
      label:S.d.addonPhoneLabel.trim(),
      number:S.d.addonPhone.trim(),
      isDefault: S.phones.length===0,
    };
    S.phones.push(newPh);
    S.d.phoneId = newPh.id;
  }

  const s=SERVICES[S.d.service];
  const optName = s.type==='stay'? s.rooms.find(r=>r.id===S.d.room)?.nm : s.menus.find(m=>m.id===S.d.room)?.nm;
  const petNames=S.pets.filter(p=>S.d.petIds.includes(p.id)).map(p=>p.name).join(', ');
  const dateObj = new Date(S.d.dateA.y,S.d.dateA.m,S.d.dateA.d);
  const dateLabel = s.type==='stay'
    ? `${S.d.dateA.m+1}/${S.d.dateA.d}–${S.d.dateB.m+1}/${S.d.dateB.d}`
    : `${S.d.dateA.m+1}월 ${S.d.dateA.d}일`;
  const code='PP-'+Math.random().toString(36).slice(2,6).toUpperCase()+Math.floor(Math.random()*90+10);

  // 선택된 주소/번호의 라벨도 예약에 보존 (vDone, 마이펫에서 보여주기 위해)
  const addrSel = S.addresses.find(a=>a.id===S.d.addrId);
  const phoneSel = S.phones.find(p=>p.id===S.d.phoneId);
  const total = calcTotal();

  // 변경 모드: 기존 예약 업데이트
  if(S.d.editId){
    const idx = S.bookings.findIndex(x=>x.id===S.d.editId);
    if(idx >= 0){
      const orig = S.bookings[idx];
      const updated = {
        ...orig,  // 원본의 id, code, paid, starred 등 유지
        service:S.d.service, room:S.d.room, optName,
        petNames, petIds:[...S.d.petIds],
        dateObj, dateLabel,
        pickup:S.d.pickup,
        addrLabel: addrSel?.label || null,
        addrLine:  addrSel?.line  || null,
        phoneLabel:phoneSel?.label|| null,
        phoneNum:  phoneSel?.number|| null,
        notes: (S.d.notes||'').trim(),
        amount: total.total || orig.amount,
        config:{...S.d, editId:null},  // editId는 빼고 보존
      };
      S.bookings[idx] = updated;
      S.d.editId = null;  // 변경 모드 종료
      S._lastWasUpdate = true;  // vDone에서 텍스트 분기용
      hint('✓ 예약이 변경되었습니다');
      go('done', updated);
      return;
    }
  }
  S._lastWasUpdate = false;

  // 신규 예약 (code는 위에서 이미 선언됨)
  const b={
    id:'b'+Date.now(),
    service:S.d.service, room:S.d.room, optName,
    petNames, petIds:[...S.d.petIds],
    dateObj, dateLabel,
    pickup:S.d.pickup,
    addrLabel: addrSel?.label || null,
    addrLine:  addrSel?.line  || null,
    phoneLabel:phoneSel?.label|| null,
    phoneNum:  phoneSel?.number|| null,
    notes: (S.d.notes||'').trim(),
    amount: total.total || 0,
    paid: false,         // 입금 전 = 예약 대기
    starred: false,
    code,
    config:{...S.d}
  };
  S.bookings.push(b);
  go('done', b);
}

// ========== 점진적 정보 수집 (Progressive Disclosure) ==========
// 첫 예약 후, 미입력 정보가 있고 아직 권유받지 않은 경우에만 안내 카드 표시.
// "나중에" 누르면 영구히 다시 묻지 않음 (사용자 의사 존중).
function shouldShowProfileBoost(b){
  if(S._lastWasUpdate) return false;       // 변경 예약에선 안 보임
  if(S.profileBoostShown) return false;    // 이미 한 번 응답 (예/나중에)
  // 채워질 정보가 있는지 확인
  const u = S.user || {};
  const userMissing = !u.country || !u.gender || !u.birthday || u.marketingOptIn===null;
  const petMissing = (b.petIds||[]).some(id=>{
    const p = S.pets.find(x=>x.id===id);
    return p && (!p.gender || !p.birthday || !p.photo);
  });
  return userMissing || petMissing;
}
function renderProfileBoostCard(){
  return `<div class="boostCard" onclick="openProfileBoost()">

    <button class="boostLater" onclick="event.stopPropagation();dismissProfileBoost()">${t('boostCard.later')}</button>

// 시연용 사진 선택 (실제로는 파일 업로드 다이얼로그)
function pickPetPhoto(petIdx){
  const emojis = ['🐶','🐕','🦮','🐕‍🦺','🐩','🐱','🐈','🐈‍⬛'];
  const cur = S._boostDraft.pets[petIdx].photo;
  const idx = emojis.indexOf(cur);
  const next = emojis[(idx+1) % emojis.length];
  S._boostDraft.pets[petIdx].photo = next;
  renderProfileBoostSheet();
}
function saveProfileBoost(){
  const d = S._boostDraft;
  // 본인 정보 머지 (null/빈값은 기존 유지)
  S.user = {
    ...S.user,
    country: d.user.country ?? S.user?.country,
    gender:  d.user.gender ?? S.user?.gender,
    birthday: d.user.birthday || S.user?.birthday,
    marketingOptIn: d.user.marketingOptIn,
  };
  // 펫 정보 머지
  d.pets.forEach(bp=>{
    const idx = S.pets.findIndex(p=>p.id===bp.id);
    if(idx>=0){
      S.pets[idx] = {
        ...S.pets[idx],
        gender:   bp.gender   || S.pets[idx].gender,
        birthday: bp.birthday || S.pets[idx].birthday,
        photo:    bp.photo    || S.pets[idx].photo,
      };
    }
  });
  S._boostDraft = null;
  hint(t('boostSheet.savedToast'));
  closeSheet();
  // 마이펫으로 안전하게 이동 (done 화면에서 호출됐을 수 있어서 booking 컨텍스트 없을 수도 있음)
  go('mypet');
}

// ============================ 10회 패키지 시스템 ============================
// 정의: 그루밍/스파 10회 패키지 (+2회 무료) — 즉, 12회 사용 가능. 펫 1마리 기준.
// 그루밍 12개월 유효, 스파 90일 유효.
const PACKAGE_CONFIG = {
  grooming: { nameKey:'pkg.cfg.grooming', name:'그루밍 10+2회 패키지', validDays:365, icon:'✂️', service:'grooming' },
  spa:      { nameKey:'pkg.cfg.spa',      name:'스파 10+2회 패키지',   validDays:90,  icon:'🛁', service:'spa' },
};
function pkgCfgName(cfg){ return cfg.nameKey ? t(cfg.nameKey) : cfg.name; }

// 펫 + 서비스로 사용 가능한 활성 패키지 찾기
function findActivePackage(service, petId){
  if(!S.packages) S.packages = [];
  const today = new Date();
  return S.packages.find(pk =>
    pk.service === service &&
    pk.petId === petId &&
    pk.remainUses > 0 &&
    new Date(pk.expiry) >= today
  );
}

// 만료일 계산 헬퍼 (오늘 + N일)
function addDays(days){
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

// 패키지 구매 시트 열기

      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px dashed #D9C5A3">

      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px dashed #D9C5A3">

function getToday(){
  return new Date().toISOString().slice(0,10);
}

// 패키지를 S.packages에 추가 (실제 구매 완료 시 호출)
function grantPackage(service, petId){
  const cfg = PACKAGE_CONFIG[service];
  const pet = S.pets.find(p=>p.id===petId);
  if(!cfg || !pet) return;
  if(!S.packages) S.packages = [];
  S.packages.push({
    id: 'PK-' + Date.now().toString(36).toUpperCase(),
    service,
    petId,
    petName: pet.name,
    totalUses: 12,
    remainUses: 12,
    purchasedAt: getToday(),
    expiry: addDays(cfg.validDays),
  });
}

function confirmPackagePurchase(service, petId, amount){
  const cfg = PACKAGE_CONFIG[service];
  const pet = S.pets.find(p=>p.id===petId);
  payQRSheet({
    title: pkgCfgName(cfg),
    sub: t('pkg.detail.subUses',{name:pet?.name||''}),
    amount,
    memo: 'POSHPET PKG ' + service.toUpperCase(),
    onPaid: ()=>{
      grantPackage(service, petId);
      hint(t('pkg.detail.toast',{name:pkgCfgName(cfg)}));
      closeSheet();
      render(S.view);
    }
  });
}

function payPackageWithCredit(service, petId, amount){
  if((S.credit||0) < amount){ alert(t('pkg.detail.noBalance')); return; }
  S.credit -= amount;
  grantPackage(service, petId);
  hint(t('pkg.detail.creditToast',{name:pkgCfgName(PACKAGE_CONFIG[service])}));
  closeSheet();
  render(S.view);
}

// 패키지에서 1회 차감 (예약 결제 시 호출)
function consumePackage(packageId){
  const pk = S.packages.find(x=>x.id===packageId);
  if(!pk || pk.remainUses <= 0) return false;
  pk.remainUses -= 1;
  pk.lastUsed = getToday();
  return true;
}

// 마이펫 — '내 패키지' 섹션 렌더링
function renderMyPackages(){
  if(!S.packages || S.packages.length === 0) return '';
  const today = new Date();
  const active = S.packages.filter(pk => pk.remainUses > 0 && new Date(pk.expiry) >= today);
  if(active.length === 0) return '';
  return `
    <div class="sectitle" style="margin-top:18px">${t('pkg.section')} <span class="cnt">${active.length}</span></div>
    <div class="seclead">${t('pkg.lead')}</div>
    ${active.map(pk=>{
      const cfg = PACKAGE_CONFIG[pk.service];
      const pct = (pk.remainUses / pk.totalUses) * 100;
      const dleft = daysUntil(pk.expiry);
      const expWarn = dleft <= 14;
      const dleftLabel = dleft >= 0 ? `D-${dleft}` : t('pkg.expired');
      return `<div class="pkgcard">
        <div class="pkg-h">
          <span class="pkg-ic">${cfg.icon}</span>
          <div class="pkg-tx">
            <div class="pkg-nm">${pkgCfgName(cfg)}</div>
            <div class="pkg-pet">${t('pkg.petLine',{name:pk.petName})}</div>
          </div>
          <div class="pkg-remain">
            <div class="pkg-r-n">${pk.remainUses}<span>/${pk.totalUses}</span></div>
            <div class="pkg-r-l">${t('pkg.remainLabel')}</div>
          </div>
        </div>
        <div class="pkg-bar"><div class="pkg-fill" style="width:${pct}%"></div></div>

// ============================ 쿠폰 시스템 ============================
// 1회 이탈률 45.5% 해결의 핵심 트리거: 첫 예약 후 자동 발급 쿠폰.
// 핸드오프 문서 8.4에 명시된 '신규→재방문' 재방문 트리거.
const COUPON_TEMPLATES = {
  // 첫 예약 후 자동 발급
  welcome15: {
    id: 'welcome15',
    type: 'percent',
    value: 15,
    label: '환영 쿠폰 −15%',
    desc: '다음 예약 한 번 더, 더 따뜻하게',
    validDays: 30,
    icon: '🎁',
    source: '첫 예약 환영',
  },
};

// 쿠폰 발급 (S.coupons에 추가)
function grantCoupon(templateId){
  const tmpl = COUPON_TEMPLATES[templateId];
  if(!tmpl) return null;
  if(!S.coupons) S.coupons = [];
  const c = {
    id: 'CP-' + Date.now().toString(36).toUpperCase(),
    template: templateId,
    type: tmpl.type,
    value: tmpl.value,
    label: tmpl.label,
    desc: tmpl.desc,
    icon: tmpl.icon,
    source: tmpl.source,
    issuedAt: getToday(),
    expiry: addDays(tmpl.validDays),
  };
  S.coupons.push(c);
  return c;
}

// 쿠폰 표시 라벨 (i18n 동적 — label/desc/source 모두 발급 당시 한국어로 저장됐어도 표시 시점에 현재 언어로 보여줌)
function couponLabel(c){
  if(c.template==='welcome15') return t('cp.welcome.title');
  return c.label;
}
function couponDesc(c){
  if(c.template==='welcome15') return t('cp.welcome.desc');
  return c.desc;
}
function couponSource(c){
  if(c.template==='welcome15') return t('cp.welcome.source');
  return c.source;
}

// 활성 쿠폰 가져오기 (만료 안 됨 + 미사용)
function getActiveCoupons(){
  if(!S.coupons) return [];
  const today = new Date();
  return S.coupons.filter(c => !c.usedAt && new Date(c.expiry) >= today);
}

// 첫 예약 트리거 — vDone에서 호출
// 한 번만 발급 (S.coupons에 같은 template이 있으면 스킵)
function maybeIssueWelcomeCoupon(){
  if(!S.coupons) S.coupons = [];
  const already = S.coupons.some(c => c.template === 'welcome15');
  if(already) return null;
  if(S.bookings.length !== 1) return null;   // 첫 예약일 때만
  return grantCoupon('welcome15');
}

// --- reuse booking ---
function reuseBooking(id){
  const b=S.bookings.find(x=>x.id===id); if(!b) return;
  S.d={...b.config}; S.prefill=true;
  // jump to date step
  const st=steps(); const dateIdx=st.indexOf(SERVICES[b.service].type==='stay'?'dates':'date');
  S.d.dateA=null; S.d.dateB=null; S.d.time=null; // re-pick date only
  S.d.step=dateIdx;
  go('flow');
  hint(t('reuse.toast'));
}

function doLogin(provider){
  S.loggedIn=true;
  // 채널 기반 국적 자동 추론 (Kakao → 한국, Zalo → 베트남, 나머지는 미설정)
  const profiles={
    Google:{name:'지현', contact:'you@gmail.com', channel:'이메일',   phoneAuto:'010-1234-5678', country:'KR'},
    Zalo:  {name:'Minh', contact:'Zalo @minh',    channel:'Zalo',     phoneAuto:'0901 234 567',  country:'VN'},
    Kakao: {name:'지현', contact:'카톡 @jhpark',   channel:'카카오톡',  phoneAuto:'010-9876-5432', country:'KR'},
    Phone: {name:'회원', contact:S._phone||'010-····-····', channel:'문자(SMS)', phoneAuto:S._phone||'010-0000-0000', country:null},
  };
  S.user = {
    ...profiles[provider],
    gender: null,            // 가입 직후 비어있음 — 나중에 선택 입력
    birthday: null,
    marketingOptIn: null,    // null = 미선택, true/false = 응답
  };
  // 가입 직후 본인 전화번호를 default 연락처로 자동 저장
  if(S.phones.length===0 && S.user.phoneAuto){
    S.phones.push({ id:'ph'+Date.now(), label:'본인', number:S.user.phoneAuto, isDefault:true });
  }

  // 채널 → 언어 자동 매칭: localStorage에 명시적 저장값이 없을 때만 (사용자 의사 존중)
  let savedLang = null;
  try { savedLang = localStorage.getItem('poshpet.lang'); } catch(e){}
  if(!savedLang){
    const inferLang = provider==='Kakao' ? 'kr' : (provider==='Zalo' ? 'vi' : null);
    if(inferLang && inferLang !== CURRENT_LANG){
      CURRENT_LANG = inferLang;
      // 저장은 하지 않음 — 사용자가 직접 토글하면 그때 저장
    }
  }

  closeSheet();
  hint(t('auth.loginDone',{provider:provider}));
  const after=S._authAfter;
  const forBooking = (after==='book' || S._pendingSvc);
  if(forBooking){
    if(S.pets.length===0){ openAddPet(S._pendingSvc?'pickAfter':'flowStart'); }
    else if(S._pendingSvc){ const k=S._pendingSvc; S._pendingSvc=null; pickService(k); }
    else startBooking();
  } else {
    go(after||'mypet');
  }
}

// 한 펫의 백신 상태 요약
function vaccinesSummary(v){
  if(!v) return { cls:'unknown', label:t('vac.sum.unknown'), ok:false };
  const ok = v.rabies==='ok' && v.core==='ok';
  if(ok) return { cls:'ok', label:t('vac.sum.ok'), ok:true };
  if(v.rabies==='no' || v.core==='no') return { cls:'no', label:t('vac.sum.no'), ok:false };
  if(v.rabies==='ok' || v.core==='ok') return { cls:'partial', label:t('vac.sum.partial'), ok:false };
  return { cls:'unknown', label:t('vac.sum.unknown'), ok:false };
}
function refreshPetReady(){ const d=S._petDraft; const b=$('petSave');
  if(b) b.disabled=!(d.name.trim()&&d.breed&&d.band); }
function savePet(){
  const d=S._petDraft;
  const emoji = d.species==='dog'?'🐶':'🐱';
  const vaccines = d.vaccines || {rabies:null, core:null, note:''};
  const traits = (d.traits||'').trim();
  // 편집 모드: 기존 펫 업데이트 (gender·birthday·photo 등 추가 필드 유지)
  if(d.editId){
    const idx = S.pets.findIndex(p=>p.id===d.editId);
    if(idx>=0){
      S.pets[idx] = {
        ...S.pets[idx],
        name:d.name.trim(), species:d.species, breed:d.breed, band:d.band, emoji, vaccines, traits,
        // 편집 모드에서 변경된 추가 정보가 있으면 반영, 없으면 기존 값 유지
        gender:  d.gender   !== undefined ? d.gender   : S.pets[idx].gender,
        birthday:d.birthday !== undefined ? d.birthday : S.pets[idx].birthday,
        photo:   d.photo    !== undefined ? d.photo    : S.pets[idx].photo,
      };
      closeSheet();
      hint(t('pet.savedEdit',{name:d.name}));
      render('mypet');
      return;
    }
  }
  // 신규 등록 — 가입·예약 흐름에선 추가 정보는 비워두고 나중에 권유
  const pet={
    id:'p'+Date.now(), name:d.name.trim(), species:d.species, breed:d.breed, band:d.band, emoji,
    vaccines, traits,
    gender:null, birthday:null, photo:null,    // 추가 정보 슬롯 (나중에 채움)
  };
  S.pets.push(pet);
  closeSheet();
  const after=S._petAfter;
  if(after==='flow'){ S.d.petIds.push(pet.id); render('flow'); }
  else if(after==='pickAfter' && S._pendingSvc){ const k=S._pendingSvc; S._pendingSvc=null; pickService(k); }
  else if(after==='flowStart'){ startBooking(); }
  else if(S.view==='mypet'){ go('mypet'); }
  hint(t('pet.savedNew',{name:pet.name}));
}

// 현재 열린 시트의 재렌더 함수 추적 (언어 전환 시 시트 보존용)
let _currentSheetRedraw = null;
function openSheetHTML(html, redrawFn){
  $('sheet').innerHTML=html;
  $('sheet').classList.add('show');
  $('sheetbg').classList.add('show');
  _currentSheetRedraw = redrawFn || null;
}
function closeSheet(){
  $('sheet').classList.remove('show');
  $('sheetbg').classList.remove('show');
  _currentSheetRedraw = null;
}

function bindFlow(){
  // 둘러보기 갤러리 도트 동기화
  const rail = $('spotrail');
  if(rail){
    const dots = document.querySelectorAll('.rdot');
    const sync = ()=>{
      const i = Math.round(rail.scrollLeft / (rail.scrollWidth / dots.length));
      dots.forEach((d,di)=>d.classList.toggle('on', di===Math.min(i,dots.length-1)));
    };
    rail.addEventListener('scroll', sync, {passive:true});
    sync();
  }
}

// 관리자 예약의 svcName을 현재 언어로 표시 — 없으면 mock의 svcName(한글) fallback
function admSvcName(b){
  if(!b || !b.svc) return b?.svcName || '';
  switch(b.svc){
    case 'grooming': return t('adm.svc.grooming');
    case 'spa':      return t('adm.svc.spa');
    case 'pool':     return t('adm.svc.pool', {min:30});
    case 'daycare':  return t('adm.svc.daycare', {hr:8});
    case 'hotel':    return b.nights
                        ? t('adm.svc.hotel', {n:b.nights})
                        : t('adm.svc.hotelShort');
    default:         return b.svcName || b.svc;
  }
}

// 회원 history의 라벨을 현재 언어로 표시 — 자주 쓰는 케이스만 매핑, 나머지는 원본
function admHistLabel(h){
  if(!h) return '';
  const raw = h.label || '';
  // 충전 — "VIP X 정액권 가입" 또는 "추가 충전" 형태
  if(h.type === 'charge'){
    const m = raw.match(/^VIP\s+([0-9]+M)\s*정액권/);
    if(m){
      if(/추가\s*충전/.test(raw)) return t('adm.hist.recharge', {tier:m[1]});
      return t('adm.hist.charge', {tier:m[1]});
    }
    return raw; // 발행 시트 등 다른 경로는 t()로 이미 처리됨
  }
  // 서비스 — h.svc 키 우선
  if(h.svc === 'grooming'){
    if(/풀/.test(raw)) return t('adm.hist.svc.grooming.full');
    if(/얼굴/.test(raw)) return t('adm.hist.svc.grooming.face');
    return t('adm.hist.svc.grooming');
  }
  if(h.svc === 'spa'){
    if(/목욕\s*&\s*위생|위생/.test(raw)) return t('adm.hist.svc.spa.bath');
    return t('adm.hist.svc.spa');
  }
  if(h.svc === 'hotel'){
    const m = raw.match(/(\d+)\s*박/);
    if(m){
      if(/다자녀/.test(raw)) return t('adm.hist.svc.hotelStay', {n:m[1]});
      return t('adm.hist.svc.hotel', {n:m[1]});
    }
    return raw;
  }
  if(h.svc === 'pool'){
    return t('adm.hist.svc.pool');
  }
  if(h.svc === 'daycare'){
    if(/20회|패키지/.test(raw)) return t('adm.hist.svc.daycare.month');
    const m = raw.match(/(\d+)\s*시간/);
    if(m) return t('adm.hist.svc.daycare', {h:m[1]});
    return raw;
  }
  return raw;
}

// 회원 history의 paid 필드 라벨 ("18,750,000 VND 결제" 형태)
function admHistPaid(h){
  if(!h || !h.paid) return '';
  const m = String(h.paid).match(/^([\d,]+)\s*VND\s*결제$/);
  if(m) return t('adm.hist.paid', {amount:m[1]});
  return h.paid; // 다른 포맷은 그대로 (발행 시트의 t() 결과 등)
}

// "X일 전" / "X주 전" 등을 현재 언어로 변환
function admRecent(raw){
  if(!raw) return '';
  if(/^오늘$/.test(raw)) return t('adm.recent.today');
  let m = raw.match(/^(\d+)\s*일\s*전$/);
  if(m) return t('adm.recent.daysAgo', {n:m[1]});
  m = raw.match(/^(\d+)\s*주\s*전$/);
  if(m) return t('adm.recent.weeksAgo', {n:m[1]});
  m = raw.match(/^(\d+)\s*개월\s*전$/);
  if(m) return t('adm.recent.monthsAgo', {n:m[1]});
  return raw; // 'YYYY-MM-DD' 같은 케이스
}

// 백신 필요 서비스 식별 (daycare·pool·hotel은 필수)
const VACCINE_REQUIRED_SVCS = ['daycare','pool','hotel'];

// 오늘 체크인 예정 중 백신 미등록·일부등록 케이스 카드
function renderTodayVaccineAlert(todayBookings){
  // 백신 필요 서비스 + 아직 체크인 안 됨(scheduled, waiting) + 백신 부족
  const targets = todayBookings.filter(b =>
    VACCINE_REQUIRED_SVCS.includes(b.svc) &&
    (b.vaccine === 'missing' || b.vaccine === 'partial') &&
    (b.status === 'scheduled' || b.status === 'waiting')
  );
  if(targets.length === 0){
    const okCount = todayBookings.filter(b=>VACCINE_REQUIRED_SVCS.includes(b.svc) && (b.status==='scheduled'||b.status==='waiting')).length;
    return `<div class="card admcard vaccine-alert-ok">
      <div class="va-h">
        <span class="va-ic ok">✓</span>
        <div class="va-tx"><b>${t('adm.vac.okTitle')}</b><span>${t('adm.vac.okSub',{n:okCount})}</span></div>
      </div>
    </div>`;
  }
  return `<div class="card admcard vaccine-alert">
    <div class="va-h">
      <span class="va-ic warn">⚠</span>
      <div class="va-tx"><b>${t('adm.vac.warnTitle',{n:targets.length})}</b><span>${t('adm.vac.warnSub')}</span></div>
    </div>
    <div class="va-list">
      ${targets.map(b=>`
        <div class="va-row">
          <div class="va-time">${b.time}</div>
          <div class="va-pet">
            <b>${b.petName}</b>
            <i>${b.ownerName} · ${admSvcName(b)}</i>
            <div class="va-detail">${b.vaccineDetail || t('adm.vac.fallback')}</div>
          </div>
          <div class="va-vac">
            <span class="vaccineBadge ${b.vaccine==='missing'?'no':'partial'}">${b.vaccine==='missing'?t('adm.vac.missing'):t('adm.vac.partial')}</span>
          </div>
          <div class="va-acts">
            <button class="va-btn primary" onclick="sendVaccineReminderMsg('${b.id}')" title="${t('adm.vac.sendMsgTip',{contact:b.contact})}">${t('adm.vac.sendMsgBtn')}</button>
            <button class="va-btn" onclick="openVaccineInputSheet('${b.id}')" title="${t('adm.vac.input.title')}">${t('adm.vac.input.openBtn')}</button>
            <button class="va-btn" onclick="markVaccineCheckedAtCheckin('${b.id}')" title="${t('adm.vac.onsiteTip')}">${t('adm.vac.onsiteBtn')}</button>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

// 시연용: 백신 안내 메시지 발송 액션
function sendVaccineReminderMsg(bookingId){
  const b = ADMIN.todayBookings.find(x=>x.id===bookingId);
  if(!b) return;
  // 시연: 채팅창으로 이동하면서 안내 토스트
  alert(t('adm.vac.sendDone',{name:b.ownerName,contact:b.contact,time:b.time,svc:admSvcName(b),pet:b.petName}));
  ADMIN.selectedChat = ADMIN.chats[0].id;
  goAdmin('chat');
}

// 시연용: 현장 확인으로 처리
function markVaccineCheckedAtCheckin(bookingId){
  const b = ADMIN.todayBookings.find(x=>x.id===bookingId);
  if(!b) return;
  if(!confirm(t('adm.vac.onsiteConfirm',{pet:b.petName,name:b.ownerName}))) return;
  b.vaccine = 'ok';
  b.vaccineDetail = t('adm.vac.onsiteLabel');
  renderAdmin();
}

const CAMPAIGN_STATE = {
  segment: '3m', lang: 'auto', channels: ['kakao','zalo'],
  optInOnly: true, discount: 10, customText: null,
  step: 'compose', sentCount: 0,
};

function openDormantCampaign(segment){
  CAMPAIGN_STATE.segment = segment;
  CAMPAIGN_STATE.lang = 'auto';
  CAMPAIGN_STATE.channels = ['kakao','zalo'];
  CAMPAIGN_STATE.optInOnly = true;
  CAMPAIGN_STATE.discount = segment === '3m' ? 10 : 20;
  CAMPAIGN_STATE.customText = null;
  CAMPAIGN_STATE.step = 'compose';
  CAMPAIGN_STATE.sentCount = 0;
  renderDormantCampaign();
}

function getDormantTargets(){
  const list = CAMPAIGN_STATE.segment === '3m'
    ? ADMIN.dormantCustomers.threeMonths
    : ADMIN.dormantCustomers.sixMonths;
  return list.filter(c => {
    if(CAMPAIGN_STATE.optInOnly && !c.optIn) return false;
    if(CAMPAIGN_STATE.channels.length === 0) return false;
    if(!CAMPAIGN_STATE.channels.includes(c.ch)) return false;
    return true;
  });
}

function renderMessageForCustomer(c){
  const lang = CAMPAIGN_STATE.lang === 'auto'
    ? (c.ch === 'kakao' ? 'kr' : 'vi')
    : CAMPAIGN_STATE.lang;
  const tpl = DORMANT_TEMPLATES[CAMPAIGN_STATE.segment][lang];
  const raw = CAMPAIGN_STATE.customText || tpl.text;
  const lastDate = new Date(c.last);
  const today = new Date();
  const days = Math.max(0, Math.round((today - lastDate) / 86400000));
  return raw
    .replace(/\{이름\}/g, c.name)
    .replace(/\{펫\}/g, c.pet)
    .replace(/\{일수\}/g, days)
    .replace(/\{할인\}/g, CAMPAIGN_STATE.discount);
}

  const targets = getDormantTargets();

function toggleCampChannel(ch){
  const i = CAMPAIGN_STATE.channels.indexOf(ch);
  if(i>=0) CAMPAIGN_STATE.channels.splice(i,1);
  else CAMPAIGN_STATE.channels.push(ch);
  renderDormantCampaign();
}

function confirmDormantCampaign(){
  const targets = getDormantTargets();
  if(targets.length === 0){ hint(t('adm.dc.noTarget')); return; }
  CAMPAIGN_STATE.sentCount = targets.length;
  CAMPAIGN_STATE.step = 'sent';
  const now = new Date();
  const stamp = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const label = CAMPAIGN_STATE.segment === '3m' ? t('adm.dc.label.3m') : t('adm.dc.label.6m');
  ADMIN.campaigns.push({
    id: 'CMP-' + Date.now().toString(36).toUpperCase(),
    label, segment: CAMPAIGN_STATE.segment,
    recipients: targets.length, discount: CAMPAIGN_STATE.discount,
    sentAt: stamp,
  });
  renderDormantCampaign();
}

function openMemberDetail(memberId){
  const m = ADMIN.members.find(x=>x.id===memberId);
  if(!m) return;

  // 잔액 진행률 (충전 → 현재)
  const totalCharged = m.history.filter(h=>h.type==='charge').reduce((a,h)=>a+h.amount, 0);
  const usedPct = totalCharged ? Math.min(100, Math.round(m.used / totalCharged * 100)) : 0;
  const remainPct = 100 - usedPct;

  // 서비스별 사용 집계
  const svcAgg = {};
  m.history.filter(h=>h.type==='service').forEach(h=>{
    const key = h.svc || 'etc';
    if(!svcAgg[key]) svcAgg[key] = { count:0, total:0 };
    svcAgg[key].count += 1;
    svcAgg[key].total += Math.abs(h.amount);
  });
  const svcMeta = {
    grooming:{nameKey:'adm.md.svc.grooming', icon:'✂️', color:'#7a5a3a'},
    spa:     {nameKey:'adm.md.svc.spa',  icon:'🛁', color:'#3f6b52'},
    pool:    {nameKey:'adm.md.svc.pool', icon:'🏊', color:'#2f6b7a'},
    daycare: {nameKey:'adm.md.svc.daycare', icon:'🎾', color:'#7a6b3a'},
    hotel:   {nameKey:'adm.md.svc.hotel', icon:'🛏️', color:'#5a3f6b'},
    etc:     {nameKey:'adm.md.svc.etc',  icon:'·',  color:'#888'},
  };
  const svcEntries = Object.entries(svcAgg)
    .map(([k,v])=>({key:k, meta:svcMeta[k]||svcMeta.etc, ...v}))
    .sort((a,b)=>b.total-a.total);
  const svcMaxTotal = svcEntries[0]?.total || 1;

  // 시계열 — 최신순 정렬
  const history = [...m.history].sort((a,b)=>b.date.localeCompare(a.date));

  openSheetHTML(`<div class="grab"></div>
    <!-- 헤더 -->
    <div class="md-head">
      <div class="md-h-l">
        <div class="md-name">${m.name}</div>

          ${m.contact} · <span class="m-tier">${t('adm.md.tierLine',{tier:m.tier})}</span>
          <span style="color:var(--gray);margin-left:6px">${t('adm.md.joined',{date:m.joined})}</span>
        </div>
        <div class="md-pets">${t('adm.md.recentLine',{pets:m.petNames.join(' · '),date:admRecent(m.recent)})}</div>
      </div>
    </div>

    <!-- 잔액 진행 바 -->
    <div class="md-balance">
      <div class="md-bal-h">
        <span>${t('adm.md.balLbl',{amount:fmt(m.balance)})} <em>VND</em></span>
        <span style="color:var(--gray);font-size:11.5px">${t('adm.md.totalCharged',{amount:fmt(totalCharged)})}</span>
      </div>
      <div class="md-bal-bar">
        <div class="md-bal-used" style="width:${usedPct}%"></div>
        <div class="md-bal-rem" style="width:${remainPct}%"></div>
      </div>
      <div class="md-bal-legend">
        <span><i style="background:var(--mocha)"></i>${t('adm.md.usedLeg',{amount:fmt(m.used),pct:usedPct})}</span>
        <span><i style="background:var(--good)"></i>${t('adm.md.remLeg',{amount:fmt(m.balance),pct:remainPct})}</span>
      </div>
    </div>

    <!-- 서비스별 사용 집계 -->
    <div class="md-svc-section">
      <div class="md-section-h">${t('adm.md.bySvc')} <span class="adm-section-sub">${t('adm.md.bySvcSub',{n:m.history.filter(h=>h.type==='service').length})}</span></div>
      ${svcEntries.map(s=>`
        <div class="md-svc-row">

// ============================================================================
const ISSUE_STATE = {
  step: 'member',     // 'member' → 'pkg' → 'pay' → 'done'
  memberId: null,     // 기존 회원이면 id, 신규면 null
  newMember: { name:'', contact:'' },  // 신규 회원 정보
  pkg: null,          // 선택된 VIP_PACKAGES 항목
  payMethod: null,    // 'cash' | 'card' | 'bank'
  showNewForm: false, // step=member에서 신규 폼 펼침 여부
};

function openIssueVipSheet(){
  ISSUE_STATE.step = 'member';
  ISSUE_STATE.memberId = null;
  ISSUE_STATE.newMember = { name:'', contact:'' };
  ISSUE_STATE.pkg = null;
  ISSUE_STATE.payMethod = null;
  ISSUE_STATE.showNewForm = false;
  renderIssueVipSheet();
}

function renderIssueVipSheet(){
  if(ISSUE_STATE.step === 'done'){ renderIssueVipDone(); return; }
  if(ISSUE_STATE.step === 'pay'){ renderIssueVipPay(); return; }
  if(ISSUE_STATE.step === 'pkg'){ renderIssueVipPkg(); return; }
  // step === 'member'
  renderIssueVipMember();
}

  const st = ISSUE_STATE;
  openSheetHTML(`<div class="grab"></div>
    <div style="font-family:'Fraunces',serif;font-size:22px;color:var(--brown);font-weight:600;padding:0 2px 2px">${t('adm.issue.title')}</div>
    <div style="font-size:12.5px;color:var(--gray);padding:0 2px 14px">${t('adm.issue.step.member')}</div>

    <div class="field" style="padding:0;margin-bottom:10px">

    </div>

    <div id="issueMemberList" class="savedlist" style="max-height:240px;overflow-y:auto">
      ${ADMIN.members.map(m=>`<div class="savedrow" style="cursor:pointer" onclick="selectIssueMember('${m.id}')">
        <span class="sv-ic">👤</span>
        <span class="sv-tx"><b>${m.name}</b><i>${m.contact} · ${t('adm.mb.tierLine',{tier:m.tier})}</i></span>
        <span class="boostGo">›</span>
      </div>`).join('')}
    </div>

    <button class="btn ghost" style="margin-top:12px;text-align:left;justify-content:flex-start" onclick="ISSUE_STATE.showNewForm=!ISSUE_STATE.showNewForm;renderIssueVipSheet()">
      ${t('adm.issue.newMember')} ${st.showNewForm?'▾':'▸'}

      <div class="field" style="padding:0">
        <label>${t('adm.issue.newMember.name')}</label>
        <input id="issueNewName" placeholder="${t('adm.issue.newMember.namePh')}" value="${st.newMember.name}" oninput="ISSUE_STATE.newMember.name=this.value">
      </div>
      <div class="field" style="padding:0;margin-top:10px">
        <label>${t('adm.issue.newMember.contact')}</label>
        <input id="issueNewContact" placeholder="${t('adm.issue.newMember.contactPh')}" value="${st.newMember.contact}" oninput="ISSUE_STATE.newMember.contact=this.value">
      </div>
      <button class="btn" style="margin-top:12px" onclick="continueIssueNew()">${t('adm.issue.continue')}</button>
    </div>` : ''}

    <button class="btn ghost" style="margin-top:14px" onclick="closeSheet()">${t('adm.issue.cancel')}</button>
  `, renderIssueVipSheet);
}
function renderIssueVipMemberList(q){
  const list = document.getElementById('issueMemberList');
  if(!list) return;
  const query = (q||'').trim().toLowerCase();
  const filtered = ADMIN.members.filter(m =>
    !query || m.name.toLowerCase().includes(query) || m.contact.toLowerCase().includes(query)
  );
  list.innerHTML = filtered.map(m=>`<div class="savedrow" style="cursor:pointer" onclick="selectIssueMember('${m.id}')">
    <span class="sv-ic">👤</span>
    <span class="sv-tx"><b>${m.name}</b><i>${m.contact} · ${t('adm.mb.tierLine',{tier:m.tier})}</i></span>
    <span class="boostGo">›</span>
  </div>`).join('') || `<div class="empty-mini">—</div>`;
}

function selectIssueMember(memberId){
  ISSUE_STATE.memberId = memberId;
  ISSUE_STATE.step = 'pkg';
  renderIssueVipSheet();
}

function continueIssueNew(){
  const n = ISSUE_STATE.newMember.name.trim();
  const c = ISSUE_STATE.newMember.contact.trim();
  if(!n || !c){ hint(t('adm.issue.requiredName')); return; }
  ISSUE_STATE.memberId = null; // 신규
  ISSUE_STATE.step = 'pkg';
  renderIssueVipSheet();
}

function getIssueMemberName(){
  if(ISSUE_STATE.memberId){
    const m = ADMIN.members.find(x=>x.id===ISSUE_STATE.memberId);
    return m?.name || '';
  }
  return ISSUE_STATE.newMember.name;
}

function renderIssueVipPay(){
  const st = ISSUE_STATE;
  const name = getIssueMemberName();
  const methodLabel = st.payMethod
    ? t('adm.issue.pay.'+st.payMethod)
    : '—';
  openSheetHTML(`<div class="grab"></div>
    <div style="font-family:'Fraunces',serif;font-size:22px;color:var(--brown);font-weight:600;padding:0 2px 2px">${t('adm.issue.title')}</div>

      <div style="display:flex;justify-content:space-between"><span>${t('adm.issue.sum.member')}</span><b style="color:var(--brown)">${name}</b></div>
      <div style="display:flex;justify-content:space-between"><span>${t('adm.issue.sum.amount')}</span><b style="color:var(--brown)">${fmt(st.pkg.price)} VND</b></div>
      <div style="display:flex;justify-content:space-between"><span>${t('adm.issue.sum.pay')}</span><b style="color:var(--accentDk)">${fmt(st.pkg.pay)} VND</b></div>
      <div style="display:flex;justify-content:space-between"><span>${t('adm.issue.sum.method')}</span><b style="color:var(--brown)">${methodLabel}</b></div>
    </div>

    <button class="btn dark" style="margin-top:14px" ${st.payMethod?'':'disabled style="opacity:.5"'} onclick="confirmIssueVip()">${t('adm.issue.confirmBtn')}</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn ghost" style="flex:1" onclick="ISSUE_STATE.step='pkg';renderIssueVipSheet()">${t('adm.issue.back')}</button>
      <button class="btn ghost" style="flex:1" onclick="closeSheet()">${t('adm.issue.cancel')}</button>
    </div>
  `, renderIssueVipSheet);
}

function confirmIssueVip(){
  const st = ISSUE_STATE;
  if(!st.pkg || !st.payMethod) return;
  const today = getToday();

  if(st.memberId){
    // 기존 회원: balance 증가 + history 추가
    const m = ADMIN.members.find(x=>x.id===st.memberId);
    if(m){
      m.balance = (m.balance||0) + st.pkg.price;
      m.recent = today;
      if(!m.history) m.history = [];
      m.history.push({
        type:'charge',
        date: today,
        label: t('adm.mb.guide.line',{price:fmt(st.pkg.price)}),
        amount: st.pkg.price,
        balance: m.balance,
        paid: t('adm.issue.pay.'+st.payMethod),
      });
    }
  } else {
    // 신규 회원 생성
    const newId = 'M'+Date.now().toString(36).toUpperCase();
    ADMIN.members.push({
      id: newId,
      name: st.newMember.name,
      contact: st.newMember.contact,
      tier: 'NEW',
      balance: st.pkg.price,
      used: 0,
      joined: today,
      recent: today,
      petNames: [],
      pets: 0,
      history: [{
        type:'charge',
        date: today,
        label: t('adm.mb.guide.line',{price:fmt(st.pkg.price)}),
        amount: st.pkg.price,
        balance: st.pkg.price,
        paid: t('adm.issue.pay.'+st.payMethod),
      }],
    });
  }

  // 계좌이체는 QR 결제 흐름 한 번 더 보여주고 done
  if(st.payMethod === 'bank'){
    closeSheet();
    payQRSheet({
      title: t('adm.issue.title'),
      sub: t('adm.issue.pkgFor',{name:getIssueMemberName()}).replace(/<\/?b>/g,''),
      amount: st.pkg.pay,
      memo: `POSHPET ISSUE VIP${st.pkg.id.toUpperCase()}`,
      onPaid: ()=>{
        ISSUE_STATE.step = 'done';
        renderIssueVipSheet();
        renderAdmin();
      }
    });
  } else {
    ISSUE_STATE.step = 'done';
    renderIssueVipSheet();
    renderAdmin();
  }
}

  const name = getIssueMemberName();

      ${st.photoAdded
        ? `<div style="padding:11px 13px;border:1.5px solid var(--good);border-radius:11px;background:#F0F8F0;color:var(--good);font-weight:600;font-size:13px">${t('adm.vac.input.photoMock')}</div>`
        : `<button class="btn ghost" style="margin-top:0" onclick="VAC_INPUT_STATE.photoAdded=true;renderVaccineInputSheet()">📷 ${t('adm.vac.input.photo').replace(/^📷 ?/,'').replace(/ \(.*\)$/,'')}</button>`
      }
    </div>

    <div class="field" style="padding:0;margin-top:10px">
      <label>${t('adm.vac.input.noteLbl')}</label>
      <textarea placeholder="${t('adm.vac.input.notePh')}"
        oninput="VAC_INPUT_STATE.note=this.value"
        style="resize:none;font-family:inherit;width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:13.5px;line-height:1.5;min-height:60px">${st.note}</textarea>
    </div>

    <button class="btn dark" style="margin-top:14px" onclick="saveVaccineInput()">${t('adm.vac.input.save')}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${t('adm.vac.input.cancel')}</button>
  `, renderVaccineInputSheet);
}

function saveVaccineInput(){
  const st = VAC_INPUT_STATE;
  const b = ADMIN.todayBookings.find(x=>x.id===st.bookingId);
  if(!b) return;

  // 백신 종합 상태 계산
  const bothOk = st.rabies === 'ok' && st.core === 'ok';
  const anyOk = st.rabies === 'ok' || st.core === 'ok';
  b.vaccine = bothOk ? 'ok' : (anyOk ? 'partial' : 'missing');
  // 상세 한 줄로 표시
  const parts = [];
  if(st.rabies === 'ok') parts.push(t('adm.vac.input.rabies'));
  if(st.core === 'ok') parts.push(t('adm.vac.input.core'));
  if(st.date) parts.push(st.date);
  if(st.clinic) parts.push(st.clinic);
  b.vaccineDetail = parts.length ? parts.join(' · ') : (st.note || t('adm.vac.fallback'));

  // 고객측 S.pets에도 반영 (b.petName으로 매칭 — petId가 있으면 우선)
  if(b.petId){
    const p = S.pets.find(x=>x.id===b.petId);
    if(p){
      if(!p.vaccines) p.vaccines = {};
      if(st.rabies) p.vaccines.rabies = st.rabies;
      if(st.core)   p.vaccines.core = st.core;
      if(st.note)   p.vaccines.note = st.note;
    }
  } else {
    // 이름 매칭 fallback
    const p = S.pets.find(x=>x.name === b.petName);
    if(p){
      if(!p.vaccines) p.vaccines = {};
      if(st.rabies) p.vaccines.rabies = st.rabies;
      if(st.core)   p.vaccines.core = st.core;
      if(st.note)   p.vaccines.note = st.note;
    }
  }

  hint(t('adm.vac.input.savedToast'));
  closeSheet();
  renderAdmin();
}

// 해시 변경 감지
function checkRouteHash(){
  const h = location.hash || '';
  if(h.startsWith('#/admin')){
    document.getElementById('ppwrap').classList.add('admin');
    const seg = h.split('/')[2] || 'dashboard';
    ADMIN.view = ['dashboard','bookings','members','chat','livecam'].includes(seg) ? seg : 'dashboard';
    renderAdmin();
  } else {
    document.getElementById('ppwrap').classList.remove('admin');
  }
}
window.addEventListener('hashchange', checkRouteHash);

// ============================ BOOT ============================
go('home');
checkRouteHash();
</script>
